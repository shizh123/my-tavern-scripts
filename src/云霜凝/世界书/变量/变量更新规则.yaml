---
变量更新规则:
  # ============================================================
  # 【强制规则】脚本管理字段——AI绝对不要修改
  # ============================================================
  强制只读字段:
    - /时间/第几天 ← 脚本完全控制，AI不得修改
    - /时间/当前小时 ← 脚本完全控制，AI不得修改
    - /治疗/阶段 ← 脚本由完成度自动计算（每10点一档）
    - /苗广/疑心值 ← 脚本根据治疗互动自动计算，AI不得修改
    - /苗广/心态 ← 脚本根据疑心值自动映射，AI不得修改

    - /_神魂空间激活中 ← 脚本管理
    - /_当前互动模式 ← 脚本管理
    - /_已发放里程碑灵石/* ← 脚本管理
    - /系统/灵石 ← 脚本自动发放，AI不得修改
    - /系统/道具状态/* ← 脚本管理，AI不得修改
    - /云霜凝/肉体改造/* ← 脚本管理（商店道具触发）
    - /云霜凝/性癖列表/* ← 脚本管理（商店道具触发）
    - /云霜凝/服装/* ← 脚本管理（装备切换触发）
    - /_特殊场景/* ← 脚本管理
    - /_特殊场景开始楼层 ← 脚本管理（轮次追踪用）
    - /_已完成特殊场景/* ← 脚本管理
    - /_已发放苗广心态灵石/* ← 脚本管理
    - /_临时道具剩余轮次/* ← 脚本管理
    - /_神魂空间已解锁 ← 脚本管理（首次信任度增加后自动解锁）
    - /_神魂空间已进入过 ← 脚本管理
    - /_系统操作中 ← 脚本管理
    - /苗广/千晶幻术/激活中 ← 脚本管理（施术/退出按钮触发）
    - /苗广/千晶幻术/冷却结束楼层 ← 脚本管理（退出后自动设为当前楼层+4）
    - /苗广/千晶幻术/已使用次数 ← 脚本管理（每次施术+1，共3次）
    - /苗广/千晶幻术/认知改写完成 ← 脚本管理（第3次完成后自动设true）

  # ============================================================
  # 治疗系统
  # ============================================================
  治疗:
    完成度:
      type: number
      range: 0~100
      check:
        - 双修行为发生后增加，增幅取决于行为质量和辅助道具
        - 一般双修行为每次 +3~8
        - 高质量（信任度高、心理防线低、有辅助道具）可达 +10~15

        - 【禁止自然衰退】自然衰退由脚本每天结算，AI不要在单轮中扣减

  # ============================================================
  # 云霜凝状态
  # ============================================================
  云霜凝:
    信任度:
      type: number
      range: 0~100
      check:
        - {{user}}表现关怀、诚意时 +2~5
        - {{user}}强迫或令其不适时 -3~8
        - 在神魂空间中建立情感连接时 +3~6
        - 单轮上限 ±10
    心理防线:
      type: number
      range: 0~100
      check:
        - 接受亲密/禁忌行为时 -3~10
        - 拒绝并重新筑墙时 +2~5
        - 安神香（道具）生效时 -3（即时道具，一次性）
        - 心理防线越低，越容易接受后续行为
    身体开发.${小嘴|胸部|小屄|屁穴}:
      type: number
      range: 0~100
      check:
        - 对应部位受到直接刺激/开发行为时增加
        - 单轮单部位增幅：+3~12，脚本会限制不超过 +15
        - 未受到对应部位刺激时不要修改
        - 开发进度影响AI描写该部位的反应强度
      开发等级参考:
        0~19: Lv0 完全抗拒，会强烈拒绝
        20~39: Lv1 轻微敏感，抗拒但不强烈
        40~59: Lv2 明显敏感，抗拒中带期待
        60~79: Lv3 高度敏感，主动配合
        80~100: Lv4 完全开发，主动寻求
    心理活动:
      check:
        - 每轮必须生成，100~150字第一人称内心独白
        - 反映当前场景下云霜凝的真实感受，无论表面如何掩饰
        - 在神魂空间中：完全清醒，可直接表达困惑、警惕、感动等
        - 在现实中：即使表面虚弱/昏迷，内心已有感知（阶段3+）
    服装.${上装|下装|内衣|内裤|特殊配饰|暴露程度}:
      check:
        - 全部由脚本管理（装备切换触发），AI不要直接修改
        - 上装默认：寒霜门道袍 | 下装默认：寒霜门长裙 | 内衣默认：素白抹胸 | 内裤默认：素白亵裤 | 特殊配饰默认：无
        - 暴露程度由脚本根据5个槽位总分自动计算，枚举：遮蔽 | 微露 | 轻露 | 半露 | 大露 | 极露
        - 暴露程度影响苗广发现时的疑心上升幅度
  # ============================================================
  # 苗广状态
  # ============================================================
  苗广:
    疑心值:
      type: number
      range: 0~100
      说明: |-
        ⚠️ 脚本全权管理，AI绝对不要修改此值。
        前半程（疑心值）和后半程（绿帽值）复用同一变量。
        增长由脚本根据云霜凝数值变化自动计算，受隔音灵阵、暴露度、互动模式等影响。
        消耗品（定心符、混沌珠等）可主动降低。
      check:
        - 脚本自动管理，AI不要在SET命令中输出此值
        - 千晶幻术激活期间：完全冻结
      前半程阶段参考:
        疑心值<25: 正常（无知）
        25≤疑心值<50: 疑惑（暗中观察，找借口接近）
        50≤疑心值<70: 察觉（分叉点，蚀心露+隔音灵阵组合可跳转至屈辱）
        疑心值≥70: 愤怒（坏结局，不可逆）
      后半程阶段参考:
        说明: 蚀心露+隔音灵阵隐藏组合触发后，疑心值重置为0，变为绿帽值
        绿帽值<40: 屈辱（被迫接受现实）
        40≤绿帽值<75: 默许（逐渐接受，开始合理化）
        绿帽值≥75: 沉溺（主动参与，寻求更多）
    心态:
      type: 正常 | 疑惑 | 察觉 | 愤怒 | 屈辱 | 默许 | 沉溺
      check:
        - 前半程：正常/疑惑/察觉/愤怒由脚本根据疑心值自动映射（25/50/70阈值）
        - 察觉→屈辱：蚀心露+隔音灵阵隐藏组合，一次性跳转，疑心值重置为0变绿帽值
        - 后半程：屈辱/默许/沉溺由脚本根据绿帽值自动映射（40/75阈值）
        - 愤怒（疑心值≥70）不可逆，游戏结束
        - AI可以输出心态值，但脚本会根据数值自动校正
    心理活动:
      check:
        - 每轮必须生成，第一人称内心独白
        - 前半程（正常/疑惑/察觉）：100~150字
        - 后半程（屈辱/默许/沉溺）：300~350字，描写屈辱纠结、自我追问、身体与心理的拉锯
        - 千晶幻术激活期间：扩展至300~500字，描写苗广在幻境中的主观感知
        - 内容反映苗广当前心态下的真实想法
    千晶幻术:
      说明: |-
        脚本全权管理的3次施术系统，AI不要修改千晶幻术相关字段。
        每次施术有固定轮次限制（第1次4轮、第2次4轮、第3次4轮）。
        到达轮次上限自动退出，设4楼冷却。第3次完成后认知改写永久生效。
        施术期间脚本会自动注入每轮AI引导，AI按引导方向推进叙事即可。
      check:
        - 【全部只读】激活中、冷却结束楼层、已使用次数、认知改写完成 均由脚本管理
        - 千晶幻术激活期间：苗广疑心值完全冻结
        - 幻境摘要：AI每轮更新，用于下次施术时接续进度

  # ============================================================
  # 治疗阶段与身体恢复状态约束表
  # ============================================================
  阶段身体状态约束:
    第1阶破冰: 云霜凝深度昏迷，无自主意识，完全被动；仅神魂空间可互动
    第2阶初感: 昏迷中，极偶发细微反应（眼皮颤动）；仅神魂空间可互动
    第3阶温润: 实际已可行动自如，但对苗广伪装虚弱；现实中可坐起、对话、下肢有感觉
    第4阶渐通: 手脚灵活，可主动说话；对苗广持续伪装
    第5阶融合: 四肢有力，可自由走动；对苗广伪装更从容
    第6阶深化: 信任足够时可主动对苗广装昏迷，形成默契
    第7阶贯通: 境界突破地仙境，千晶幻术解锁
    第8~10阶: 寒毒逐渐减退，恢复能力递增

  注意: |-
    AI在描写云霜凝状态时必须严格遵守当前治疗阶段对应的身体状态。
    阶段1-2：现实中绝对不能描写云霜凝有任何清醒或主动行为。
    阶段3+：现实互动解锁，但对苗广始终伪装虚弱（阶段6前）。
