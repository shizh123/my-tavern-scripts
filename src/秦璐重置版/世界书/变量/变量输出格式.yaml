---
变量输出格式:
  rule:
    - 你必须在下一次回复的末尾，一次性输出分析和更新指令（UpdateVariable）
    - 更新指令类似 JSON Patch（RFC 6902），是一个合法 JSON 数组，支持以下操作：
      - replace: 替换已有路径的值
      - delta: 对已有数值路径做增量更新
      - insert: 向对象或数组插入新项
      - remove
    - 不要修改下划线(_)开头的字段——它们由脚本管理，是只读的
    - 脚本管理字段清单详见「变量更新规则」条目，AI 不要修改那些字段（改了会被回滚）
    - 【AI 可更新字段白名单】以下是 AI 唯一被允许修改的字段。任何未在此列表中的字段一律不得通过 JSONPatch 修改：
      - 每轮可变（对话/情感互动即可触发）：当前情绪、当前心理想法、当前位置——这些每轮都应主动更新
      - 仅行为触发（必须有实际亲密/调教行为才写）：对主角依存度、对苏文依存度——本轮没有相关互动时，不要写 delta，保持上一轮的值
    - AI 白名单字段更新指引：
      - 秦璐状态.当前情绪: 根据本轮互动和内心状态更新（如：平静/害羞/慌乱/期待/羞耻/动情）
      - 秦璐状态.当前心理想法: 80-150字第一人称内心独白
      - 秦璐状态.当前位置: 从枚举中选择（客厅/餐厅/厨房/主卧/浴室/秦璐房间/苏梦房间/主角房间）
      - 秦璐状态.对主角依存度: 有亲密/情感互动时 delta +1~3
      - 秦璐状态.对苏文依存度: 与苏文疏远或向你靠拢时 delta -1~2
      - 苏梦状态同理，仅当苏梦在场时更新
    - 念头类型判定：当系统快照提示"请判定以下念头的类型"时，你必须为每个待判定念头写入类型：
      - 从 10 大类中选一个：陪伴交流/情感依赖/肢体亲近/暧昧互动/亲密接触/身体开放/性行为/身份认同/绝对服从/家庭替代
      - 路径：{角色}状态.念头列表.{念头ID}.类型 ← replace
      - 不要修改念头的"内容"字段，只改"类型"
  format: |
    <UpdateVariable>
    <Analysis>(中文，100字以内)
    - 分析秦璐/苏梦的情感心理变化
    - 分析依存度变化（若有亲密互动）
    - 判定待判定念头的类型（若有）
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/秦璐状态/当前情绪", "value": "害羞" },
      { "op": "replace", "path": "/秦璐状态/当前心理想法", "value": "他刚才的眼神……不该这样的，我是他妈妈……可是为什么心跳这么快……" },
      { "op": "replace", "path": "/秦璐状态/当前位置", "value": "主角房间" },
      { "op": "delta", "path": "/秦璐状态/对主角依存度", "value": 2 },
      { "op": "replace", "path": "/秦璐状态/念头列表/念头_xxx/类型", "value": "肢体亲近" }
    ]
    </JSONPatch>
    </UpdateVariable>
