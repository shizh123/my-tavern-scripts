---
苏文巡逻系统:
  概述: |-
    苏文会在白天随机路过主角房间门口，如果发现门关着（秦璐/苏梦在里面），
    会敲门提醒，并设置一个离开期限（1-2小时）。
    【离开期限机制】：不需要借口判定，苏文只是提醒角色离开
    - 苏文巡逻时设置离开期限（如"1小时内离开"）
    - 如果角色在期限内离开主角房间，巡逻事件结束
    - 如果超时未离开，触发打断事件

  与打断机制的关系: |-
    【共存规则】：
    - 巡逻机制（概率触发）和4小时强制打断机制同时生效
    - 巡逻触发后会重置当前角色的危险时间累计，重新开始计时
    - 秦璐和苏梦各自独立追踪危险时间，互不影响
    - 疑心值冻结（成功说谎）期间不会触发巡逻
    - 超过离开期限未离开 → 触发打断事件（苏文再次出现质问）

  触发条件:
    基础条件:
      - 秦璐/苏梦在主角房间
      - 苏文在家且清醒（不是出差、加班或睡眠）
      - 苏文不在主角房间（不在同一空间）
      - 距离上次巡逻至少2小时（冷却时间）
      - 疑心值未被冻结

    概率计算: |-
      【基础概率】：15%（每轮）

      【时间段修正】：
      | 时间段 | 修正系数 | 说明 |
      |--------|----------|------|
      | 07:00-12:00 | ×1.0 | 早上正常 |
      | 12:00-18:00 | ×1.2 | 下午稍高 |
      | 18:00-22:00 | ×0.8 | 晚上稍低 |
      | 22:00-07:00 | ×0.3 | 深夜很低 |

      【疑心值修正】：
      | 疑心值 | 修正系数 | 说明 |
      |--------|----------|------|
      | 0-20 | ×0.8 | 放松状态 |
      | 20-40 | ×1.0 | 正常警惕 |
      | 40-60 | ×1.3 | 有些怀疑 |
      | 60-80 | ×1.6 | 高度警惕 |
      | 80-100 | ×2.0 | 非常警惕 |

      【示例】：
      - 下午14:00，疑心值30：15% × 1.2 × 1.0 = 18%
      - 晚上20:00，疑心值70：15% × 0.8 × 1.6 = 19.2%
      - 深夜23:00，疑心值50：15% × 0.3 × 1.3 = 5.85%

  巡逻场景描写指南:
    触发描写: |-
      当系统追踪.苏文巡逻事件.待触发为true时，AI必须在当前轮描写苏文路过的场景：

      【苏文的行为】：
      - 脚步声从走廊传来
      - 在主角房间门口停下
      - 可能是去厨房、浴室或自己房间的途中
      - 注意到门关着，敲门提醒

      【敲门/提醒】：
      - "{{user}}？在房间里吗？"
      - "小璐，差不多了吧？别在{{user}}房间待太久。"
      - （敲敲门）"再待一会儿就出来吧。"
      - "过一个小时我再来看看。"

    离开期限机制: |-
      【系统自动设置期限】：
      巡逻触发时，系统会自动设置1-2小时的离开期限：
      - 系统追踪.苏文巡逻事件.离开期限 = "HH:mm"（期限时间）
      - 系统追踪.苏文巡逻事件.期限小时数 = 1或2

      【AI描写要点】：
      - 苏文会提到让角色"过一会儿"或"差不多就出来"
      - 不需要严格说明时间，只是一个温和的提醒
      - 苏文的语气是关心而非质问

    期限内离开: |-
      【效果】：
      - 巡逻事件自动结束（系统检测到位置变化）
      - 疑心值不增加
      - 苏文不会有进一步行动
      - 危险时间累计已重置

      【AI表现】：
      - 角色正常离开主角房间
      - 苏文可能在其他地方遇到角色，表示满意
      - 场景正常进行

    超时未离开: |-
      【效果】：
      - 系统自动触发打断事件
      - 疑心值+10
      - 苏文再次出现，这次会直接质问

      【AI表现】：
      - 苏文再次来到主角房间门口
      - 这次语气更加严肃和不满
      - 进入打断事件的借口判定流程

  秦璐的反应:
    阶段1-抵抗(侵蚀度0-19): |-
      - 非常慌张，心跳加速
      - 急忙整理仪容
      - 借口说得结结巴巴
      - 可能会脸红、出汗
      - 内心充满恐惧

    阶段2-动摇(侵蚀度20-39): |-
      - 表面镇定但内心紧张
      - 能编出较为合理的借口
      - 可能会感到一丝刺激感
      - 担心与享受并存
      - 开始学会应对

    阶段3-沉溺(侵蚀度40-59): |-
      - 比较从容地应对
      - 借口说得自然流畅
      - 可能会暗中不满被打扰
      - 对苏文的警觉感到厌烦

    阶段4-疯狂(侵蚀度60-79): |-
      - 完全不在乎被发现
      - 甚至可能故意挑衅
      - 对苏文的存在感到厌烦
      - 内心烦躁于被打断

    阶段5-圆满(侵蚀度80+): |-
      - 完美的表演
      - 苏文完全看不出异常
      - 从容地应对任何质问
      - 内心完全不紧张
      - 暗自得意于操控苏文

  注意事项:
    - 【重要】当系统追踪.苏文巡逻事件.待触发为true时，必须在当前轮描写巡逻场景
    - 巡逻事件不需要借口判定，苏文只是温和地提醒角色离开
    - 系统会自动检测角色是否在期限内离开
    - 如果超时未离开，系统会自动触发打断事件
    - 超时后进入打断事件的流程（苏文质问 + 借口判定）
    - 巡逻机制是随机的，玩家无法预测，增加紧张感
