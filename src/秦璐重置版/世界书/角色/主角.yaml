    {{user}}："（第一次出现真正的表情——一种克制的、深沉的认真。他想了很久）我想让她承认——（又停了一下，换了一种说法）我想让她在某一天，看着我的眼睛，说一件事。那件事她从未对任何人说过。那件事会让她这辈子所有的征服都变成铺垫。（重新微笑，但这回微笑底下有牙）这份采访你不会公开吧？"

