---
变量更新规则:
  强制只读字段:
    说明: 以下字段由脚本管理，AI 不要修改；习惯变卖和货币结算由界面/脚本处理
    列表:
      - /秦璐状态/堕落度 ← 脚本管理（念头成熟时结算）
      - /秦璐状态/当前阶段 ← 脚本管理（由堕落度派生）
      - /秦璐状态/阶段标题 ← 脚本管理（由阶段派生）
      - /秦璐状态/对主角依存度 ← 脚本管理（念头成熟时结算）
      - /秦璐状态/对苏文依存度 ← 脚本管理（念头成熟时结算）
      - /苏梦状态/堕落度 ← 脚本管理
      - /苏梦状态/当前阶段 ← 脚本管理
      - /苏梦状态/阶段标题 ← 脚本管理
      - /苏梦状态/对主角依存度 ← 脚本管理（念头成熟时结算）
      - /苏梦状态/对苏文依存度 ← 脚本管理（念头成熟时结算）
      - /苏文状态/当前状态 ← 脚本管理（楼层作息游标算出）
      - /苏文状态/当前位置 ← 脚本管理（楼层作息游标算出）
      - /苏文状态/对秦璐疑心值 ← 脚本管理
      - /苏文状态/对苏梦疑心值 ← 脚本管理
      - /秦璐状态/念头列表/*（其中"类型"字段除外，AI 需判定写入） ← 脚本管理
      - /苏梦状态/念头列表/*（其中"类型"字段除外） ← 脚本管理
      - /秦璐状态/习惯列表 ← 脚本管理（变卖由界面操作）
      - /苏梦状态/习惯列表 ← 脚本管理（变卖由界面操作）
      - /系统/货币 ← 脚本管理
      - /系统/道具状态/* ← 脚本管理
      - /系统/念头植入日志 ← 脚本管理
      - 所有下划线(_)开头字段 ← 脚本内部状态

  AI可更新字段:
    世界:
      - /世界/时间 ← AI 每轮按剧情更新，仅作氛围显示，脚本不参与计算
      - /世界/日期 ← AI 在跨天或日期变化时更新，仅作氛围显示
      - /世界/地点 ← AI 按当前场景更新
      - /世界/环境氛围 ← AI 按当前场景更新
    角色状态:
      - /秦璐状态/当前情绪 ← AI 每轮根据互动更新
      - /秦璐状态/当前心理想法 ← AI 每轮更新
      - /秦璐状态/当前位置 ← AI 按当前场景更新
      - /苏梦状态/当前情绪 ← 苏梦在场时更新
      - /苏梦状态/当前心理想法 ← 苏梦在场时更新
      - /苏梦状态/当前位置 ← 苏梦在场时更新
    系统:
      - /系统/本轮相关念头 ← AI 写入培育中念头与本轮剧情的相关度（{念头ID: 2|1}），脚本读取后清空

  念头类型判定:
    说明: 当系统快照提示需要判定念头类型时，必须为每个待判定念头写入类型
    可选类型: 陪伴交流/情感依赖/肢体亲近/暧昧互动/亲密接触/身体开放/性行为/身份认同/绝对服从/家庭替代
    注意: 只写入"类型"字段，不要修改念头的内容、状态、难度等其它字段

  时间日期:
    管理归属: AI 自由维护
    说明: 时间/日期只作氛围显示，脚本不算时间；苏文位置、念头进度、窗口等全部由脚本按楼层管理
