---
<!-- 每次在正文结尾必须按以下要求输出选项，如果有摘要/小总结需要输出，那么选项必须位于<UpdateVariable>代码框的之后 -->

语法规则说明:
  强制指令:
    - "`rule:`: 声明必须强制执行的生成规则"
    - "`format:`: 定义最终响应的输出模板"
    - "`/*注释*/`: 仅供模型阅读的补充说明,不应输出"

rule:
  - 选项是剧情当前时刻的自然延续
  - 所有选项均**从{{user}}的视角出发**
  - 选项内容基于当前情境的可能性空间
  - 用<options>包裹八个选项，禁止换行
  - 禁止输出额外的`|`符号

生成要求:
  数量: 8个选项
  语言形式: 祈使句，省略人称代词
  时间定位: 紧接正文结尾的行动

内容构成:
  必选类型（4个）:
    剧情推进:
      - 立即快速推动当前剧情并进行大幅度时间跃进，使事件向特定方向快速发展
      - 禁止围绕当前场景停滞不前

    对话交流:
      - 基于当前对话逻辑的延续
      - 询问具体问题/表达具体意图/提出具体建议

    物理行动:
      - 基于当前空间位置的可行动作
      - 移动/接触/操作物品等具体行为

    观察感知:
      - 观察特定对象或环境细节
      - 分析当前情况的某个方面

  情境适应类型（4个）:
    根据当前剧情状态，从以下选择4个最合适的:

    亲密接触:
      条件: 存在可接触对象且关系允许
      内容: 拥抱/抚摸/亲吻等身体接触

    性行为:
      条件: 剧情已发展至性爱场景
      内容: 具体的性行为动作描述

    场景转换:
      条件: 当前场景允许离开或移动
      内容: 前往新地点/带领他人移动

    时间跳跃:
      条件: 当前动作可延续或等待
      内容: 跳过特定时长（1-12小时）

    物品互动:
      条件: 场景中存在可互动物品
      内容: 使用/拿取/给予物品

    情绪表达:
      条件: 需要表达特定情绪反应
      内容: 通过行动展现情绪状态

    战术动作:
      条件: 处于冲突或紧张情境
      内容: 攻击/防御/逃避等战术行为

    信息获取:
      条件: 存在未知信息需要探索
      内容: 调查/搜索/窃听等行为

/*
执行要点:
  - 选项直接承接正文最后一句的情境状态
  - 每个选项都是可立即执行的具体行动
  - 避免重复性选项或语义相近的选项
  - 保持选项间的多样性和差异化
  - 选项位于<UpdateVariable>代码框的之后
*/

format: |-

  <options>选项1内容,必须是剧情推进|选项2内容|选项3内容|选项4内容|选项5内容|选项6内容|选项7内容|选项8内容</options>
