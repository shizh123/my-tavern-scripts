        if (d.gd !== null) {
          let ratio = Math.min(1, Math.max(0, d.gd / 300));
          currC = mixColor(d.c, ratio);
        }

        let bar = rBar(d, currC);

        let tags = `<div class="d-box" style="margin-top:2px; flex-wrap:wrap">`;
        tags += rBlk('衣着', d.t1, d.t, 0);
        tags += rBlk('外貌', d.t2, d.t, 0);
        tags += `</div>`;

        const isS5 = (d.n === '绛雪' || d.n === '竹夭') && d.gd >= 300;
        return `<div class="row ${isS5 ? 'stage-5' : ''}" style="--c:${d.c};--tc:${d.t}" onclick="clkAv(${idx})">
        ${isS5 ? '<div class="s5-mark">卍</div>' : ''}
        <img class="av" src="${d.i}" onload="this.style.opacity=1" referrerpolicy="no-referrer">
        <div class="inf" style="justify-content:center; z-index:1">
            <div class="nm-row" style="margin-bottom:2px; justify-content:space-between">
                <div style="display:flex; align-items:center">
                    <div class="nm" style="margin:0">${d.n}</div>
                    ${d.st ? `<div class="st-badge" style="color:${currC}; border-color:${currC}">${d.st}</div>` : ''}
                </div>
            </div>
            ${bar}
            ${tags}
        </div>
    </div>`;
      };

      const rPoet = (d, t) =>
        `<div class="poet-box-${t}"><div class="poet-line">${d.p1}</div><div class="poet-line">${d.p2}</div></div>`;

      let lastStateStr = '';

      const populateData = () => {
        const newD = CHARS.map((c, i) => {
          const t1 = getStat(`${c.sk}.衣着`, '');
          const t2 = getStat(`${c.sk}.外貌`, '');

          let gd = null,
            st = '',
            cf = '';
          if (c.n === '绛雪' || c.n === '竹夭') {
            gd = getStat(`${c.sk}.善业`, 0);
            st = getStage(c.n, gd);
            cf = getStat(`${c.sk}.自白`, '');
          }

          let imgUrl = manualSel[i];
          if (!imgUrl) {
            if (c.n === '绛雪' || c.n === '竹夭') imgUrl = pickImgStage(c.k, gd);
            else imgUrl = pickImg(c.k, t1 + t2);
          }
          return {
            n: c.n,
            i: imgUrl,
            c: c.c,
            t: c.c,
            t1: t1,
            t2: t2,
            p1: POETS[i].p1,
            p2: POETS[i].p2,
            key: c.k,
            th: c.th,
            gd: gd,
            st: st,
            cf: cf,
          };
        });

        const timeVal = getStat('世界.当前时间', '未初始化');
        const locVal = getStat('世界.当前地点', '未知');

        const newState = { d: newD, t: timeVal, l: locVal };
        const newStateStr = JSON.stringify(newState);

        if (newStateStr === lastStateStr) return;
        lastStateStr = newStateStr;

        D = newD;
        T = Math.ceil(D.length / 2);

        if (timeVal || locVal) {
          $id('ib').style.display = 'flex';
          $id('tm-v').innerText = timeVal;
          $id('loc-v').innerText = locVal;
        }

        $id('list-c').innerHTML = D.map((d, i) => rRow(d, i)).join('');
        if (cm === 2 && D.length > 0) {
          uDr(ci);
        }

        const jx = D.find(d => d.n === '绛雪');
        const zh = D.find(d => d.n === '竹夭');
        if (!unlocked && jx && zh && jx.gd >= 300 && zh.gd >= 300) {
          unlocked = true;
          try {
            localStorage.setItem('unlocked_new', 'true');
          } catch (e) {}
          updLkIcon();
        }
      };

      $id('dts').style.display = 'none';

      const uDr = i => {
        const d = D[i];
        setC(d.c);
        const isS5 = (d.n === '绛雪' || d.n === '竹夭') && d.gd >= 300;
        $id('ui').className = `w ${d.th || ''} ${isS5 ? 'stage-5' : ''}`;
        $id('dr').style.setProperty('--c', d.c);

        let currC = d.c;
        if (d.gd !== null) {
          let ratio = Math.min(1, Math.max(0, d.gd / 300));
          currC = mixColor(d.c, ratio);
        }

        let bar = '';
        if (d.gd !== null) {
          bar = `<div style="margin-bottom:12px; padding:0 4px">
            ${d.cf ? `<div class="qt-s" style="margin-bottom:6px; text-align:left">${d.cf}</div>` : ''}
            <div style="display:flex; align-items:center; gap:6px">
                <div class="pb-c" style="height:6px">
                    <div class="pb-split" style="left:25%"></div>
                    <div class="pb-split" style="left:50%"></div>
                    <div class="pb-split" style="left:75%"></div>
                    <div class="pb-f" style="width:${Math.min(100, (d.gd / 300) * 100)}%; background:linear-gradient(90deg, ${currC}, #fff); box-shadow: 0 0 8px ${currC}"></div>
                </div>
                <div class="pb-t" style="font-size:0.8rem; color:${currC}">${d.gd >= 300 ? '功德圆满' : '善业 ' + d.gd}</div>
            </div>
        </div>`;
        }

        $id('dr').innerHTML = `
        <div class="left-col">
            <div class="av-wrap" style="position:relative;line-height:0">
                <img class="av-d" src="${d.i}" onclick="clkAv(${i})" onload="this.style.opacity=1" referrerpolicy="no-referrer">
            </div>
            ${rPoet(d, 'm')}
        </div>
        <div class="inf">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
                <div class="nm-d anim" style="animation-delay:0.05s; margin-bottom:0">${d.n}</div>
                ${d.st ? `<div class="st-badge" style="font-size:0.8rem; padding:2px 8px; margin:0; color:${currC}; border-color:${currC}">${d.st}</div>` : ''}
            </div>
            ${bar}
            ${rBlk('衣着', d.t1, d.t, 0.1)}
            ${rBlk('外貌', d.t2, d.t, 0.15)}
        </div>
        ${rPoet(d, 'pc')}`;
        $id('cin').textContent = `${i + 1}/${D.length}`;
        $id('pvn').style.textShadow = `0 0 20px ${d.c}`;
      };

      const sM = m => {
        cm = m;
        try {
          localStorage.setItem('svm', m);
        } catch (e) {}
        $id('m1').classList.toggle('show', m === 1);
        $id('i1').style.display = m === 1 ? 'flex' : 'none';
        $id('m2').classList.toggle('show', m === 2);
        $id('i2').style.display = m === 2 ? 'flex' : 'none';
        const s = $id('ui').style,
          d = $id('dc').style,
          r = $id('dr').style,
          m2 = $id('m2').style;
        s.cssText = '';
        d.cssText = '';
        r.cssText = '';
        m2.cssText = '';
        if (m === 2) {
          ci = 0;
          uDr(0);
          setTimeout(() => document.querySelectorAll('.av-d').forEach(i => (i.style.opacity = 1)), 50);
        } else {
          $id('ui').className = 'w theme-list';
          $id('ui').style.removeProperty('--c');
        }
      };

      const swC = n => {
        ci = n;
        uDr(ci);
      };
      const mvC = d => {
        ci = (ci + d + D.length) % D.length;
        uDr(ci);
      };

      window.closeSettings = () => {
        $id('set-m').style.display = 'none';
      };
      window.openSettings = () => {
        $id('set-m').style.display = 'grid';
        let c = getComputedStyle($id('ui')).getPropertyValue('--c').trim();
        if (!c) c = '#e0d0b0';
        $id('set-m').style.setProperty('--c', c);
        updSetUI();
      };

      window.changeMode = m => {
        sM(m);
        updSetUI();
      };

      const updSetUI = () => {
        const b1 = $id('btn-mode-1');
        const b2 = $id('btn-mode-2');
        if (!b1 || !b2) return;

        b1.classList.toggle('active', cm === 1);
        b2.classList.toggle('active', cm === 2);
      };

      let savedScale = null;
      try {
        savedScale = localStorage.getItem('imgScale');
      } catch (e) {}
      let imgScale = 100;
      if (savedScale) {
        let v = parseFloat(savedScale);
        if (v < 3) imgScale = Math.round(v * 100);
        else imgScale = Math.round(v);
      }

      let rAF = null;
      const setImgScale = v => {
        imgScale = parseInt(v);
        if (rAF) cancelAnimationFrame(rAF);
        rAF = requestAnimationFrame(() => {
          try {
            localStorage.setItem('imgScale', imgScale);
          } catch (e) {}
          document.documentElement.style.setProperty('--img-scale', imgScale / 100);
          $id('scale-val').innerText = imgScale + '%';
          const rng = $id('scale-rng');
          if (rng) {
            if (rng.value != imgScale) rng.value = imgScale;
            const min = rng.min || 0;
            const max = rng.max || 100;
            const perc = ((imgScale - min) / (max - min)) * 100;
            rng.style.setProperty('--val', perc + '%');
          }
        });
      };

      const rng = $id('scale-rng');
      if (rng) rng.oninput = e => setImgScale(e.target.value);
      setImgScale(imgScale);

      $id('mt').onclick = openSettings;

      const bSw = (el, fn) => {
        let sx,
          sy,
          cx,
          mv = 0;
        const m = e => {
          if (!sx) return;
          let x = (e.touches ? e.touches[0] : e).clientX,
            y = (e.touches ? e.touches[0] : e).clientY;
          if (!mv) mv = Math.abs(x - sx) > Math.abs(y - sy) && Math.abs(x - sx) > 10;
          if (mv) {
            e.preventDefault();
            cx = x;
            if (el.id === 'sc') {
              let tx = -cp * 50 + ((cx - sx) / el.offsetWidth) * 100;
              $id('st').style.transform = `translateX(${Math.max(-50, Math.min(0, tx))}%)`;
            } else {
              el.children[0].style.transform = `translateX(${(cx - sx) * 0.5}px)`;
            }
          }
        };
        const e_end = e => {
          if (mv) {
            let d = cx - sx;
            if (Math.abs(d) > el.offsetWidth * 0.2) fn(d < 0 ? 1 : -1);
            else if (el.id === 'sc') uPg();
          }
          if (el.id !== 'sc') {
            el.children[0].style.transition = 'transform .45s cubic-bezier(0.19, 1, 0.22, 1)';
            el.children[0].style.transform = 'translateX(0)';
          }
          sx = 0;
          mv = 0;
          if (!e.touches) {
            document.removeEventListener('mousemove', m);
            document.removeEventListener('mouseup', e_end);
          }
        };
        const s = e => {
          sx = (e.touches ? e.touches[0] : e).clientX;
          sy = (e.touches ? e.touches[0] : e).clientY;
          cx = sx;
          mv = 0;
          if (el === $id('dc')) el.children[0].style.transition = 'none';
          if (!e.touches) {
            document.addEventListener('mousemove', m);
            document.addEventListener('mouseup', e_end);
          }
        };
        el.addEventListener('touchstart', s);
        el.addEventListener('touchmove', m, { passive: false });
        el.addEventListener('touchend', e_end);
        el.addEventListener('mousedown', s);
      };

      bSw($id('dc'), d => mvC(d));

      document.onkeydown = e => {
        let k = e.key;
        if (k === 'Escape') $id('pv').style.display = 'none';
        if ($id('pv').style.display === 'grid') {
          if (k.includes('Left')) changePv(-1);
          if (k.includes('Right')) changePv(1);
          return;
        }
        if (cm === 2) {
          if (k.includes('Left')) mvC(-1);
          if (k.includes('Right')) mvC(1);
          if (k >= '1' && k <= D.length.toString()) swC(k - 1);
        }
      };

      const updatePvContent = idx => {
        const d = D[idx];
        const img = $id('pvi');
        const name = $id('pvn');
        img.style.opacity = 0;

        img.src = d.i;
        img.onload = () => {
          img.style.opacity = 1;
        };
        name.innerText = d.n;
        name.style.color = d.c;
        name.style.textShadow = `0 0 20px ${d.c}`;
        $id('pvb').style.borderColor = `rgba(255,255,255,0.2)`;
      };

      const changePv = dir => {
        pvIdx = (pvIdx + dir + D.length) % D.length;
        updatePvContent(pvIdx);
      };

      window.pv = idx => {
        pvIdx = idx;
        $id('pv').style.display = 'grid';
        updatePvContent(pvIdx);
      };

      $id('pv').onclick = () => {
        $id('pv').style.display = 'none';
      };
      const bSwPv = (el, fn) => {
        let sx,
          sy,
          mv = 0;
        const m = e => {
          if (!sx) return;
          let x = (e.touches ? e.touches[0] : e).clientX,
            y = (e.touches ? e.touches[0] : e).clientY;
          if (!mv) mv = Math.abs(x - sx) > Math.abs(y - sy) && Math.abs(x - sx) > 10;
          if (mv) e.preventDefault();
        };
        const e_end = e => {
          if (mv) {
            let x = (e.changedTouches ? e.changedTouches[0] : e).clientX;
            let d = x - sx;
            if (Math.abs(d) > 50) fn(d < 0 ? 1 : -1);
          }
          sx = 0;
          mv = 0;
          if (!e.touches) {
            document.removeEventListener('mousemove', m);
            document.removeEventListener('mouseup', e_end);
          }
        };
        const s = e => {
          sx = (e.touches ? e.touches[0] : e).clientX;
          sy = (e.touches ? e.touches[0] : e).clientY;
          mv = 0;
          if (!e.touches) {
            document.addEventListener('mousemove', m);
            document.addEventListener('mouseup', e_end);
          }
        };
        el.addEventListener('touchstart', s);
        el.addEventListener('touchmove', m, { passive: false });
        el.addEventListener('touchend', e_end);
        el.addEventListener('mousedown', s);
      };

      bSwPv($id('pv'), changePv);

      async function init() {
        await waitGlobalInitialized('Mvu');

        populateData();

        eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, () => {
          populateData();
        });

        let ls = null;
        try {
          ls = localStorage.getItem('svm');
        } catch (e) {}
        sM(ls ? parseInt(ls) : 2);
      }

      $(errorCatched(init));
    </script>
  </body>
</html>
