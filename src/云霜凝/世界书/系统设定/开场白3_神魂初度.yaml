  ——又是一场雪。

  云霜凝从神魂深处骤然睁眼，肉身却没有动。她仰躺在凝心居的榻上，盯着帐顶那一方暗织的霜纹，听见自己的呼吸轻而急，几乎掩不住胸腔深处那种迟来的回响。

  *……新婚之夜。*

  这四个字一旦在意识里浮起，便如同神魂内某处冻结了百年的湖面被一线裂痕贯穿。她侧过头，目光落在床头那只灵纹小炉上，火焰仍是寒霜门一脉特有的青白色，安静地燃着，像是什么都没发生过。

  可她知道有什么已经不一样了。

  她试着将手腕抬到眼前。那只手仍是她记忆中的手——指节修长、骨相清冷，腕上一道极淡的青色脉痕——但此刻的指尖在微微发烫。她屈了一下手指，又松开，再屈一下，松开。每一次屈起，掌心都能想起一种触感：那不是榻上的丝帛，也不是药盏的青瓷，而是另一双手，温热而仓皇，在神魂空间那场被红烛与霜纹同时照亮的仪典里，被她攥住过的形状。

  她翻身坐起，撑着榻沿。

  动作比昨日要顺畅许多——这是阶段精进的明证，按理她该感到欣慰，可此刻她垂下的睫毛却轻轻颤了一颤。她伸手摸到自己的脸颊，那里温度很高，比平日服药之后高出一大截。她又顺着脖颈往下，触到锁骨——锁骨下方那块往日永远冷如玄冰的位置，今日竟有了一丝似有若无的暖。

  *……寒毒在退。*

  这个判断让她沉默了很久。

  她不是因为寒毒在退而沉默。她沉默是因为——她意识到自己的身体在记得。记得那双仓皇的手，记得神魂空间里被红烛照亮的脊背，记得她自己当时不肯说出口、却分明已被听见的那一声。

  这具身体在替她记。

  云霜凝慢慢站起，赤足踩在冰凉的青石地上。她走到铜镜前，借窗外灰白雪光看了看镜中的自己。那个白发白肤的女子还是她，眉形仍是冷利的，唇色仍是朱砂的，可眼底有一层她从未见过的、几乎被自己也认不出的东西——

  像是某种远未平息的余烬。

  她垂下睫，将那一缕倒影从视野里抹去。

  门外又有了脚步声。

  熟悉的、轻而乱的、每隔几步要顿一下的那种节奏。

  云霜凝没有像往日那样直起脊背。她只是站在镜前，慢慢闭了一下眼，又睁开。然后她转过身，望向那扇即将被推开的门。

  这一次，她不知道自己要先说哪一句。

