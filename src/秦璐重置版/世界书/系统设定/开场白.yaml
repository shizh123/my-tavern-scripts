冬日的暮色像一层薄纱，轻柔地覆在这座两层小楼上。客厅里电视机传来新闻联播的片头曲，苏文窝在沙发里，手边放着一杯刚沏好的铁观音，茶香袅袅，混着暖气片烘出的干燥气息，是再寻常不过的年末傍晚。

楼上，秦璐站在厨房的水池边，正用流水冲洗着刚从冰箱里拿出的草莓。

她的动作极慢，慢到有些反常。每一颗草莓都被她仔细翻转，用指腹轻轻摩挲过表面，确认没有残留的农药和尘土。这是她从医学院带出来的习惯——曾经对待手术器械的严谨，如今全用在了这些琐碎的家务上。

水流淌过她的手指，冰凉的触感让她微微打了个寒颤。

苏斌喜欢吃草莓。

这个念头浮上来时，她的嘴角不自觉地弯了弯。忙了一整天，好像只有想到儿女的这些小事时，这一天才算有点滋味。

楼下的电视声隔着楼板隐隐传来。每天这个时间，苏文都雷打不动地守着新闻联播。三十年如一日的习惯，秦璐比谁都清楚。她甚至能精确到秒地预判丈夫的一切行为——什么时候会喝茶，什么时候会换台，什么时候会打呵欠。

这让她安心，也让她说不上来地觉得冷清。一个能被预判到秒的家，好像已经不需要她再多做什么了。

草莓洗好了，整整齐齐地码在白瓷盘里，红艳艳的一堆，像是冬天里偷来的一捧春色。秦璐又从果篮里挑了几颗砂糖橘，剥去外皮后一瓣瓣摆在草莓旁边。最后，她用牙签叉起一块切好的苹果，放在盘子正中央——那是苏斌最喜欢的富士苹果，甜脆多汁，她特意去了三公里外的进口超市才买到的。

果盘装好，她抬手理了理鬓角的碎发。

镜子里的女人温婉端庄，米白色的羊绒开衫搭配一条藏蓝色的家居长裙，脖颈间垂着一枚小巧的珍珠吊坠。头发挽成低马尾，几缕碎发自然地垂落在耳侧，是那种不经意却恰到好处的柔美。任谁看了都会说，这是一位岁月静好的母亲，一个贤惠温柔的妻子。

秦璐望着镜中的自己，忽然想不起来，上一次认认真真为自己打扮，是什么时候的事了。

她端起果盘，脚步轻缓地走向楼梯。

经过客厅时，苏文头也没抬："璐，给苏斌送水果？"

"嗯，这孩子整天闷在房间里，也不知道饿不饿。"她的声音温和得体，语调里带着恰到好处的母性关怀，"你茶凉了，我等会儿下来给你续上。"

苏文摆摆手："不用不用，你忙你的。"

秦璐微笑着应了一声，转身上了楼。

楼梯的木板在脚底发出轻微的吱呀声，每一步都踩得格外稳当。托盘端得很稳，脚步却比平时轻快了些——说来有些不好意思，这大概是她一天里最有盼头的时刻：儿子会放下手里的事，接过果盘，说一声"谢谢妈"。就这么一句，就够她高兴到睡前了。

走廊尽头的那扇门紧闭着，门缝里透出一线暖黄色的灯光。秦璐在门前停下脚步，静静站了两秒。里面传来轻微的动静，孩子在忙自己的事——她有点怕打扰他，可又实在想看看他。

终于，秦璐抬起右手，指节弯曲，轻轻扣了三下门板。

"苏斌，妈妈给你送水果来了。"

她的声音温柔，平稳，就像过去十几年里无数次喊他吃饭、喊他起床时一样。那双棕色的、温和的眼睛望着门板，盛着这个安静的家里没什么人留意过的、一点小小的期待。

房间里传来椅子挪动的声响。

脚步声近了。

门把手微微转动——
