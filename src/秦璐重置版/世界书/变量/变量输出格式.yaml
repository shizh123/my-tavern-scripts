---
变量输出格式:
  rule:
    - 你必须在下一次回复的末尾，一次性输出分析和更新指令（UpdateVariable）
    - 更新指令类似 JSON Patch（RFC 6902），是一个合法 JSON 数组，支持以下操作：
      - replace: 替换已有路径的值
      - delta: 对已有数值路径做增量更新
      - insert: 向对象或数组插入新项
      - remove
    - 不要修改下划线(_)开头的字段
    - 系统管理字段（堕落度/阶段/苏文位置/疑心值/念头进度/习惯/货币/道具等）不要修改，详见「变量更新规则」
    - 【AI 可更新字段白名单】以下是 AI 唯一被允许修改的字段，未列入的字段一律不得修改：
      - 世界（氛围显示）：时间、日期、地点、环境氛围——每轮根据剧情更新
      - 每轮可变：当前情绪、当前心理想法、当前位置——每轮都应主动更新
    - 字段更新指引：
      - 世界.时间: 当前剧情时间（如：清晨/上午/中午/下午/傍晚/深夜），按剧情推进
      - 世界.日期: 当前日期（如：2024/11/21），剧情跨天时更新
      - 世界.地点: 当前场景地点
      - 世界.环境氛围: 场景氛围（日常/暧昧/紧张/情色等）
      - {角色}状态.当前情绪: 根据本轮互动更新（如：平静/害羞/慌乱/期待/羞耻/动情）
      - {角色}状态.当前心理想法: 80-150字第一人称内心独白
      - {角色}状态.当前位置: 从以下位置中选择当前角色所在场景，若剧情在室外/特殊场景可自由填写新位置：
          客厅/餐厅/厨房/主卧/浴室/秦璐房间/苏梦房间/主角房间（居家常见位置）
          也可填写剧情所需的新位置（如：公园/商场/车内/酒店 等）
      - 苏梦状态仅当苏梦在场时更新
    - 念头类型判定：当系统快照提示需要判定念头类型时，为每个待判定念头写入类型：
      - 从 10 大类选一个：陪伴交流/情感依赖/肢体亲近/暧昧互动/亲密接触/身体开放/性行为/身份认同/绝对服从/家庭替代
      - 路径：{角色}状态.念头列表.{念头ID}.类型 ← replace
      - 只改"类型"，不要修改念头的内容
  format: |
    <UpdateVariable>
    <Analysis>(中文，100字以内)
    - 分析角色的情感心理变化
    - 分析依存度变化（若有亲密互动）
    - 判定待判定念头的类型（若有）
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/世界/时间", "value": "傍晚" },
      { "op": "replace", "path": "/秦璐状态/当前情绪", "value": "害羞" },
      { "op": "replace", "path": "/秦璐状态/当前心理想法", "value": "他刚才的眼神……不该这样的，我是他妈妈……可是为什么心跳这么快……" },
      { "op": "replace", "path": "/秦璐状态/当前位置", "value": "主角房间" },
      { "op": "replace", "path": "/秦璐状态/念头列表/念头_xxx/类型", "value": "肢体亲近" }
    ]
    </JSONPatch>
    </UpdateVariable>
