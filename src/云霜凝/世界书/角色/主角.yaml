---
"{{user}}":
  identity: 山村出身的凡人少年，圣阳之体的罕见体质持有者，被苗广以"收徒"名义带至寒霜门
  age: 十八九岁，初入修仙世界
  background:
    - 生于偏远山村，此前从未接触修仙界，见识有限但并不愚笨
    - 被苗广发现体质异常后，以收徒为由接来寒霜门
    - 以为自己终于走上修仙之路，得遇名师，满心期待
    - 实情是：苗广看中的是他的圣阳之体，作为救治云霜凝的手段之一；连苗广自己都将信将疑，能否有效尚属未知
    - {{user}}对此一无所知，只知道自己被安排陪伴师父之妻云霜凝左右

  key trait:
    - 凡人出身，初入修仙界，对宗门礼数、修行规矩一知半解，偶尔闹笑话但不失分寸
    - 性格踏实，不矫情，遇到不懂的事会直接问，不装作懂
    - 面对云霜凝这样的存在本能地有几分敬畏，但不至于失态
    - 有股乡野之气的直爽，说话直接，不擅绕弯子
    - 骨子里有一份好奇心，对修仙界和眼前这位睡着的掌门夫人都充满疑惑

  physical trait:
    - 身材壮实，肩宽背厚，带着山村少年特有的健硕体格
    - 面貌端正朴实，眼神干净直接
    - 圣阳之体的持有者，体内阳气天生浓郁，常人与其接近时会有一种莫名的暖意
    - 隐秘特征：肉棒约22cm，发育异于常人，从未被任何人知晓，他自己也只是以为是寻常

  special trait:
    脑内商店系统:
      说明: 踏入云霜凝卧房后，{{user}}神识中莫名浮现出一套道具兑换系统；来源不明，他自己也说不清楚，只能摸索着使用
      灵石来源: 治疗推进产生的自然结晶，不参与宗门货币流通，只有{{user}}可见可用
      用途: 购买辅助治疗的A~F类道具，使用后产生即时或持续效果
      隐蔽性: 系统对外完全不可见，任何人均无法感知其存在；道具激活后{{user}}从口袋中取出，在旁观者眼中只是普通物件

    圣阳之体:
      说明: 修仙界极罕见的特殊体质，体内阳气纯粹浓烈，与极阴之体相克相生
      治疗机理: 圣阳之体的阳气与云霜凝体内的地劫寒毒相互对冲，通过近距离或直接接触可缓解毒素蔓延，双修时效果最为显著
      副作用: {{user}}自身无修为护体，过度使用对自身也有一定消耗，但恢复较快
      苗广评估: "或有奇效，或毫无用处，眼下已无更稳妥的选择。"

  language style:
    - 对云霜凝称"师母"或"师娘"，语气恭敬但不刻意讨好
    - 对苗广称"师父"，言行上尽量守徒弟之礼，有时跟不上节奏会有一两秒的滞后
    - 对苗喧被刁难时不卑不亢，不服软也不多生事
    - 说话带有轻微乡音味，用词直白，偶有方言式的俗语

  relationship:
    云霜凝: 沉睡中的掌门夫人，师父之妻，{{user}}对她既有本能的敬畏，又有难以名状的悸动；神魂空间中两人可直接对话，这是他唯一见过"活的"她的地方
    苗广: 名义上的师父，带他离开山村的人；{{user}}心存感激，但偶尔隐约觉得师父说的话"不太对劲"，又说不清哪里不对
    苗喧: 师父之子，寒霜门少主；初期被他轻视，{{user}}不服气但不主动挑事，观察对方多于出击

  behavioral tendency:
    - 每天按苗广的安排在云霜凝卧房中陪护，实际上做什么、能做什么全靠自己摸索
    - 独处时会打开脑内商店反复研究，对各类道具既好奇又不确定该如何取舍
    - 面对沉睡的云霜凝时有时会说几句话，不管对方能不能听见
    - 被苗喧刁难后会默默记住，不当场发作，等待合适的时机
    - 夜深时偶尔会想：师父到底是真的收他为徒，还是有别的打算

  awareness:
    知道的:
      - 自己被以"收徒"名义带来寒霜门
      - 需要陪护在云霜凝身旁，苗广说这有助于她的治疗
      - 脑内商店的存在及其基本用法（来源不明，自己摸索发现的）
      - 云霜凝在神魂空间中意识清醒，现实中无法动弹
    不知道的:
      - 苗广的真实目的是利用其圣阳之体作为治疗手段，"收徒"只是名义
      - 云霜凝不知道他在治疗中扮演的真实角色
      - 他的体质对修仙界意味着什么，以及这种体质的稀有程度
      - 苗广对此事是否真的有把握，还是只是在赌一把
