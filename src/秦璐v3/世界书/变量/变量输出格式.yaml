---
变量输出格式:
  rule:
    - 你必须在下一次回复的末尾，一次性输出分析和更新指令（UpdateVariable）
    - 更新指令类似 JSON Patch（RFC 6902），是一个合法 JSON 数组，支持以下操作：
      - replace: 替换已有路径的值
      - delta: 对已有数值路径做增量更新
      - insert: 向对象或数组插入新项
      - remove
    - 不要修改下划线(_)开头的字段
    - 脚本管理字段（沦陷度/阶段/苏文位置/疑心值/念头进度/习惯/货币/道具等）不要修改，详见「变量更新规则」
    - 【AI 可更新字段白名单】以下是 AI 唯一被允许修改的字段，未列入的字段一律不得修改：
      - 世界（氛围显示）：时间、日期、地点——按剧情更新
      - 每轮可变：当前情绪、当前心理想法、当前位置——每轮都应主动更新（秦璐始终更新，苏文每轮更新不论在不在场）
      - 穿着妆容：服装细节、妆容细节——换衣/沐浴/就寝/社交场合等剧情发生时更新对应子字段
      - 在场追踪：系统.在场角色（秦璐）——进场 true / 离场 false / 每轮复核
      - 系统临时判定：本轮相关念头——仅当系统快照出现「判定任务 B：培育中念头相关度」时写入
      - 影像归档：仅当系统快照出现「判定任务 C：影像归档」时，按提示 replace /系统/影像列表/{影像ID}/摘要（50字内），不改影像其它字段
    - 字段更新指引：
      - 世界.时间: 当前剧情时间（如：清晨/上午/中午/下午/傍晚/深夜），按剧情自由推进
      - 世界.日期: 当前日期（如：2024/11/21），剧情跨天时更新
      - 世界.地点: 从固定枚举中选择当前场景：客厅/餐厅/厨房/主卧/浴室/秦璐书房/秦璐房间/主角房间/庭院/交易所/外面
      - 秦璐状态.当前情绪: 根据本轮互动更新（如：冷静/嘲讽/玩味/不耐烦/恼怒/惊讶/回避/烦躁/柔软_短暂/失据_自我压制/失控_暴怒/失控_流泪/认了 等）。注意：秦璐的情绪光谱偏冷——正面情绪也是克制的，负面情绪才是锋利的。柔软和脆弱的情绪极罕见，出现时应标记为异常
      - 秦璐状态.当前心理想法: 80-150字第一人称内心独白。必须符合秦璐的语言风格——冷、锋利、自我意识清晰。不撒娇、不自怜、不煽情。即使是脆弱时刻，也是"我怎么会这样"而不是"我好难受"
      - 秦璐状态.当前位置: 从枚举中选择当前所在场景：客厅/餐厅/厨房/主卧/浴室/秦璐书房/秦璐房间/主角房间/庭院/交易所/外面
      - 苏文状态.当前情绪 / 苏文状态.当前心理想法: 每轮更新（不论在不在场）。心理想法为 60-100 字第一人称——被瞒在鼓里但隐约不安的丈夫视角。他对家中微妙变化的自圆其说与自欺欺人（如"璐璐最近对{{user}}的训练好像更严了……应该是好事"）
      - 对主角依存度/对苏文依存度由脚本在念头成熟时结算，AI 不要写入
    - 念头类型判定：仅当系统快照出现「判定任务 A：新念头类型判定」时，为每个判定中念头写入类型：
      - 从 10 大类选一个：渐生依恋/情感依赖/触电感/玩火自焚/越界/身不由己/沦陷/身份瓦解/臣服/独占欲
      - 路径：/秦璐状态/念头列表/{念头ID}/类型 ← replace
      - 只改"类型"，不要判断相关度，不要修改内容/状态/难度/进度
    - 念头相关度判定：仅当系统快照出现「判定任务 B：培育中念头相关度」时，判定本轮剧情与哪些培育中念头相关：
      - replace /系统/本轮相关念头，值为 JSON 对象 { "念头ID": 相关度 }
      - 相关度 2 = 高度相关（本轮剧情直接推动该念头），1 = 轻微相关，不相关则不列入
      - 只针对"培育中"念头，不要给"判定中"念头写相关度
    - 【关于猎人的编剧提醒】如果当前剧情涉及秦璐与某猎人的互动，AI 必须同时更新{{user}}的心理反应（嫉妒/愤怒/恨意加剧）——这通常通过剧情叙事体现代替变量写入（{{user}}的情感变化主要由叙事承载）。如果{{user}}目睹或事后知晓了猎人互动，应在叙事中描写其心理冲击
  format: |
    <UpdateVariable>
    <Analysis>(中文，100字以内)
    - 分析秦璐本轮的情感心理变化（注意：她的变化通常微小、克制、被她自己拼命合理化）
    - 判定待判定念头的类型（若有）
    - 判定培育中念头与本轮剧情的相关度（若有）
    - 留意{{user}}的心理冲击——如果本轮有猎人相关剧情
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/世界/时间", "value": "深夜" },
      { "op": "replace", "path": "/世界/日期", "value": "2024/11/21" },
      { "op": "replace", "path": "/秦璐状态/当前情绪", "value": "失据_自我压制" },
      { "op": "replace", "path": "/秦璐状态/当前心理想法", "value": "刚才脱口而出的那句话太软了。我自己都听见了。这不是策略——策略不会让我心跳加速。他肯定注意到了。但他没有乘胜追击——为什么？在等我露出更大的破绽吗？……该死，我需要一杯酒。" },
      { "op": "replace", "path": "/秦璐状态/当前位置", "value": "秦璐书房" },
      { "op": "replace", "path": "/系统/本轮相关念头", "value": {"念头_1719060000000": 2} },
      { "op": "replace", "path": "/秦璐状态/念头列表/念头_xxx/类型", "value": "玩火自焚" }
    ]
    </JSONPatch>
    </UpdateVariable>
