---
变量更新规则:
  # ============================================================
  # 【强制规则】脚本管理字段——AI绝对不要修改（改了会被脚本回滚）
  # ============================================================
  强制只读字段:
    - /秦璐状态/堕落度 ← 脚本管理（念头成熟时结算）
    - /秦璐状态/当前阶段 ← 脚本管理（由堕落度派生）
    - /秦璐状态/阶段标题 ← 脚本管理（由阶段派生）
    - /苏梦状态/堕落度 ← 脚本管理
    - /苏梦状态/当前阶段 ← 脚本管理
    - /苏梦状态/阶段标题 ← 脚本管理
    - /苏文状态/当前状态 ← 脚本管理（楼层作息游标算出）
    - /苏文状态/当前位置 ← 脚本管理（楼层作息游标算出）
    - /苏文状态/对秦璐疑心值 ← 脚本管理
    - /苏文状态/对苏梦疑心值 ← 脚本管理
    - /秦璐状态/念头列表/*（类型字段除外，AI需判定写入） ← 脚本管理
    - /苏梦状态/念头列表/*（类型字段除外） ← 脚本管理
    - /秦璐状态/习惯列表 ← 脚本管理（变卖由界面操作）
    - /苏梦状态/习惯列表 ← 脚本管理
    - /系统/货币 ← 脚本管理（仅变卖习惯+100）
    - /系统/道具状态/* ← 脚本管理
    - /系统/念头植入日志 ← 脚本管理
    - 所有下划线(_)开头字段 ← 脚本内部状态

  # ============================================================
  # 当前角色（秦璐/苏梦二选一）
  # 驱动状态快照注入过滤：不在场的角色其念头/习惯/数值等数据整块跳过
  # AI 不需要主动改 当前角色 字段——它由界面切换，脚本锁定
  # ============================================================
  当前角色:
    type: enum (秦璐 | 苏梦)
    管理归属: 脚本管理（界面切换时锁定，AI 不要修改）
    说明: 状态快照只注入"当前角色"的数据；切到另一角色时脚本会刷新快照

  # ============================================================
  # 念头类型判定（AI 唯一需要写入脚本管理字段的场景）
  # ============================================================
  念头类型判定:
    说明: 当系统快照提示"请判定以下念头的类型"时，AI 必须为每个待判定念头写入类型
    路径格式: replace {角色}状态/念头列表/{念头ID}/类型
    可选类型: 陪伴交流/情感依赖/肢体亲近/暧昧互动/亲密接触/身体开放/性行为/身份认同/绝对服从/家庭替代
    注意: 只改"类型"字段，绝对不要修改念头的"内容/状态/难度/需要楼数/开发进度/植入楼层"等其它字段

  # ============================================================
  # 时间/日期 —— 仅氛围显示，AI 自由维护，脚本不参与计算
  # ============================================================
  时间日期:
    管理归属: AI 自由维护
    说明: 时间/日期只作氛围显示，脚本不算时间。AI 按剧情自由推进，写不准也无妨
    注意: 不要试图用时间/日期来推算"苏文该在哪""念头培育了多久"——这些由脚本按楼层独立管理
