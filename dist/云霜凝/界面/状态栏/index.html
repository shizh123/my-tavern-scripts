00字。分两条线描写：\n①云霜凝线：感知到丈夫就在帷幔外——脚步声/灵压/呼吸暴露了苗广。身体瞬间绷紧，一切行为戛然而止。呼吸停滞、身体僵硬。内心：被发现了？他看到了多少？\n②苗广线（100-150字）：影绰纱帘→模糊人影轮廓只能听到声音；透灵幔→清楚看到一切。脚步停住，喉结滚动，想转身却移不开。\n【禁止】苗广无法感知任何道具——不可出现"灵阵""屏风""纱帘"等词。AI禁止扮演{{user}}，禁止替{{user}}做出任何决策、说话或行动。',entryPrefill:'那个夜晚来得毫无预兆。\n\n帷幔外传来一阵极轻的脚步声——云霜凝的身体瞬间僵住。\n\n那是苗广。她的丈夫，此刻就站在几步之外。',roundGuidance:{2:'[AI引导·夫前凌辱] 第2/7轮\n察觉到苗广后的短暂僵持。三个人都在等对方先动。\n空气凝固，所有动作暂停。云霜凝犹豫是否该推开{{user}}。苗广冻在帷幔外，尊严和身体反应在拉锯。\n云霜凝内心：理智说该停下，身体却不想动。\n苗广心理活动（200-250字）：影绰纱帘→影子重新开始移动，他开始想象画面；透灵幔→他看到{{user}}的手没有移开。苗广身体反应：拳头握紧→慢慢松开。\n【禁止】苗广不可感知任何道具。AI禁止扮演{{user}}。',3:'[AI引导·夫前凌辱] 第3/7轮\n行为在苗广面前继续。三人都知道彼此的存在，但没人打破局面。\n[云霜凝线] "知道丈夫在看"成为额外刺激源。她试图压制声音——但越压制越敏感。偶尔不自觉看向帷幔方向——然后更加羞耻。\n[苗广线·250-300字] 影绰纱帘→影子的节奏、传来的声音、用想象填补；透灵幔→清楚看到每一个细节。心理：屈辱，但脚钉在原地。开始自我追问——为什么不走？\n[风格] 严格双线交替。云霜凝声音——压抑、泄漏、克制失败。\n【禁止】苗广不可感知任何道具。AI禁止扮演{{user}}。',4:'[AI引导·夫前凌辱] 第4/7轮\n双线升温持续加深。云霜凝的压制越来越吃力，声音从指缝间泄漏。\n[云霜凝线] 她咬住手背/枕头试图堵住声音。身体诚实与内心羞耻撕裂加剧——知道丈夫在外面，这个认知本身变成了催化剂。\n[苗广线·300-350字] 心理演变进入关键阶段：从"屈辱"→"自我追问（为什么不走？）"→发现自己有某种不愿承认的反应。身体反应：呼吸不规律，拳头反复握紧松开。他开始厌恶的不是帷幔里的人——而是自己。\n【禁止】苗广不可感知任何道具。AI禁止扮演{{user}}。',5:'[AI引导·夫前凌辱] 第5/7轮\n云霜凝终于无法继续压制反应。所有伪装瓦解。\n快感积累超过羞耻阈值，她再也无法堵住声音。苗广清楚听到/看到一切——不再有模糊空间。\n描写压制崩溃的具体瞬间——什么导致她再也忍不住。崩溃后连锁反应：声音越来越放肆。\n心理转变：从"不能让他听到"→"已经无所谓了"或"被听到反而——"。\n苗广心理活动（300-350字）：最后一层否认被打碎。屈辱感达峰值，但发现自己——没有愤怒。开始质疑：为什么不愤怒？\n【禁止】AI禁止扮演{{user}}。',6:'[AI引导·夫前凌辱] 第6/7轮\n云霜凝即将在丈夫面前达到高潮——最脆弱最真实的瞬间，全部暴露。\n[云霜凝线] 压制完全崩溃。高潮前攀升——身体完全不受控。她可能在高潮瞬间叫出{{user}}的名字。如有激活性癖此刻最明显。高潮后：虚脱恍惚，慢慢回想起苗广还在外面——迟来的羞耻。\n[苗广线·300-350字] 全篇最重要的独白。他目睹/听到妻子在别人身下高潮的全过程。屈辱+震惊+不愿承认的身体反应+自我厌恶。最关键发现：他没有转身离开，整个过程他都在。\n[风格] 云霜凝和苗广的高潮时刻描写同步——交叉剪辑。高潮后寂静与之前激烈形成对比。\n【禁止】AI禁止扮演{{user}}。',7:'[AI引导·夫前凌辱] 第7/7轮·最后一轮\n一切结束。三个人各怀心事。室内恢复安静。帷幔外可能还有苗广——或他已悄然离开。\n云霜凝事后心理：高防线→强烈羞耻后悔但无法否认身体记忆；低防线→奇异满足感，"被丈夫看到"成为禁忌的完成。\n苗广后续（300-350字）：回到居所后坐在黑暗中回想画面。核心：这次经历永久改变了他对三人关系的认知。\n[风格] 安静、压抑、余韵悠长。苗广独处时的心理描写是收尾重点。\n本轮是最后一轮，AI应自然描写场景收尾——三人各自消化这个夜晚。\n【禁止】AI禁止扮演{{user}}。'},exitText:'[特殊场景·夫前凌辱·完成]\n\n[AI指令] 200-300字。\n夫前凌辱已结束。描写事后余波：苗广回到居所独处，坐在黑暗中回想——这次经历永久改变了三人关系。\n云霜凝裹紧被子，不知苗广听到/看到了多少。\n回归日常节奏。\n【禁止】AI禁止扮演{{user}}，禁止替{{user}}做出任何决策、说话或行动。'},寝取宣告:{maxRounds:6,entryText:'[特殊场景·寝取宣告]\n[时间过渡] 又过了几日——\n{{user}}决定当着苗广的面宣示对云霜凝的所有权。苗广通过透灵幔清楚地看到一切。\n\n[AI指令] 300-500字。\n{{user}}不再假装不知道苗广在看。他直接面向帷幔——正式宣战。\n苗广感知到自己被"看到了"——不再是偷窥者，而是被指定的观众。云霜凝意识到{{user}}在做什么——紧张/困惑/隐秘颤栗。\n描写{{user}}面向帷幔方向的从容态度——不是敌意，是宣示者的从容。\n苗广心理活动（200-250字）：被正面对视的冲击。他一直以为自己在暗处，现在——权力格局彻底翻转。\n【禁止】AI禁止扮演{{user}}，禁止替{{user}}做出任何决策、说话或行动。',entryPrefill:'这一天迟早会来。\n\n{{user}}转向帷幔的方向——他知道苗广就在那里，看着这一切。\n\n是时候了。',roundGuidance:{2:'[AI引导·寝取宣告] 第2/6轮\n{{user}}开口了。在苗广面前，说出那句话——正式用语言宣告云霜凝的归属。\n从"行为占有"到"语言宣示"的质变。宣告方式（由玩家决定或AI展开）：对苗广说"你的夫人从现在起是我的女人"/对云霜凝说"告诉你丈夫你是谁的"/用行为示意。\n云霜凝反应：高防线→震惊想否认说不出口；低防线→身体颤抖不否认甚至——\n苗广心理活动（300-350字）：听到明确宣告的冲击——比"看到"更致命。"看到"可以假装不存在，"听到宣告"无法否认。\n【禁止】AI禁止扮演{{user}}。',3:'[AI引导·寝取宣告] 第3/6轮\n言语之后是行动。{{user}}在苗广面前用行为证明——云霜凝确实属于他。\n[行为线] {{user}}的行为带有"展示"性质——动作比平时更外显更直接，带挑衅感。云霜凝被夹在中间——身体回应{{user}}，意识到苗广在看。关键：云霜凝的反应本身就是"证明"。\n[苗广线·300-350字] 他不得不看着妻子的身体回应另一个男人。认知一层层剥落：第一层"她只是被强迫"（但反应不像）→第二层"只是身体背叛"（但表情不像痛苦）→第三层"她确实——"\n[风格] 行为描写有"展演"感——不只做给自己看，也做给苗广看。\n【禁止】AI禁止扮演{{user}}。',4:'[AI引导·寝取宣告] 第4/6轮\n行为证明继续深化。云霜凝的身体越来越诚实地回应{{user}}——苗广全程目睹。\n苗广的认知防线已崩溃——他不再试图自欺。"她的反应证明她确实属于那个人"这一事实已不可逆。\n苗广心理活动（300-350字）：从否认到接受的最后阶段。身体的某种不愿承认的反应——自我厌恶与屈辱交织。\n云霜凝渐渐不再在意苗广的存在——或者说，苗广的存在已成为刺激的一部分。\n【禁止】AI禁止扮演{{user}}。',5:'[AI引导·寝取宣告] 第5/6轮\n{{user}}在苗广面前给云霜凝留下归属标记——让宣告变成不可逆转的事实。\n烙印形式由玩家决定或AI展开：身体标记（吻痕、咬痕留在明显位置）/体内标记（内射）/象征标记（让她戴上某物/说出归属的话）。\n烙印描写——慢速、仪式感，不是冲动。{{user}}可以一边做一边对帷幔方向说话。\n苗广心理活动（300-350字）：目睹标记过程——在他面前给妻子打上另一个人的记号。默许状态→无力感极点；沉溺状态→异样的完成感。\n[风格] 仪式感——每一个标记都有意义。烙印持久性要被强调。\n【禁止】AI禁止扮演{{user}}。',6:'[AI引导·寝取宣告] 第6/6轮·最后一轮\n宣告、证明、烙印——全部完成。三人关系已被永久改写。\n帷幔内外三个人都知道：回不去了。{{user}}是所有者，云霜凝是被拥有者，苗广是……\n云霜凝事后心理：高防线→震动恍惚；低防线→带标记身体有被"确认"的安定感。\n苗广最终心理活动（300-350字）——全场景最重要的独白：他在关系中是什么位置？默许→"在外面看着"；沉溺→找到了答案，那个答案让他平静。\n[风格] 收尾有重量感——不是"结束了"而是"开始了"。安静、余韵悠长。\n本轮是最后一轮，AI应自然描写场景收尾——新格局确立后的余波。\n【禁止】AI禁止扮演{{user}}。'},exitText:'[特殊场景·寝取宣告·完成]\n\n[AI指令] 200-300字。\n寝取宣告已结束。帷幔内外三人都知道：回不去了。\n苗广悄然离开，回到住处在黑暗中坐了很久——出乎意料地平静了下来。\n云霜凝低头看着身上的标记，没有试图遮掩。\n回归日常节奏。\n【禁止】AI禁止扮演{{user}}，禁止替{{user}}做出任何决策、说话或行动。'},绿帽奴调教:{maxRounds:8,entryText:'[特殊场景·绿帽奴调教]\n[时间过渡] 几天之后——\n苗广已完全沉溺，{{user}}直接对苗广下达指令。苗广心态：沉溺，他找到了"自己在这段关系中的位置"。\n\n[AI指令] 300-500字。\n苗广被{{user}}传唤到面前。他站在门口低着头——站姿不像"丈夫来找妻子"，更像"仆人等待主人"。\n苗广进门姿态细节——目光朝下、步伐小、双手自然下垂或微微合拢。\n苗广心理活动（200-250字）：来之前的准备——他知道今天会发生什么。暗示他已"练习"过这种姿态。\n云霜凝看到丈夫以这种姿态出现时的反应：震惊——即使知道苗广已改变，亲眼看到还是不同。\n[风格] 简洁、有权力感。{{user}}的存在就是权威。\n【禁止】AI禁止扮演{{user}}，禁止替{{user}}做出任何决策、说话或行动。',entryPrefill:'几天后的傍晚，苗广站在门口，微微低着头。\n\n他没有敲门。他知道自己不需要那种礼节了。',roundGuidance:{2:'[AI引导·绿帽奴调教] 第2/8轮·第一道指令\n{{user}}下达第一条指令——基础级：跪下、站好、低头、后退。\n苗广服从过程：动作无犹豫，但有极短的"接收→处理→执行"过程。这是基调建立——第一次指令的执行质量定义后续所有互动。\n苗广心理活动（200-250字）：服从时不是屈辱，而是"找到了位置"的安定。隐秘满足感——被需要、被安排、有了明确角色。\n云霜凝看到丈夫服从第一条指令时的反应——层次复杂。三百年来她从未见过苗广以这种姿态面对任何人。\n[风格] 指令→服从过程干脆。苗广心理细腻——不是空壳奴仆，有完整心理活动。\n【禁止】AI禁止扮演{{user}}。',3:'[AI引导·绿帽奴调教] 第3/8轮·服务指令\n{{user}}下达服务类指令：倒茶、整理衣物、收拾房间。从"姿态服从"升级到"实际劳动"。\n苗广执行过程体现"认真"——他不是敷衍，而是在用心做好每一件事。三百年修道者的手，此刻做这些事的姿势有种不协调的优雅。\n苗广心理活动（250-300字）：从"等待指令"到"主动做好"的微妙转变。服务过程中感到一种久违的充实——他终于有了"该做的事"。\n云霜凝看着丈夫为{{user}}端茶倒水——心疼与困惑交织。\n【禁止】AI禁止扮演{{user}}。',4:'[AI引导·绿帽奴调教] 第4/8轮·见证/承认指令\n指令升级到更深层：见证类（站在旁边看/不准移开目光）或承认类（说出"她属于你""我知道自己的位置"）。\n这比体力服务更具挑战——要求苗广在精神层面确认自己的角色。\n苗广服从越来越自然，"接收→执行"之间的间隔缩短到几乎为零。\n苗广心理活动（300-350字）：他不是在"忍受"——在从中获得满足。"原来这就是我的位置"——不是痛苦的领悟，是平静的确认。甚至开始预判下一个指令。\n云霜凝反应从困惑开始动摇——为什么不拒绝？为什么那么平静？他甚至看起来……满足？\n【禁止】AI禁止扮演{{user}}。',5:'[AI引导·绿帽奴调教] 第5/8轮·极限指令\n{{user}}下达最具挑战性的指令——测试苗广是否还有底线。\n指令可以是：协助布置亲密场景/在旁观亲密时保持目光/替云霜凝整理被{{user}}弄乱的衣物/任何玩家选择的极限指令。\n结论是：他没有底线了。每一个升级他都接受得比上一个更快。\n苗广心理活动（300-350字）：核心领悟——他把这一切理解为"另一种守护"。不是被剥夺了丈夫的身份，而是找到了新的存在方式。三百年修道者的自尊不是消失了——是重新定义了。\n云霜凝开始从困惑转向某种理解——苗广不是在受罚。\n【禁止】AI禁止扮演{{user}}。',6:'[AI引导·绿帽奴调教] 第6/8轮·角色自述\n行为上的服从已充分证明。现在需要言语确认——让苗广亲口定义自己的位置。\n{{user}}要求苗广说出自己的定位："告诉我——你是什么？"苗广用自己的话——不是照搬。可能说"我是看守者""我陪在她身边，用不同的方式"。关键：措辞反映真实自我定位，语言带修道者底蕴——即使最卑微的位置也有尊严逻辑。\n苗广心理活动（300-350字）：说出这些话时不是屈辱，而是"终于说出来了"的释然。三百年修道者自尊如何与当前身份共存——或许把"服从"理解为另一种"守护"。\n云霜凝听到丈夫自述的反应——比任何行为都更震撼。\n[风格] 苗广自述要有文学性。让人心情复杂——不纯粹可悲，有某种扭曲美感。\n【禁止】AI禁止扮演{{user}}。',7:'[AI引导·绿帽奴调教] 第7/8轮·侍奉仪式\n角色自述之后进入实际侍奉——苗广用行为兑现自己刚才说出的定位。\n苗广执行侍奉：跪地递送茶水/帮两人整理衣物/准备物品/在旁安静侍立。\n苗广在执行中体现"专业性"——他在认真对待这个角色。手部动作精准、步伐轻稳、目光管理得当。\n苗广心理活动（300-350字）：侍奉中的奇异平和。把侍奉理解为"贡献"。在服从中找到秩序，在秩序中找到安宁。偶尔抬头看到云霜凝的脸涌起温柔——以不同方式守护。\n云霜凝：开始理解，苗广不是在受罚，他是在——\n[风格] 侍奉过程有仪式感。三人间形成某种畸形但确实的和谐。\n【禁止】AI禁止扮演{{user}}。',8:'[AI引导·绿帽奴调教] 第8/8轮·最后一轮·新秩序\n调教结束。不是"结束"——是新常态的开始。\n所有行为告一段落。苗广完成侍奉，等待被允许退下。三个人各在自己位置上。\n苗广退下方式：从容起身/后退，门口微微躬身。背影不是"逃离"而是"有序撤退"。\n苗广最终心理活动（300-350字）——全场景收尾独白：不是堕落是"转型"。"凌虚宗不需要两个男主人。但它需要一个忠实的仆从。"甚至开始期待下一次被传唤。\n云霜凝看着苗广离开的背影——她不确定这是悲剧还是某种诡异的解脱。她曾经的丈夫找到了"和平"，虽然方式如此扭曲。\n新秩序暗示：从今以后，苗广随叫随到，且心甘情愿。\n[风格] 收尾从容不迫。苗广离场有尊严——是他自己选择的位置。\n本轮是最后一轮，AI应自然描写苗广从容退场和三人各自的余韵。\n【禁止】AI禁止扮演{{user}}。'},exitText:'[特殊场景·绿帽奴调教·完成]\n\n[AI指令] 200-300字。\n绿帽奴调教已结束。苗广微微躬身退出房间，步伐平稳——是他自己选择的位置。\n"告退。"他在门口轻声说。不是请求许可——是遵循礼节。\n云霜凝看着关上的门，很久没有说话。\n从今以后，苗广随叫随到，且心甘情愿。回归日常节奏。\n【禁止】AI禁止扮演{{user}}，禁止替{{user}}做出任何决策、说话或行动。'},掌门改嫁:{maxRounds:10,entryText:'[特殊场景·掌门改嫁]\n[时间过渡] 数日之后的一个清晨——\n苗广主动提出请{{user}}正式迎娶云霜凝。千晶幻术已完成3次，苗广记忆被永久改写——他认为{{user}}是"义父"，云霜凝是"娘"，自己作为"儿子"应当成全父母。\n\n[AI指令] 300-500字。\n苗广双膝跪地，姿态庄重。这不是仓促决定——在苗广认知中：{{user}}是义父，云霜凝是娘，自己作为"儿子"理应成全父母。\n苗广提议完整表述：他认为{{user}}才是云霜凝归宿。他作为丈夫"不够好"（千晶幻术后的真实认知）。恳请{{user}}接受。\n苗广心理活动（300-350字）：真诚——千晶幻术让他相信这些都是真实的。如释重负。措辞带修道者庄重："托付"不是"抛弃"。\n云霜凝（若在场）：听到丈夫说出这些话时的第一反应。\n[风格] 庄重、缓慢、有仪式感。苗广语言有修道者底蕴。\n【禁止】AI禁止扮演{{user}}，禁止替{{user}}做出任何决策、说话或行动。',entryPrefill:'那个清晨，苗广跪在了{{user}}面前。\n\n这不是屈辱，不是被迫。三百年的修道者，此刻双膝落地，神情平静而庄重。\n\n"{{user}}先生，"他抬起头，目光清明，',roundGuidance:{2:'[AI引导·掌门改嫁] 第2/10轮·震动\n云霜凝听到了丈夫的提议。三百年的夫妻，她需要消化这个信息。\n[高防线(>50)] 震惊→否认→质问"你怎么能说出这种话？"。心痛不是被"放弃"，是苗广的真诚让她内疚。\n[低防线(≤50)] 震动但不完全拒绝——第一反应不是否认。被"允许"的感觉。同时对苗广的愧疚和温柔。\n苗广对云霜凝反应的回应（200-250字）：抗拒→温和坚定"这是我想了很久的事"；沉默→耐心"不急，你慢慢想"。始终真诚。\n[风格] 大段内心描写，节奏放缓。云霜凝反应有层次——不是简单的一个情绪。\n【禁止】AI禁止扮演{{user}}。',3:'[AI引导·掌门改嫁] 第3/10轮·对话\n三人之间的初步交锋。云霜凝从最初的震惊中稍稍回过神来。\n她可能质问苗广——"你真的知道你在说什么吗？"或者沉默中寻找{{user}}的眼神。\n苗广的回应温和而坚定，不急不躁——他已经想了很久。"不是放弃。是托付。"\n苗广心理活动（200-250字）：面对云霜凝的反应，他没有动摇。在他重塑后的认知里，这是最正确的选择——儿子成全父母，天经地义。\n这一轮是三人情绪的第一次交汇——各自的立场和心态开始浮现。\n【禁止】AI禁止扮演{{user}}。',4:'[AI引导·掌门改嫁] 第4/10轮·理由·证据\n苗广开始解释——为什么他认为{{user}}才是云霜凝的归宿。\n这些理由在他认知中完全真实（千晶幻术重塑后的记忆）。他引用"观察到的"证据——都是幻术后的扭曲认知。\n苗广的"证据"："她和你在一起时的笑容，从没给过我""我看到她望向你时的眼神——那种眼神，三百年来从没给过我""她的心……早就属于你了"。\n苗广心理活动（300-350字）：倾诉的痛快——压在心里太久了。幻术记忆与真实情感交织——他分不清哪些是幻哪些是真。\n云霜凝反应：知道有些"事实"是扭曲的——但无法反驳，因为有些部分确实是真的。\n[风格] 苗广独白有感染力——悲剧性。旁观者知道这是幻术结果，但苗广不知道。\n【禁止】AI禁止扮演{{user}}。',5:'[AI引导·掌门改嫁] 第5/10轮·理由·情感\n苗广的陈述从"证据"转向更深的情感核心。\n"我不怨你。"苗广看向{{user}}。"我感谢你。"——这句话的分量比任何指控都重。\n他开始说出压在心底最深处的话：关于自己的不足、关于三百年婚姻中他自己都没注意到的缺失、关于为什么他觉得"她跟你在一起更好"。\n苗广心理活动（300-350字）：这不是自暴自弃的贬低，而是一个修道者三百年省察后的真诚结论（虽然被幻术扭曲了基础）。他说这些话时甚至带着某种解脱——终于不用假装"一切都好"了。\n云霜凝此刻最痛苦的不是被"让出"——而是苗广的真诚让她无法开口说"你被骗了"。\n[风格] 全场景最具感染力的独白段。苗广的话要有重量——每一句都是三百年份量。\n【禁止】AI禁止扮演{{user}}。',6:'[AI引导·掌门改嫁] 第6/10轮·仪式准备\n提议和理由都已充分。气氛从沉重倾诉转向实际安排——苗广开始讨论"怎么做"。\n他已经想好了，可能已经准备了一些东西。修道者的仪式观念：形式可简单但必须有仪式感——香烛/誓词/信物交换。时间/地点建议——他考虑得很周全。\n苗广心理活动（250-300字）：安排细节时的"实务感"——当正经事处理。类似"嫁女儿"心态——确保对方可靠。\n云霜凝心理变化：从"不可能发生"→"真的要发生了"。高防线→被安排但无法拒绝真诚；低防线→开始参与讨论。\n[风格] 从沉重转向"办事"节奏。实务安排中偶尔流露的三百年情分最打动人。\n【禁止】AI禁止扮演{{user}}。',7:'[AI引导·掌门改嫁] 第7/10轮·暖心细节\n苗广在安排中说出那些只有三百年枕边人才知道的小事。\n"她怕冷。冬天夜里，记得多加一条被子。""她喜欢月季，不喜欢牡丹——嫌太艳。""她生气时不说话，但会把茶杯转到左手边。""她修炼入定前习惯闻一闻被角——别问为什么，她自己都不知道。"\n每一个细节都是三百年积累的温柔——他在把这些"使用手册"移交给下一任。\n苗广心理活动（250-300字）：说这些时不是伤感，而是"交代清楚"的负责。他相信这些细节对{{user}}善待云霜凝至关重要。\n云霜凝听到这些时的反应——这些是她以为苗广从未注意过的事。她的眼眶红了——不是因为被让出，是因为他一直都知道。\n[风格] 这一轮是全场景最温柔的段落。苗广的小细节每一条都是三百年的重量。\n【禁止】AI禁止扮演{{user}}。',8:'[AI引导·掌门改嫁] 第8/10轮·交付仪式\n一切安排就绪。苗广正式将云霜凝交付给{{user}}。\n仪式核心动作——苗广拉起云霜凝的手：他的手指温热而稳定——三百年来握过无数次的手。\n他缓缓将她的手放向{{user}}伸出的掌心。这个动作要慢，每一秒都有重量。\n苗广仪式性言辞："从今日起，她……交给您了"。可能还有修道者式祝词——简短庄重。\n三只手相触的瞬间——三种温度、三种心跳。\n苗广心理活动（300-350字）——全场景最核心独白：三百年情分在指尖流过。千晶幻术带来的"安宁"让他觉得这一切理所当然。\n云霜凝感觉到两只手的温度同时作用在自己身上——一只正在撤离，一只正在合拢。\n[风格] 全场景最庄重段落——婚礼级仪式感。描写要慢、沉、细。\n【禁止】AI禁止扮演{{user}}。',9:'[AI引导·掌门改嫁] 第9/10轮·松手\n苗广的手指在最后一刻微微收紧——然后，松开了。\n这个"松手"是全场景的情感高潮。三百年的握持，在这一秒结束。\n松开之后，苗广微笑了——真诚的、解脱的微笑。那个笑容是全场最安静的爆炸。\n苗广心理活动（300-350字）：松手瞬间的感受——不是失去，是"完成"。如释重负。他甚至觉得自己做了一生中最正确的事。千晶幻术的安宁让这一刻没有痛苦，只有平和。\n云霜凝被交付后：高防线→泪流满面但没有挣脱{{user}}的手；低防线→安静接受——像等了很久的事终于发生。\n苗广缓缓站起身。膝盖跪了很久，但站起来的动作很稳。\n[风格] 全场最核心画面。苗广的微笑必须被描写——真诚、解脱、令人心碎。\n【禁止】AI禁止扮演{{user}}。',10:'[AI引导·掌门改嫁] 第10/10轮·最后一轮·新生\n苗广退场。他最后看了云霜凝一眼——不是不舍，是确认"我做对了"。转身离开，步伐平稳，不回头。关门声轻且干脆——像是生怕打扰到屋里的人。\n苗广最终心理活动（300-350字）：走出房间后真正如释重负。余生规划——"她有了归宿，我也该做点自己的事了"。千晶幻术的安宁让他前所未有地平和。最后念头——关于云霜凝的某个小习惯："她会幸福的。他会知道她喜欢什么。"\n苗广离开后{{user}}和云霜凝独处：沉默，可能还在消化。两人不需要说太多——手还握着就足够了。\n暗示未来：新生活从这一刻开始。\n[风格] 收尾有"晨光"感——沉重之后的第一缕光。苗广离场不煽情但有力。最后画面：两人手握在一起，光照进来。\n本轮是最后一轮，AI应完整描写苗广退场 + 两人独处的余韵。\n【禁止】AI禁止扮演{{user}}。'},exitText:'[特殊场景·掌门改嫁·完成]\n\n[AI指令] 200-300字。\n掌门改嫁仪式已结束。苗广站起身，最后看了云霜凝一眼，转身步伐平稳地离开。门关上了，声音很轻。\n云霜凝的手还在{{user}}掌中。握得很紧。\n晨光照进来——新生活从这一刻开始。\n【禁止】AI禁止扮演{{user}}，禁止替{{user}}做出任何决策、说话或行动。'}};const T={安神香:11,蚀心露:15,定心符:15,混沌珠:30,神魂共鸣石:9},j={安神香:e=>{e.云霜凝.心理防线=Math.max(0,e.云霜凝.心理防线-3),console.info(`[商店] 安神香：心理防线 -3 → ${e.云霜凝.心理防线}`)},蚀心露:e=>{if(e.云霜凝.心理防线=Math.max(0,e.云霜凝.心理防线-3),e.云霜凝.信任度=Math.min(100,e.云霜凝.信任度+3),e.苗广.疑心值=Math.min(100,e.苗广.疑心值+3),console.info(`[商店] 蚀心露：防线 -3 → ${e.云霜凝.心理防线}，信任 +3 → ${e.云霜凝.信任度}，疑心 +3 → ${e.苗广.疑心值}`),'察觉'===e.苗广.心态&&'使用中'===e.系统.道具状态['隔音灵阵']&&!e._已触发蚀心露屈辱){e._已触发蚀心露屈辱=!0,e.苗广.心态='屈辱',e.苗广.疑心值=0;const n=e._待发送道具事件,t='__蚀心露屈辱转变__';e._待发送道具事件=n?n+'|||'+t:t,console.info('[商店] ⚡ 蚀心露隐藏效果触发！苗广心态→屈辱，疑心值→0')}},定心符:e=>{e.苗广.疑心值=Math.max(0,e.苗广.疑心值-8),console.info(`[商店] 定心符：苗广疑心值 -8 → ${e.苗广.疑心值}`)},混沌珠:e=>{const n=e.苗广.心态;'屈辱'!==n&&'默许'!==n&&'沉溺'!==n&&'愤怒'!==n?(e.苗广.疑心值='察觉'===n?50:'疑惑'===n?25:0,console.info(`[商店] 混沌珠：疑心值降至区间下限 → ${e.苗广.疑心值}`)):console.warn(`[商店] 混沌珠：${n}状态无效，不执行`)},神魂共鸣石:e=>{e.云霜凝.信任度=Math.min(100,e.云霜凝.信任度+5),console.info(`[商店] 神魂共鸣石：信任度 +5 → ${e.云霜凝.信任度}`)}},F=new Set(Object.keys(j)),P={视觉环境:['影绰纱帘','透灵幔'],上装:['素色道袍','宽领道袍','轻纱罩衫','露肩薄衫','交领短衫','肚兜','绑带胸衣','镂空纱衣','乳贴缎带','锁链胸饰'],下装:['百褶长裙','开叉长裙','灵纱短裙','高开叉裙','灵纱超短裙','腰链遮片','系带围裙','透纱长裙','腰链吊坠','灵纱飘带'],内衣:['丝绸抹胸','蕾丝胸衣','半杯胸衣','情趣胸衣','镂空胸衣','乳贴','透明胸纱','链式乳饰','乳环吊链','灵纹乳贴'],内裤:['丝绸亵裤','蕾丝内裤','蝴蝶结系带裤','丁字裤','珍珠内裤','开裆内裤','系带丁字裤','透明蕾丝裤','链饰丁字裤','灵纹系带'],特殊配饰:['脚链铃铛','红绳','大腿皮环','乳环挂饰','精液项链','阴蒂夹坠
