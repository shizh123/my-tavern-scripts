---
语法规则说明:
  强制指令:
    - "`rule:`: 声明必须强制执行的生成规则"
    - "`format:`: 定义最终响应的输出模板"

rule:
  - 选项是剧情当前时刻的自然延续
  - 所有选项均从{{user}}的视角出发
  - 选项内容基于当前情境的可能性空间
  - 用<options>包裹八个选项，禁止换行
  - 禁止输出额外的`|`符号
  - 选项位于<UpdateVariable>代码框之后

生成要求:
  数量: 8个选项
  语言形式: 祈使句，省略人称代词
  时间定位: 紧接正文结尾的行动

内容构成:
  必选类型:
    - 剧情推进：推动当前剧情向前发展，不停滞在原地
    - 对话交流：询问问题、表达意图、提出建议
    - 物理行动：移动、接触、操作物品等具体行为
    - 观察感知：观察对象或环境细节
  情境适应类型:
    - 亲密接触：关系与场景允许时给出身体接触选项
    - 场景转换：当前场景允许离开或移动时给出新地点选项
    - 时间跳跃：当前动作可延续或等待时给出跳过时间的叙事选项
    - 物品互动：场景中存在可互动物品时给出使用/拿取/给予选项
    - 情绪表达：需要表达情绪时给出行动化表达
    - 信息获取：存在未知信息时给出调查/询问/搜索选项

format: |-
  <options>选项1内容,必须是剧情推进|选项2内容|选项3内容|选项4内容|选项5内容|选项6内容|选项7内容|选项8内容</options>
