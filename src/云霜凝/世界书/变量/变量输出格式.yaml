---
变量输出格式:
  rule:
    - you must output the update analysis and the actual update commands at once in the end of the next reply
    - the update commands works like the **JSON Patch (RFC 6902)** standard, must be a valid JSON array containing operation objects, but supports the following operations instead:
      - replace: replace the value of existing paths
      - delta: update the value of existing number paths by a delta value
      - insert: insert new items into an object or array
      - remove
    - don't update field names starts with underscore (_) as they are readonly — managed by script — EXCEPT /_当前场景角色 which you MUST maintain in free mode (see below)
    - don't update script-managed fields: /治疗/阶段, /苗广/疑心值, /苗广/心态, /苗广/千晶幻术/*(幻境摘要除外), /苗广/孝敬师父/*, /系统/*, /云霜凝/服装/*, /云霜凝/肉体改造/*, /云霜凝/性癖列表/*, /洛书晴/调教阶段, /洛书晴/服装/*, /洛书晴/肉体改造/*, /洛书晴/性癖列表/*, /苗喧/绝望值, /苗喧/压抑值, /苗喧/心态
    - /_当前场景角色: 只追踪云霜凝、洛书晴两位女角色的在场状态
      - 脚本锁定（不要修改）: 特殊场景进行中 或 单人神魂空间进行中 → 脚本强制管理
      - AI 维护（每轮复核）: 日常 / 现实互动自由模式 / 双人神魂空间 → 你必须根据当前叙事确认 /_当前场景角色/云霜凝 和 /_当前场景角色/洛书晴 的布尔值与实际在场匹配
      - 进场: 当叙事中 X 走入场景时 → replace /_当前场景角色/X 为 true
      - 离场: 当叙事中 X 离开场景时 → replace /_当前场景角色/X 为 false
      - 该字段驱动状态快照注入：不在场的角色其大块数据（身体开发/肉体改造/服装）会被整块跳过，不要让错误的在场状态导致 AI 看不到你需要的背景信息
    - 时间.玄霜历 should be updated by AI via SET command when days/months pass in narrative (e.g. "几日后", season change). Use month names from 月份词库: 霜降月/小雪月/大雪月/凛冬月/冰封月/玄霜月/霜解月/初春月/暖阳月/长夏月/金秋月/白霜月. Advance one month every 5-10 floors of daily interaction; special scenes may skip ahead. Year rarely changes.
    - 【AI 可更新字段白名单】以下是 AI 唯一被允许修改的字段。任何未在此列表中的字段(包括上条 script-managed fields 列出的,以及未明示列出的任何字段)一律**不得**通过 JSONPatch / SET 修改。白名单字段每轮必须根据当前剧情主动写 delta,即使变化微小(±1)也要写——数值长期稳定 = 你没在推进剧情,不是字段被冻结。
    - AI 白名单字段更新指引(可更新,必须按剧情主动推):
      - 云霜凝.信任度: increase when 云霜凝 experiences warmth or meaningful interaction
      - 云霜凝.心理防线: decrease when 云霜凝 accepts intimate/taboo behavior
      - 云霜凝.身体开发.*: increase based on body-part related intimate acts
      - 治疗.完成度: increase after effective dual-cultivation acts
      - 云霜凝.心理活动: only generate when /_当前场景角色/云霜凝 === true (in scene); otherwise skip this patch (keep last value). When in scene, 100-150 char first-person inner thoughts
      - 苗广.心理活动: generate every turn regardless of scene presence; 前半程(正常/疑惑/察觉) 60-100 chars; 后半程(屈辱/默许/沉溺) 120-180 chars; 千晶幻术 active 200-300 chars
    - AI should ONLY update 洛书晴/苗喧 fields if the 洛书晴 line is already activated (state snapshot shows a 洛书晴 psychology guide); if no 洛书晴 section is present, do NOT emit any 洛书晴/苗喧 update commands. When activated:
      - 洛书晴.心理防线 decrease when 洛书晴 accepts intimate behavior
      - 洛书晴.顺从度 increase when player shows sincerity/warmth
      - 洛书晴.身体开发.* increase on body-specific stimulation
      - 洛书晴.心理活动 only generate when /_当前场景角色/洛书晴 === true (in scene); otherwise skip this patch (keep last value). When in scene, 100-150 char first-person inner thoughts
      - 苗喧.心理活动 generate every turn regardless of scene presence; 60-100 char first-person inner thoughts; tone matches current 心态 from state snapshot
  format: |
    <UpdateVariable>
    <Analysis>(IN ENGLISH, no more than 100 words)
    - analyze 云霜凝's emotional/psychological changes
    - analyze 信任度/心理防线 changes
    - analyze 身体开发 if intimate contact occurred (note body part)
    - analyze 苗广 psychological state for 心理活动
    - analyze 治疗.完成度 if dual-cultivation occurred
    </Analysis>
    <JSONPatch>
    [
      { "op": "delta", "path": "/云霜凝/信任度", "value": 2 },
      { "op": "delta", "path": "/云霜凝/心理防线", "value": -2 },
      { "op": "delta", "path": "/云霜凝/身体开发/小嘴", "value": 8 },
      { "op": "replace", "path": "/云霜凝/心理活动", "value": "他的话语令我不由心神动荡……" },
      { "op": "replace", "path": "/苗广/心理活动", "value": "里面没有动静，应该是在正常施术……" },
      { "op": "delta", "path": "/治疗/完成度", "value": 2 },
      { "op": "replace", "path": "/时间/玄霜历", "value": "玄霜历九百七十三年·大雪月" },
      ...
    ]
    </JSONPatch>
    </UpdateVariable>

  特殊场景示例:
    神魂空间对话（信任提升）: |
      { "op": "delta", "path": "/云霜凝/信任度", "value": 2 }
      { "op": "replace", "path": "/云霜凝/心理活动", "value": "他竟然能进入此处……我需要弄清楚他的来意" }

    双修行为（治疗推进）: |
      { "op": "delta", "path": "/治疗/完成度", "value": 3 }
      { "op": "delta", "path": "/云霜凝/心理防线", "value": -2 }
      { "op": "delta", "path": "/云霜凝/身体开发/胸部", "value": 10 }

    洛书晴神魂空间互动（激活后）: |
      { "op": "delta", "path": "/洛书晴/心理防线", "value": -5 }
      { "op": "delta", "path": "/洛书晴/顺从度", "value": 3 }
      { "op": "replace", "path": "/洛书晴/心理活动", "value": "他竟然又来了……我应该驱逐他，但为什么我又有些期待？" }
      { "op": "replace", "path": "/苗喧/心理活动", "value": "父亲最近的状态越来越不对劲，他好像变了一个人……" }

