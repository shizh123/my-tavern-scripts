---
念头植入系统:
  核心机制: |-
    {{user}}拥有向他人潜意识植入念头的特殊能力。每个念头都会在目标的潜意识中培育，逐渐影响她们的思维和行为。

    【简化机制】：
    - 念头植入100%成功，无骰子判定
    - 念头 → 习惯 → 影响决策
    - 习惯数量越多，影响角色决策的能力越大

  植入流程: |-
    1. {{user}}在剧情中向目标暗示、引导某个想法或行为
    2. AI判断暗示是否成功，若成功则用MVU命令将念头添加到培育区
    3. 念头在培育区中逐渐开发，累积足够时间后成熟为习惯
    4. 习惯影响角色的思维和决策

  念头培育:
    核心概念: |-
      念头植入只是"种下种子"，要变成永久习惯必须通过剧情"开发"。
      开发 = 讨论相关话题 + 进行相关行为 + 累积相关互动时间

    有效期: |-
      【念头存在时间】：
      - 所有念头统一为24小时有效期
      - 超过24小时未开发完成的念头自动消失
      - 消失后不会有任何惩罚（除非是困难念头）

    念头难度: |-
      【难度等级】：
      - 简单：当前阶段已远超推荐阶段，道德底线远低于推荐值，对主角依存度远高于推荐值
      - 中等：当前状态接近推荐条件
      - 困难：当前状态远低于推荐条件，需要争分夺秒开发

      【难度计算】：
      - 基于混合方式：阶段差距 + 道德底线差距 + 依存度差距
      - 脚本自动通过关键词匹配念头类型，计算难度
      - AI只需在剧情中通过互动累积开发进度

      【难度影响】：
      - 简单念头：成功后获得基础奖励
      - 中等念头：成功后获得基础奖励
      - 困难念头：成功后获得基础奖励+20%，失败有惩罚

    阶段时间修正: |-
      【重要】不同阶段的角色对念头的接受度不同，体现在开发时间上（5阶段系统）：

      | 阶段 | 阶段名 | 侵蚀度 | 时间修正 | 说明 |
      |------|--------|--------|----------|------|
      | 1    | 抵抗   | 0-19   | ×1.2    | 初期抗拒强 |
      | 2    | 动摇   | 20-39  | ×1.0    | 基准接受度 |
      | 3    | 沉溺   | 40-59  | ×0.8    | 较易接受 |
      | 4    | 疯狂   | 60-79  | ×0.6    | 非常容易 |
      | 5    | 圆满   | 80+    | ×0.5    | 完全顺从 |

      【最低开发时间】：2小时（无论如何修正都不会低于2小时）

      【示例】：
      - 阶段1（抵抗）：中等念头需要 4h × 1.2 = 5h
      - 阶段3（沉溺）：中等念头需要 4h × 0.8 = 3h
      - 阶段5（圆满）：困难念头需要 5h × 0.5 = 3h（已是最低）

    开发进度: |-
      【时间累积】：
      - 每轮AI输出后，自动推进1小时
      - 所有培育区中的念头开发进度+1小时
      - 当念头开发进度 >= 需要时间，念头成熟为习惯

      【示例】：
      - 植入时间: 2024/11/20 18:00
      - 过期时间: 2024/11/21 18:00（24小时后）
      - 需要时间: 4小时（中等难度）
      - 开发进度: 每轮对话+1小时
      - 第4轮对话时开发完成，生成习惯

    成熟与失败: |-
      【成熟 → 生成习惯】：
      - 在24小时内，念头开发进度达到需要时间
      - 自动从培育区移除，添加到习惯列表
      - 应用奖励：道德底线-2（困难-3），对主角依存度+3（困难+4），潜意识侵蚀度+5（困难+6）
      - 检查是否触发阶段提升（每20点侵蚀度=1阶段，约4个念头进阶）
      - 【习惯淡化机制】习惯数量超过16个时，最早形成的习惯自动淡化消失

      【过期 → 念头消失】：
      - 超过24小时未开发完成
      - 普通念头：直接消失，无惩罚
      - 困难念头：消失且有惩罚（道德底线+3，对主角依存度-2）

  习惯系统:
    核心概念: |-
      习惯是念头成熟后的永久状态，会持续影响角色的思维和决策。
      习惯没有强度等级，所有习惯一视同仁。
      习惯数量越多，影响角色决策的能力越大。

    影响程度判定: |-
      【习惯数量 → 影响强度】（16个习惯上限）：
      - 1-4个习惯：轻微影响
        → 这些行为还需要引导才会做
        → 仍有羞涩和犹豫

      - 5-8个习惯：明显影响
        → 这些行为开始变得自然，抗拒减弱
        → 稍加暗示就会配合

      - 9-12个习惯：深度影响
        → 这些行为已非常自然
        → 几乎没有心理障碍，会主动创造相关场景

      - 13-16个习惯：完全内化
        → 这些行为已彻底融入人格
        → 如同呼吸般自然，不做反而会觉得缺少什么

      【习惯淡化】：习惯超过16个时，最早形成的习惯会淡化消失

    AI表现: |-
      【如何体现习惯的影响】：
      1. 查看当前习惯列表中有多少相关习惯
      2. 根据习惯数量判断影响程度（参考上面的影响程度判定）
      3. 在相关场景中，让角色的行为符合该影响程度
      4. 习惯不是强制命令，而是倾向性引导
      5. 随着习惯数量增加，角色的抗拒和犹豫逐渐消失

      【重要】：
      - 习惯影响是渐进的，不是一次性的
      - 同一类别的习惯越多，该类别的影响越强
      - 不同类别的习惯可以叠加影响（如"讨论禁忌话题"+"穿着暴露"）

      【示例1 - 口腔相关习惯】：
      - 1个习惯（"用嘴服务儿子"）：
        → 在{{user}}强烈要求下才会犹豫地做，事后感到羞耻
      - 3个习惯（+"吞下儿子的精液"+"主动舔舐儿子"）：
        → {{user}}暗示后会主动配合，虽然还有点不好意思
      - 6个习惯（+"享受口中的味道"+"跪下为儿子服务"+"用舌头取悦儿子"）：
        → 不需要暗示，看到{{user}}就自然想要这样做
        → 过程中会主动调整姿势和技巧
      - 10个习惯（+更多相关习惯）：
        → 视为日常，像喝水一样自然
        → 主动寻求机会，如果一天没做反而会觉得缺少了什么

      【示例2 - 禁忌话题相关习惯】：
      - 习惯："和儿子讨论禁忌话题"
        → 在聊天时更容易接受成人话题，不会立刻回避
      - 习惯："和儿子讨论禁忌话题" + "在儿子面前谈论身体"
        → 可以自然地和儿子讨论身体和性相关内容
      - 习惯："和儿子讨论禁忌话题" + "在儿子面前谈论身体" + "向儿子展示身体" + "让儿子评价自己的身材"
        → 主动和儿子讨论自己的身体，询问儿子的看法
        → 不再有羞耻感，反而期待儿子的评价

  植入操作说明: |-
    【重要】念头植入是玩家的元游戏操作，由玩家通过界面完成。
    AI不需要也不应该输出任何植入命令或相关的MVU指令。

    【AI的职责】：
    1. 当看到【系统】消息提示"{{user}}向XX植入了念头：YYY"时
    2. 了解这个念头已经被植入到对应角色的潜意识中
    3. 在后续剧情中通过相关互动来"开发"这个念头
    4. 开发进度会自动累积，AI只需专注于剧情演绎

    【示例】：
    系统消息：【系统】{{user}}向秦璐的潜意识植入了念头："和儿子讨论禁忌话题"

    AI应该：
    - ✅ 知道秦璐的潜意识中有了这个念头
    - ✅ 在后续剧情中，如果{{user}}引导秦璐聊相关话题，会更容易成功
    - ✅ 通过秦璐的内心独白、情绪变化来展现念头的微妙影响
    - ❌ 不要输出任何类似 {{SET::...}} 的命令

  AI注意事项: |-
    【必须遵守】：
    1. 念头植入后，角色不能察觉到"被植入念头"这件事
    2. 将念头表现为角色自己的想法和判断
    3. 避免写"奇怪的感觉"、"无形的力量"、"被操控"等超自然描写
    4. 用角色的内心独白、情绪变化、行为选择来展现念头的作用
    5. 通过相关互动累积开发进度，每轮对话自动+1小时
    6. 24小时内完成开发，否则念头消失

    【推荐做法】：
    ✅ 根据【系统】消息了解哪些念头被植入
    ✅ 通过持续的相关互动开发念头
    ✅ 让习惯的影响渐进式展现
    ✅ 习惯数量越多，角色行为越符合习惯

    【禁止行为】：
    ❌ 让角色察觉到特殊能力的存在
    ❌ 让念头立即生效（需要开发时间）
    ❌ 忽略24小时有效期
    ❌ 忽略习惯对决策的影响
    ❌ 输出任何念头植入相关的MVU命令

  疑心值冻结机制:
    核心概念: |-
      秦璐/苏梦可以向苏文说谎来暂时冻结疑心值增长。
      低阶段时说谎非常困难，需要{{user}}强力引导。

    触发条件: |-
      1. 角色（秦璐/苏梦）在剧情中向苏文说谎，并明确告知具体时间
      2. 例如："我去主角房间教导他学习三个小时，不要打扰我们"
      3. AI判断说谎是否成功（低阶段很难成功）

    借口申请规则（重要）: |-
      【自动失败条件】满足任一条则直接失败：
        - ❌ {{user}}直接替角色说出借口 → 自动判定失败
        - ❌ 角色没有提出具体时间限额 → 自动判定失败
        - ❌ 角色提出超过4小时的时间 → 自动判定失败

      【正确示例】：
        - ✅ "我去主角房间帮他辅导两小时作业"
        - ✅ "我和弟弟聊聊天，三个小时后出来"

      【错误示例】：
        - ❌ "我去帮他辅导作业"（没说具体时间）
        - ❌ "我在那里待五个小时"（超过4小时上限）
        - ❌ {{user}}直接说"秦璐是来帮我xxx的"

    冻结效果: |-
      【说谎成功】：
      - 疑心值进入冻结状态
      - 在承诺时间内（最长4小时），即使苏文在家，疑心值也不会增长
      - 状态栏显示疑心值进度条变色（表示冻结）

      【超时惩罚】：
      - 承诺时间结束时，如果角色还在主角房间
      - 疑心值+8（而非正常的+5）
      - 解除冻结状态

    MVU命令示例: |-
      【冻结疑心值】（注意：冻结时长不得超过4小时）：
      {{SET::苏文状态.对秦璐疑心值冻结::{"是否冻结":true,"借口内容":"去主角房间教导他学习","冻结开始时间":"2024/11/20 18:00","冻结结束时间":"2024/11/20 21:00"}}}
