---
变量更新规则:
  强制只读字段:
    说明: 以下字段由系统管理，AI 不要修改
    列表:
      - /秦璐状态/沦陷度
      - /秦璐状态/当前阶段
      - /秦璐状态/阶段标题
      - /秦璐状态/对主角依存度
      - /秦璐状态/对苏文依存度
      - /苏文状态/当前状态
      - /苏文状态/当前位置
      - /苏文状态/对秦璐疑心值
      - /秦璐状态/念头列表/*（其中"类型"字段除外，AI 需判定写入）
      - /秦璐状态/习惯列表
      - /系统/货币
      - /系统/道具状态/*
      - /系统/念头植入日志
      - 所有下划线(_)开头字段

  AI可更新字段:
    世界:
      - /世界/时间 ← AI 按剧情自由更新，仅氛围显示
      - /世界/日期 ← 剧情跨天时由 AI 更新
      - /世界/地点 ← AI 从地点枚举中选择或自由填写
    角色状态:
      - /秦璐状态/当前情绪 ← AI 每轮更新
      - /秦璐状态/当前心理想法 ← AI 每轮更新（80-150字第一人称，必须冷、锋利）
      - /秦璐状态/当前位置 ← AI 按场景更新
      - /苏文状态/当前情绪 ← AI 每轮更新
      - /苏文状态/当前心理想法 ← AI 每轮更新（不论在不在场，被瞒在鼓里的丈夫视角）
      - /秦璐状态/服装细节、/秦璐状态/妆容细节 ← AI 按剧情更新
    系统:
      - /系统/本轮相关念头 ← AI 写入培育中念头的相关度
      - /系统/在场角色/秦璐 ← AI 维护进场/离场

  在场角色:
    说明: 追踪秦璐是否在当前场景中
    维护规则:
      - 进场: 叙事中描写秦璐走入场景时，设为 true
      - 离场: 描写秦璐离开场景时，设为 false
      - 每轮复核: 与你本轮叙事的在场情况一致则无需写，不一致必须更新

  念头类型判定:
    说明: 当系统快照提示需要判定念头类型时，必须为每个待判定念头写入类型
    可选类型: 渐生依恋/情感依赖/触电感/玩火自焚/越界/身不由己/沦陷/身份瓦解/臣服/独占欲
    注意: 只写入"类型"字段，不要修改念头的内容、状态、难度等其它字段
