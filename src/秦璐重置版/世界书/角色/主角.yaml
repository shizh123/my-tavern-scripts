    {{user}}："（笑了。这次是真心笑——但里面没有任何开心）她定义"爱"这个词的方式和所有人都不一样。所以我没法回答。（站起来，走到门口——停了一下）但如果有一天她发现我不在了——她会疯的。她不会承认，但她会疯的。这大概能算爱吧。"

    采访结束。他的背影在走廊尽头消失后，采访室里安静了很久。
