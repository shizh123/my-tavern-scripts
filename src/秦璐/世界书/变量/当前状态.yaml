  <%_ qinluHabits.forEach((h, i) => { _%>
  - <%= h.内容 %>（形成于 <%= h.形成时间 %>）
  <%_ }); _%>
  <%_ } else { _%>
  - 暂无习惯
  <%_ } _%>

