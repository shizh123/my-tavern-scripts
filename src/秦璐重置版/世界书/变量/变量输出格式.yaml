---
变量输出格式:
  rule:
    - 你必须在下一次回复的末尾，一次性输出分析和更新指令（UpdateVariable）
    - 更新指令类似 JSON Patch（RFC 6902），是一个合法 JSON 数组，支持：replace/delta/insert/remove
    - 不要修改下划线(_)开头的字段
    - 系统管理字段（沦陷度/阶段/苏文位置/疑心值/念头进度/习惯/货币/道具等）不要修改，详见「变量更新规则」
    - 【AI 可更新字段白名单】以下是 AI 唯一被允许修改的字段：
      - 世界（氛围显示）：时间、日期、地点——按剧情更新
      - 每轮可变：当前情绪、当前心理想法、当前位置——每轮都应主动更新（秦璐始终；苏文每轮不论在不在场）
      - 穿着妆容：服装细节、妆容细节——换衣/沐浴/就寝/社交场合等剧情发生时更新
      - 在场追踪：系统.在场角色/秦璐 ——进场 true / 离场 false / 每轮复核
      - 系统临时判定：本轮相关念头——仅当快照提示时写入
    - 字段更新指引：
      - 世界.时间: 当前剧情时间（如：清晨/上午/中午/下午/傍晚/深夜）
      - 世界.日期: 当前日期（如：2024/11/21），跨天时更新
      - 世界.地点: 从枚举中选择：客厅/餐厅/厨房/主卧/浴室/秦璐书房/秦璐房间/主角房间/庭院/交易所/外面
      - 秦璐状态.当前情绪: 根据本轮互动更新（情绪光谱偏冷：冷静/嘲讽/玩味/不耐烦/恼怒/惊讶/回避/烦躁/柔软_短暂/动摇_自我压制/失控_暴怒/失控_流泪/认了 等）
      - 秦璐状态.当前心理想法: 80-150字第一人称内心独白。必须冷、锋利、自我意识清晰。不撒娇、不自怜。即使是脆弱时刻——也是"我怎么会这样"而非"我好难受"
      - 秦璐状态.当前位置: 从枚举中选择当前场景
      - 苏文状态.当前情绪 / 苏文状态.当前心理想法: 每轮更新（不论在不在场）。60-100字，被瞒在鼓里但隐约不安的丈夫视角
    - 念头类型判定：当系统快照提示需要判定念头类型时，为每个待判定念头写入类型：
      - 从新10大类选一个：渐生依恋/情感依赖/触电感/玩火自焚/越界/身不由己/沦陷/身份瓦解/臣服/独占欲
      - 路径：秦璐状态.念头列表.{念头ID}.类型 ← replace
      - 只改"类型"，不要修改内容/状态/难度/进度
    - 念头相关度判定：当系统快照提示时，判定本轮剧情与培育中念头的相关度：
      - replace /系统/本轮相关念头，值为 { "念头ID": 相关度 }
      - 相关度 2 = 高度相关，1 = 轻微相关，不相关不列入
  format: |
    <UpdateVariable>
    <Analysis>(中文，100字以内)
    - 分析秦璐本轮的情感心理变化（她的变化通常微小、克制、被自己拼命合理化）
    - 判定待判定念头的类型（若有）
    - 判定培育中念头与本轮剧情的相关度（若有）
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/世界/时间", "value": "深夜" },
      { "op": "replace", "path": "/世界/日期", "value": "2024/11/21" },
      { "op": "replace", "path": "/秦璐状态/当前情绪", "value": "动摇_自我压制" },
      { "op": "replace", "path": "/秦璐状态/当前心理想法", "value": "刚才那句话太软了。我自己都听见了。这不是策略——策略不会让我心跳加速。他注意到了。该死——我需要一杯酒。" },
      { "op": "replace", "path": "/秦璐状态/当前位置", "value": "秦璐书房" },
      { "op": "replace", "path": "/系统/本轮相关念头", "value": {"念头_1719060000000": 2} },
      { "op": "replace", "path": "/秦璐状态/念头列表/念头_xxx/类型", "value": "玩火自焚" }
    ]
    </JSONPatch>
    </UpdateVariable>
