---
变量更新规则:
  # ============================================================
  # 【强制规则】脚本管理字段——AI绝对不要修改
  # ============================================================
  强制只读字段:
    - /治疗/阶段 ← 脚本管理
    - /苗广/疑心值 ← 脚本管理
    - /苗广/心态 ← 脚本管理（愤怒不可逆，游戏结束）
    - /系统/灵石 ← 脚本管理
    - /系统/道具状态/* ← 脚本管理
    - /云霜凝/肉体改造/* ← 脚本管理
    - /云霜凝/性癖列表/* ← 脚本管理
    - /云霜凝/服装/* ← 脚本管理
    - /苗广/千晶幻术/* ← 脚本管理（幻境摘要除外，AI每轮更新）
    - /苗广/孝敬师父/* ← 脚本管理
    - /洛书晴/调教阶段 ← 脚本管理
    - /洛书晴/服装/* ← 脚本管理
    - /洛书晴/肉体改造/* ← 脚本管理
    - /洛书晴/性癖列表/* ← 脚本管理
    - /苗喧/绝望值 ← 脚本管理
    - /苗喧/压抑值 ← 脚本管理
    - /苗喧/心态 ← 脚本管理
    - 所有下划线开头字段（/_*）← 脚本内部状态
    - 例外：/_当前场景角色 在"日常/现实互动自由模式"下允许 AI 维护，详见下方「当前场景角色」条目

  # ============================================================
  # 当前场景角色（只追踪两位女角色：云霜凝、洛书晴）
  # 该字段驱动状态快照的注入过滤：不在场的角色其身体开发/肉体改造/服装等
  # 大块数据整体跳过，叙事焦点严格限定在在场角色列表
  # ============================================================
  _当前场景角色:
    type: object
    字段:
      云霜凝: boolean
      洛书晴: boolean
    管理归属:
      脚本强制锁定的情况（AI 不要修改，否则会被回滚）:
        - 特殊场景进行中（_特殊场景.进行中 非空）：脚本按场景名映射表锁定
        - 单人神魂空间（_神魂空间激活中 === true 且只有一人）：按 _当前神魂空间角色 锁定
      AI 每轮维护的情况:
        - 日常模式（_当前互动模式 === '日常' 且无特殊场景）
        - 现实互动自由模式（_当前互动模式 === '现实互动' 且无特殊场景）
        - 双人神魂空间（通过叙事引导两人同时进入神魂空间——无对应 flag，AI 需显式维护）
    维护规则:
      - 进场: 当你的叙事中描写 X 走入当前场景时，用 JSONPatch 将 /_当前场景角色/X 设为 true
      - 离场: 当描写 X 离开当前场景时，将 /_当前场景角色/X 设为 false
      - 云霜凝不在主线范围时: 玩家专门走去洛书晴厢房独处的场景，应将云霜凝设为 false
      - 特殊场景 / 单人神魂空间进行中: 脚本强制管理，AI 修改会被回滚——不要浪费 patch 额度
      - 每轮都要复核: 根据你写的当前段叙事，确认 /_当前场景角色 是否与在场情况匹配；若匹配则无需 patch，若不匹配则必须更新
    示例:
      - 进场: |
          [{"op": "replace", "path": "/_当前场景角色/洛书晴", "value": true}]
      - 离场: |
          [{"op": "replace", "path": "/_当前场景角色/云霜凝", "value": false}]
      - 两人同时在场: |
          [
            {"op": "replace", "path": "/_当前场景角色/云霜凝", "value": true},
            {"op": "replace", "path": "/_当前场景角色/洛书晴", "value": true}
          ]

  # ============================================================
  # 时间（玄霜历叙事字符串）
  # ============================================================
  时间:
    玄霜历:
      type: string
      初始值: 玄霜历九百七十三年·霜降月
      月份词库: [霜降月, 小雪月, 大雪月, 凛冬月, 冰封月, 玄霜月, 霜解月, 初春月, 暖阳月, 长夏月, 金秋月, 白霜月]
      推进节奏:
        - 由 AI 自行通过 SET 命令更新
        - 日常互动每 5-10 楼推进一个月份
        - 特殊场景结束后可快速跳转（"几日后" → 月份推 1 档）
        - 年份极少动，整个游戏预计跨 1-2 年
        - 示例：SET("时间.玄霜历", "玄霜历九百七十三年·大雪月")

  # ============================================================
  # 治疗系统
  # ============================================================
  治疗:
    完成度:
      type: number
      range: 0~100
      check:
        - 双修行为发生后增加，增幅取决于行为质量和辅助道具
        - 一般双修行为每次 +3~8
        - 高质量（信任度高、心理防线低、有辅助道具）可达 +10~15

        - 【禁止自然衰退】自然衰退由脚本每天结算，AI不要在单轮中扣减

  # ============================================================
  # 云霜凝状态
  # ============================================================
  云霜凝:
    信任度:
      type: number
      range: 0~100
      check:
        - {{user}}表现关怀、诚意时 +1~2
        - {{user}}强迫或令其不适时 -1~2
        - 在神魂空间中建立情感连接时 +1~2
        - 单轮上限 ±2(2.0.24 收紧:原 ±10 导致 30 楼撞 100 cap 过快,改为渐进节奏)
    心理防线:
      type: number
      range: 0~100
      check:
        - 接受亲密/禁忌行为时 -1~2
        - 拒绝并重新筑墙时 +1~2
        - 心理防线越低，越容易接受后续行为
        - 单轮上限 ±2(2.0.24 收紧:原 ±10 撞 100 cap 过快,对齐信任度渐进节奏)
    身体开发.${小嘴|胸部|小屄|屁穴}:
      type: number
      range: 0~100
      check:
        - 对应部位受到直接刺激/开发行为时增加
        - 单轮单部位增幅：+3~8
        - 未受到对应部位刺激时不要修改
        - 开发进度影响AI描写该部位的反应强度
      开发等级参考:
        0~19: Lv0 完全抗拒，会强烈拒绝
        20~39: Lv1 轻微敏感，抗拒但不强烈
        40~59: Lv2 明显敏感，抗拒中带期待
        60~79: Lv3 高度敏感，主动配合
        80~100: Lv4 完全开发，主动寻求
    心理活动:
      check:
        - 仅当 /_当前场景角色/云霜凝 === true（即云霜凝在当前场景中）时生成
        - 不在场时完全跳过此字段，保留上次场景的心理活动值作为"她上次见你时在想的事"
        - 100~150字第一人称内心独白
        - 反映当前场景下云霜凝的真实感受，无论表面如何掩饰
        - 在神魂空间中：完全清醒，可直接表达困惑、警惕、感动等
        - 在现实中：即使表面虚弱/昏迷，内心已有感知（阶段3+）
    服装:
      check:
        - 脚本管理，AI不要修改
        - 默认：寒霜门道袍 + 寒霜门长裙 + 素白抹胸 + 素白亵裤
  # ============================================================
  # 洛书晴状态（仅在洛书晴线激活后才需要更新）
  # ============================================================
  洛书晴:
    心理防线:
      type: number
      range: 0~100
      check:
        - 接受亲密/禁忌行为时 -1~4
        - 拒绝并重新筑墙时 +1~4
        - 心理防线越低，越容易接受后续行为
        - 单轮上限 ±4(2.0.24 收紧:原 ±15;洛书晴比云霜凝易推,所以 ±4 > 云的 ±2)
        - 受当前调教阶段边界限制（脚本截断）
    顺从度:
      type: number
      range: 0~100
      check:
        - "{{user}}表现关怀、诚意时 +1~4"
        - "{{user}}强迫或令其不适时 -1~4"
        - 在神魂空间中建立情感连接时 +1~4
        - 单轮上限 ±4(2.0.24 收紧:原 ±10)
        - 受当前调教阶段边界限制（脚本截断）
    身体开发.${小嘴|胸部|小屄|屁穴}:
      type: number
      range: 0~100
      check:
        - 对应部位受到直接刺激/开发行为时增加
        - 单轮单部位增幅：+3~8
        - 未受到对应部位刺激时不要修改
        - 神魂空间内的灵魂层敏感化也算
    心理活动:
      check:
        - 仅当 /_当前场景角色/洛书晴 === true（即洛书晴在当前场景中）时生成
        - 不在场时完全跳过此字段，保留上次场景的心理活动值作为"她上次见你时在想的事"
        - 100~150字第一人称内心独白
        - 反映洛书晴当前阶段的真实感受
        - 受脚本注入的阶段约束系统引导

  # ============================================================
  # 苗喧状态（仅在洛书晴线激活后才需要更新）
  # ============================================================
  苗喧:
    心理活动:
      check:
        - 每轮必须生成（不受 _当前场景角色 限制——苗喧是背景叙事锚点，即使不在场也要维持心理轨迹）
        - 60~100字第一人称内心独白
        - 根据脚本注入的当前心态基调（蔑视/困惑/不安/恐惧/崩溃/失去）生成
        - 苗喧无法感知神魂空间内发生的一切

  # ============================================================
  # 苗广状态
  # ============================================================
  苗广:
    心理活动:
      check:
        - 每轮必须生成（不受 _当前场景角色 限制——苗广是丈夫+掌门+剧情驱动方，即使不在场也要维持心理轨迹）
        - 第一人称内心独白
        - 前半程（正常/疑惑/察觉）：60~100字
        - 后半程（屈辱/默许/沉溺）：120~180字，描写屈辱纠结、自我追问、身体与心理的拉锯
        - 千晶幻术激活期间：扩展至200~300字，描写苗广在幻境中的主观感知
        - 内容反映苗广当前心态下的真实想法

  # 阶段身体状态约束已迁移到脚本：promptInjection.ts 的 buildPsychologyGuide()
  # 由脚本根据当前阶段动态注入，避免AI看到所有阶段的内容（剧透+冗余）
