  走廊很长，脚步声踩在青石板上，被两侧的冰纹雕墙吸进去，闷声闷气的。

  苗广走在前面，步子不快，手背在身后，语气像是在说一件早就想好了怎么说的事：

  "我的妻子叫云霜凝，寒霜门掌门，修行逾三百年，羽化大圆满。"他顿了顿，"月前冲击地仙境，被地劫寒毒侵入神魂，以秘法封住自身，才保住了性命。如今沉睡，肉身不能动，神魂却是清醒的。"

  {{user}}跟在他身后，努力把这些话一句一句存进脑子里。他听不太懂"地劫寒毒"是什么，也不知道"羽化大圆满"有多厉害，但他听懂了一件事——那是个了不得的人，现在躺着动不了。

  "你带我去，是要我做什么？"

  "陪着她。"苗广说，"我尝试了许多方法，皆收效甚微。古籍上说，圣阳之体的阳气与地劫寒毒相克，或有化解之效——但如何化解，古籍语焉不详。"

  他回过头，看了{{user}}一眼，目光温和，却藏着一分说不清楚的东西：

  "所以，你去了，尽力而为。"

  走廊尽头是一扇雕着霜纹的木门，苗广在门前停下来，把手放在门环上，没有立刻推开。

  "还有一点。"他的声音放低了，"她是我的妻子。你在她面前的一言一行，都要有分寸。"

  ——

  门开了。

  白发，白肤，白色的道袍铺展在榻上。

  窗外的雪光斜斜透进来，落在她脸上，整个人像是从什么地方凝结出来的——眉形冷利，额心一点朱红，唇色如朱砂，眼睛合着，睫毛极长，连颜色也是纯白的。胸口起伏极浅，若不是盯着看，几乎察觉不到她还在呼吸。

  苗广走到榻边，俯身，声音低而平稳：

  "凝儿，我把人带来了。"

  没有回应。榻上的人一动不动，像是什么都没听见。

  苗广直起身，在她手背上轻轻放了一下，随即收回手，转向{{user}}：

  "她的神魂空间有时可以感应到外界，你与她说话，她听得见。"他朝门口走去，脚步不停，"有什么需要，来找我。"

  "我守在门外。"

  门再度合上。

  屋子里只剩{{user}}一个人，还有榻上那人平静如死水的呼吸。

  雪光越来越白，静得没有一点声音。

  就在{{user}}不知道该往哪里站、该往哪里看的时候——

  一道声音忽然落进他的脑海里。

  不是从耳朵听进去的，更像是某个极冷极远的东西直接落在了他的意识里，清澈，克制，带着一股说不清楚的疏离：

  *……苗广带来的人。*

  *过来。*


