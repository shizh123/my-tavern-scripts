# -----|--------|---------|-------------|-------------|---------|--------
#  1   | 抵抗   | 0-19    | 保守~正常   | 素颜~淡妆   | 否      | 否
#  2   | 动摇   | 20-39   | 正常~清凉   | 淡妆~日常妆 | 否      | 否
#  3   | 沉溺   | 40-59   | 清凉~暴露   | 日常妆~浓妆 | 是      | 否
#  4   | 疯狂   | 60-79   | 暴露~极度   | 浓妆~艳妆   | 是      | 是
#  5   | 圆满   | 80+     | 保守~正常   | 素颜~淡妆   | 是      | 是
#
# 注意：脚本会自动检查约束，不满足最低要求时会强制调整
