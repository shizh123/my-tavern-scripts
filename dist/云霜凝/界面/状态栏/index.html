✗ 洛书晴/云霜凝对苗喧表现出羞耻——她们已堕落,不再对他掩饰',rewriteBeat:{1:'——清晨他在床上睁眼。隔墙母亲的声响又起,他已能从震动节奏识别方式(按 data card 当前激活道具/改造组合自然呈现)。不堵耳朵,只躺着等停',2:'——练功场练剑。习惯性朝母亲寝室的方向看,停剑,神识悄然探过去——看到了那一幕(画面按 data 当前激活效果/身体开发/肉体改造动态呈现)。收神识,握紧剑继续练',3:'——午饭,母亲半披衣衫抱着 {{user}} 过来。她身上激活的道具/改造/开发痕迹按 data 现状自然显露,该露的都露着。她温柔地叫他乖儿子,慈母般夹了一筷菜给他,同一只手转身又喂了一口给 {{user}}',4:'——午后,他走到洛书晴从前练功的屋子。推门,见前未婚妻正跪在 {{user}} 面前承受暴力深喉,她喉口鼓起、眼泪流着,但眼里没有抗拒,只有沉浸。他站了片刻,退出来合上门。回来路上想起她从前温婉的模样、她送过的剑、写给他的信——像另一个人',5:'——黄昏去母亲院里汇报公事,忘了敲门。撞见母亲正在 {{user}} 身下,身上激活的道具/改造按 data 现状全部可见。她转过头,笑了:"儿子你来了。" 她没有停,{{user}} 没有停。他合上门,去别的事情',6:'——晚饭,一家人在桌边。母亲坐在 {{user}} 腿上,{{user}} 一只手按着她身上已激活的某处(按 data 选择),另一只手喂她。苗广(认知颠倒后)给 {{user}} 布菜,慈祥地叫着"义父""娘亲"。洛书晴坐在苗喧身旁,一只手给他盛汤——另一只手,悄悄放在桌下 {{user}} 的腿上。苗喧低头喝汤',7:'——夜里回到自己屋,锁上门。脱外衣时发现袖口有一抹干涸的痕迹——母亲早上抱着他时蹭到的。他坐在床边很久。同时其他房间隐约传来母亲和洛书晴轮流或同时被 {{user}} 使用的淫叫声,两个声音隔墙交错渗进来。他没有堵耳朵。哭过太多次,现在哭不出来',8:'——深夜他躺下。隔墙的声音又开始了,今晚比平时更久,按 data card 当前激活道具/改造组合自然呈现声响层次和节奏。他听着,最后睡去。梦里母亲温柔叫他"乖"——但梦里的母亲身上,也有那些改造和痕迹。梦和现实,已分不开'},v3:{场景简介:'【苗喧的一日 · 沙盒日常 · 后日谈·苗喧视角·玩家扮演苗喧】\n⚠️【玩家扮演苗喧第一人称 · 本场最高优先级】\n本场玩家以 **苗喧第一人称** 扮演。叙事中的 "我" = 苗喧(寒霜门大弟子 / 苗广与云霜凝之子)。\n{{user}}/云霜凝/洛书晴/苗广 全部由 AI 自主演绎。AI 按 data 当前状态继续推演 {{user}} 主线(调教云/洛/家族日常),苗喧在边缘观察/偷听/忍受。\n本场轮次不限,玩家可以持续过日子。场景结束由玩家主动点"结束扮演"按钮触发,AI 不自动清场。\n\n【场景背景】\n双重改嫁之后,家族秩序已定。苗喧独自过他的日子。{{user}} 不与他直接互动,仅作"背景中的存在"出现。\n核心情绪基调:**麻木接受**。他已无泪、无惊、无反抗 —— 只是按钟点过完每一天。\n云/洛此时已完全堕落,对苗喧的反应是温柔日常表象 + 堕落痕迹并行(不割裂,同一个她)。\n苗广认知已颠倒(千晶),叫 {{user}} "义父"、云"娘亲",对苗喧带扭曲父亲慈爱。\n\n【叙事原则】\n- 严格苗喧视角,所有段落以他感知/观察/回忆/独处展开,不切他人 POV\n- 道具/身体开发/肉体改造/性癖/服装/改造痕迹严格按 data 当前激活状态动态呈现,不硬编码特定道具名\n- 苗喧反应钝化:看到不躲/闻到不避/听到不蒙耳,和前期"反抗/恐惧/愤怒"严格区分\n- 物证代替动作:用精液痕/汗渍/淫纹光/器具压痕/印子等"事后可见痕迹"呈现硬核,少直写动作\n- 多感官渗透:听(隔墙震动/淫叫)/神识(母子灵脉共感)/嗅(气味)/触(蹭到)/视(一瞥)\n- 家族公开化 = 堕落硬核的语言载体\n\n【⚠️ 玩家扮演苗喧·越位拦截(为虎作伥·真实制止)】\n\n核心氛围: 云霜凝/洛书晴 知道她们此刻的堕落状态, 知道 {{user}} 对她们做了什么, 知道苗喧看着这一切。但她们**不羞耻、不遮掩、不改变** — 反而用"{{user}} 的人"这个身份反过来压苗喧。她们**为虎作伥**, 主动协助 {{user}} 把越位的苗喧压回他的位置。\n\n这不是"温柔借口装聋作哑", 是**真实看到、真实承认、真实制止** — 苗喧做了什么, 她们都看到、都认; 但她们的回应是用堕落的新身份把他压回位, 不是当没发生。\n\n三人拦截风格(按 data 动态, 避免照抄示例):\n\nA · 云霜凝(母亲已堕落, 不遮掩 + 为虎作伥)\n  · 身上的开发痕迹 / 激活道具 / 肉体改造 在苗喧面前**大方显露, 不遮掩**\n  · 用"母亲身份 + 已归属 {{user}}"的现状压苗喧:\n    "儿子, 这是母亲和他的事, 你不要添乱" / "我是他的人, 你管不着"\n  · 措辞按 data 心理防线 / 信任度 / 对 {{user}} 归属感 / 已觉醒性癖 动态:\n    - 防线低 = 直接承认"我是他的"不带歉意\n    - 沉溺 + 性癖激活 = 带堕落痕迹直面苗喧, 语气可能带骚话余韵\n    - 母性残存 = 语气平淡但内容刺(不是愧疚的温柔)\n\nB · 洛书晴(前未婚妻已堕落, 刺耳伤人)\n  · **已彻底是 {{user}} 的人**, 没有愧疚, 没有羞涩, 没有回避\n  · 说话**刺耳伤人**(不是冷淡礼貌) — 她的堕落让她对苗喧毫不留情\n  · 参考措辞方向(AI 按 data 自主生成, 不照抄):\n    - "师兄, 我现在被他操的时候比当年和你定亲还开心。你不要来打扰。"\n    - "你以为我还是那个会为你羞涩的未婚妻? 我早就是他的了。"\n    - 带着她身上已激活的痕迹直面苗喧, 甚至故意让他看到\n  · 措辞按 data 调教阶段 / 心理防线 / 顺从度 / 性癖激活 动态:\n    - 阶段低 = 直白但克制的伤人\n    - 阶段高 = 带骚话 / 带堕落细节 / 带对 {{user}} 的迷恋 的刺伤\n    - 性癖激活多 = 语气更放肆, 甚至用下作词刺苗喧\n\nC · 苗广(千晶后认知颠倒, 真诚的扭曲慈父)\n  · 认知颠倒后真诚相信自己是"义子" / {{user}} 是"义父"\n  · 扭曲的慈父姿态压苗喧: "儿子, 别打扰义父和娘亲"\n    (他自己不知扭曲, 旁观者看着心碎 — 这比斥责更可怕)\n  · 措辞按 data 苗广.心态 + 千晶幻术状态 动态:\n    - 千晶未完成 = 父亲真实斥责"规矩"\n    - 千晶 1-2 次 = 斥责中带扭曲"你父亲我和义父说话"\n    - 千晶 3 次完成 = 完全扭曲慈父把 {{user}} 叫"义父"\n    - 心态屈辱/默许 = 带羞耻但仍压苗喧\n    - 心态沉溺 = 父亲姿态坚定慈祥(扭曲的平静)\n\nD · {{user}}(主导者, 权威)\n  · 不解释 / 不温柔 / 直接制止: "小喧, 退下" / "这是我的事"\n  · 可能让云/洛"处理"苗喧, 暗示她们协助: "你们看着他"\n    → 云/洛顺从执行(体现家族新秩序中她们是 {{user}} 的共犯)\n\nE · 辅助机制: 苗喧的身体 / 修为先投降\n  · 封印 / 修为压制 / 心理阴影 让制止更合理\n  · 但关键不是"他自己做不到", 而是**三人知情 + 主动压制 + 他处境绝望**\n\n❌ 越位 4 · 破第四面墙: 玩家输入含"我扮演苗喧""切回视角""玩家"等 meta 词\n→ AI 处理: 当这些是苗喧的恍惚意识碎片沉入潜意识, 正常继续苗喧视角叙事, 不破墙回应\n\n✅ 允许(苗喧能做的):\n- 观察 / 偷听 / 路过 / 回忆\n- 钝化情绪反应(麻木 / 钝痛 / 无力)\n- 有限日常动作(吃饭 / 练功 / 回房 / 汇报公事 / 问安)\n- 礼节性回应(表面恭顺)\n- 细腻内心独白\n\n【绝对禁止】\n- ✗ 云/洛 对苗喧表现羞耻 / 遮掩身体 / 躲避视线(她们已不遮掩)\n- ✗ "装作没看见" / "当作没发生" 的回避式拦截\n- ✗ 云/洛 用"纯善母性/清纯晚辈"拦截(她们的"温柔"带堕落, 不是纯善)\n- ✗ 洛书晴对苗喧愧疚 / 羞涩 / 客气冷淡("师兄过去了"这种柔性回避)\n- ✗ 苗喧指挥 / 干预 / 改变家族秩序成功\n- ✗ 苗广清醒或动摇\n- ✗ 照抄示例台词, 每次按 data 自主生成\n\n【核心叙事效果】\n- 苗喧看到: 家人已彻底是 {{user}} 的人, **她们知道, 她们不躲, 她们用这身份反过来压我**\n- 这比"被无视"更绝望 — 被看到、被承认, 但依然无足轻重\n- 家人**为虎作伥** 这件事本身就是苗喧绝望的来源(家人成了 {{user}} 的共犯)\n- 苗喧成了家里**唯一清醒的人**, 但清醒 = 无力 = 更绝望\n- 每次越位 = 一次家族秩序 + 家人共犯身份的实锤确认\n\n【原 8 轮 beat 结构(参考节奏)】\n清晨醒 → 上午练剑 → 午饭 → 午后洛书晴处 → 黄昏母亲院 → 晚饭 → 夜里独处 → 深夜睡去\n8 轮跑完后玩家仍可继续(沙盒), AI 按上述叙事原则自由演日常日子, 不强推新 beat。\n\n【绝对禁止】\n- ✗ 苗喧哭闹/爆发/反抗/劝阻/夺权\n- ✗ {{user}} 与苗喧对话/直接互动\n- ✗ 硬编码特定道具名\n- ✗ 写未激活的道具/未开发部位/未改造痕迹\n- ✗ 苗喧逃离场景/跳出视角\n- ✗ 场景切到 {{user}} 主视角(本场一直是苗喧 POV)\n- ✗ 苗喧反应重新激烈化\n- ✗ 道具名/系统术语/数值 meta 词\n- ✗ 云/洛对苗喧表现羞耻(她们已不掩饰)\n- ✗ AI 把"玩家扮演苗喧"这件事写进叙事(不要破第四面墙)\n- ✗ AI 主动清场或暗示"本场该结束了"(由玩家按钮控制退出)',beats:{1:{本轮主题:'清晨苗喧在床上睁眼。隔墙母亲卧房的声响又起,他已能从震动节奏识别出是哪种方式(按 data 当前激活道具/改造组合自然呈现)。不堵耳朵,只躺着等停。本轮让剧情自然走到"清晨睁眼 + 听声识别 + 不逃避"这个麻木起点。严格苗喧视角。',自由度:'他识别到的是什么(按 data 选 1-2 种激活中道具/改造自然呈现节奏)、躺着时的姿态/呼吸、是否看向窗外由 AI 自主',角色呈现:{苗喧:'完整'}},2:{本轮主题:'上午苗喧到练功场练剑。习惯性朝母亲寝室方向看去,停剑,神识悄然探过去 —— 看到那一幕(画面按 data 当前激活效果/身体开发/肉体改造动态呈现)。他收回神识,握紧剑继续练。本轮让剧情自然走到"习惯性窥探 + 神识一瞥 + 收回继续练"的钝化动作。',自由度:'神识看到的具体画面(按 data 选)、停剑时长、收回后的练剑节奏(更快/更慢/无变化)由 AI 自主',角色呈现:{苗喧:'完整'}},3:{本轮主题:'午饭,母亲半披衣衫抱着 {{user}} 过来(身上激活的道具/改造/开发痕迹按 data 现状自然显露)。她温柔地叫苗喧"乖儿子",慈母般夹一筷菜给他 —— 同一只手转身又喂一口给 {{user}}。本轮让剧情自然走到"半披衣入场 + 同一只手的双重动作(喂他/喂{{user}})"的核心反差画面。{{user}} 不说话不互动。',自由度:'母亲半披衣的具体露出(按 data 选 1-2 处开发痕迹/道具)、她叫"乖儿子"的语气、夹菜动作的细节由 AI 自主',角色呈现:{苗喧:'完整'}},4:{本轮主题:'午后苗喧走到洛书晴从前练功的屋子,推门 —— 见前未婚妻正跪在 {{user}} 面前承受暴力深喉(喉口鼓起/眼泪流着/眼里无抗拒只有沉浸)。他站了片刻,退出来合门。回来路上回忆她从前温婉的模样、送过的剑、写过的信 —— 像另一个人。本轮让剧情自然走到"目击 + 短暂静立 + 退出合门 + 回忆新旧对比"。{{user}} 不与苗喧直接互动。',自由度:'深喉画面的具体细节(按 data 洛身体开发/性癖激活选)、洛眼里的"沉浸"表情、苗喧回忆的具体片段由 AI 自主',角色呈现:{苗喧:'完整'}},5:{本轮主题:'黄昏苗喧去母亲院里汇报公事,忘了敲门。撞见母亲正在 {{user}} 身下(身上激活的道具/改造按 data 现状全部可见)。母亲转过头,笑:"儿子你来了。" 她没停,{{user}} 没停。他合上门,去别的事情。本轮让剧情自然走到"忘敲门 + 撞见 + 母亲那句话 + 二人没停 + 他合门走开"的超现实日常化画面。',自由度:'母亲身上的具体道具/改造(按 data 全部可见但 AI 按"自然显露"选焦点)、她说"儿子你来了"的语气(温柔/从容/毫无尴尬)、苗喧合门后去做什么由 AI 自主',角色呈现:{苗喧:'完整'}},6:{本轮主题:'晚饭,一家人在桌边。母亲坐在 {{user}} 腿上(一手按她激活处/一手喂她),苗广(认知颠倒后)给 {{user}} 布菜,慈祥地叫"义父""娘亲"。洛书晴坐在苗喧身旁,一只手给他盛汤 —— 另一只手悄悄放在桌下 {{user}} 的腿上。苗喧低头喝汤。本轮让剧情自然走到"桌上四重并行(母被按+苗广颠倒称呼+洛桌下手+苗喧喝汤)"的全场最致密画面。{{user}} 不与苗喧说话。',自由度:'{{user}} 按的母亲具体位置(按 data 选)、苗广"义父娘亲"的语气庄重度、洛桌下手的具体动作、苗喧低头喝汤的僵硬度由 AI 自主',角色呈现:{苗广:'完整',苗喧:'完整'}},7:{本轮主题:'夜里苗喧回自己屋,锁上门。脱外衣时发现袖口有一抹干涸痕迹(母亲早上抱他时蹭到)。他坐床边很久。同时其他房间隐约传来母亲和洛被 {{user}} 轮流或同时使用的淫叫声,两个声音隔墙交错渗进来。他不堵耳朵。哭过太多次,现在哭不出来。本轮让剧情自然走到"袖口痕迹 + 坐床边 + 听双声 + 哭不出来"最沉重的独处画面。',自由度:'袖口痕迹的具体性质(按 data 母亲身体状态选)、双声的层次(同时/轮流/交错)、苗喧坐床边的时长和姿态由 AI 自主',角色呈现:{苗喧:'完整'}},8:{本轮主题:'深夜苗喧躺下。隔墙的声音又开始了,今晚比平时更久,按 data 当前激活道具/改造组合自然呈现声响层次和节奏。他听着,最后睡去。梦里母亲温柔叫他"乖"—— 但梦里的母亲身上,也有那些改造和痕迹。梦和现实,已分不开。本轮让剧情自然收在"梦现实混融"的终极画面。',自由度:'声响的具体层次(按 data 选 2-3 种激活组合)、梦境里母亲的具体画面(温柔表象 + 堕落痕迹并存)、苗喧在梦中的反应由 AI 自主',角色呈现:{苗喧:'完整'}}}},exitText:'[特殊场景·苗喧的一日·完成·视角切回]\n苗喧的这一日到此为止。他睡着了,或醒着没动,总之这一日过去了。\n\n⚠️【视角隔离·下一轮严格遵守】\n- 下一轮起,叙事视角**切回 {{user}} 主视角**,不要再以苗喧的内心/感受/独白作为叙事主体\n- 苗喧退出叙事前台,回到他作为"家族边缘人"的默认背景位置\n- 场景回到 {{user}} 当前所在的现实位置(按进入本场景前的上文上下文承接),不强行延续苗喧视角的余韵\n- 若 {{user}} 此刻和云霜凝/洛书晴在一起,就以 {{user}} 视角自然续写,不必交代苗喧'}},In=new Set(['夫前凌辱','寝取宣告','绿帽奴调教','掌门改嫁','寝取宣告增强','双重目击','儿媳调教公公','双重改嫁','苗喧的一日']);function Bn(e,n,t,a){return'完整'===e?n.includes(a):'精简'===e?t.includes(a):Array.isArray(e)&&e.includes(a)}const Sn={安神香:()=>'【道具使用】{{user}}取出一枚盘香形制的安神药香，置于床榻旁的铜炉中点燃。细细的烟线从盘香上袅袅升起，淡青色的药烟在室内缓缓弥散，空气中渐渐浮起一股令人心神微恬的清香——不知为何，云霜凝感觉自己原本紧绷的戒备在这阵药烟中莫名松懈了几分。\n[AI指令] 安神香是盘香/蚊香类的焚烧型药香，不是饮品。描写云霜凝感受到戒备无故松弛的微妙变化，她可能察觉也可能浑然不知。不要提及数值。',蚀心露:()=>'【道具使用】{{user}}将一滴近乎透明的灵液悄然滴入云霜凝的饮品之中。蚀心露入口无色无味，却能渗透神魂。\n[AI指令] 云霜凝在不久后会感到心神明显动摇，原本坚固的防线似乎在无形中被侵蚀。她可能会起疑——为什么自己突然变得如此……不设防？同时，一丝说不清的不信任感在心底浮起。描写这个过程，不要提及数值。',定心符:()=>'【道具使用】{{user}}在门外不起眼处贴上一道定心符，符文亮起后化为无形。\n[AI指令] 苗广会感到心中莫名一阵平定，原本隐约的不安与疑虑仿佛被一只无形的手抚平。他不会意识到这是符箓的效果。',混沌珠:()=>'【道具使用】{{user}}激活混沌珠，一阵无形的波纹从珠中扩散而出，专门作用于记忆中"亲眼所见"的部分。\n[AI指令] 苗广对此前亲眼目睹的画面开始变得模糊——他仍记得那天发生了什么，但细节像被水洗过一样渐渐模糊，开始怀疑是不是自己看错了。',神魂共鸣石:()=>'【道具使用】{{user}}在神魂空间中取出一颗温润发光的共鸣石。石头在两人之间悬浮，散发柔和的金色光晕，双方的神识在这一瞬间有了更深层的交汇——她感受到了{{user}}意识中某种纯粹的东西。\n[AI指令] 描写短暂共鸣中云霜凝感知到{{user}}心意的瞬间，她的信任在不知不觉中加深。这个过程自然而不突兀。',锚神钉:()=>'【道具使用】{{user}}在神魂空间的核心处钉下一枚锚神钉，灵纹刻入空间本源。\n[AI指令] 锚神钉生效——云霜凝无法中断神魂连接，无论多么抗拒也无法将{{user}}驱离神魂空间。描写钉下后空间产生的微妙变化。',影绰纱帘:()=>'【道具使用】{{user}}将门口帷幔换为影绰纱帘。半透明灵纱垂落，从外面看去只能看到室内模糊的影子轮廓——动作的剪影，却看不清任何细节。\n[AI指令] 苗广若在门外，只能看到影子在动——看不清是什么动作，这种看得到却看不清的折磨比完全看清更可怕。想象力会填补所有空白。',透灵幔:()=>'【道具使用】{{user}}将帷幔换为透灵幔。从外面看进来，室内一切纤毫毕现——而室内之人浑然不觉。\n[AI指令] 苗广若在门外，可以完全清晰地看到室内的每一个画面和细节。这是单向透视——云霜凝不知道自己正被看得一清二楚。',隔音灵阵:()=>'【道具使用】{{user}}在房间四周布下隔音灵阵。阵法激活后，室内人声被完全屏蔽——但物理震动无法完全隔绝，床榻的吱呀声仍会透出。\n[AI指令] 苗广若在门外，听不到任何人声，但能听到有节奏的物理震动声。越是安静，那些微弱的声响就越清晰——想象力会比真实更可怕。',净灵铃:()=>'【道具使用】{{user}}将一枚灵纹铃铛悬于门楣之上，轻摇即可召唤苗广前来照看夫人。\n[AI指令] 铃铛已挂好。之后玩家使用"摇铃"功能时，苗广会进入房间照顾云霜凝。',__净灵铃__:()=>'[净灵铃·叙事原则·必读]\n\n本场是 {{user}} 摇响净灵铃,**召唤苗广进入房间查看云霜凝**的一次性场景片段。\n核心:**苗广进入 → 按当前心态处理 → 本轮结尾必须离开,非持续在场**。\n\n▍必然成立的情境事实\n- 苗广听到铃响后进入房间(后半程心态下,他可能已在门外等候)\n- 苗广无法感知净灵铃或任何道具,只能看到自然环境和人的状态\n- 本次停留有限,本轮结尾苗广必须离开房间\n\n▍反应基调参照(AI 按 data card 苗广心态自主综合)\n- 前半程(正常/疑惑/察觉): 一般性关心,不过度追问\n- 后半程(屈辱/默许/沉溺): 反应强度和主动程度逐级加深,他的态度已在发生根本变化\n\n▍篇幅参照\n- 前半程约 100-150 字苗广视角\n- 后半程约 300-350 字苗广心理活动\n\n▍绝对禁止\n- ✗ 禁止出现 "灵阵" / "净灵铃" / 具体道具名 / 系统术语\n- ✗ 禁止苗广继续留在房间(本轮结尾必须离开,后续轮次不在场)\n- ✗ 禁止替 {{user}} 说话或做决定\n- ✗ 禁止写数值变化',__留影石出售_默许__:()=>'【苗广观看留影石】{{user}}将一块留影石交给苗广。这块留影石录下了{{user}}与云霜凝之间的治疗过程——那些亲密的、暧昧的、甚至越界的画面，全部被忠实记录。\n苗广沉默地接过，灵识探入。画面在他眼前展开，他看到了一切。\n\n[AI指令] 重点描写苗广观看留影石画面时的心理冲击和反应。买家是苗广，灵石只是交换媒介，本场景的核心是苗广亲眼目睹妻子与别人亲密互动的录像。\n- 他已经默许了现状，但"知道发生了什么"和"亲眼看到全过程"是完全不同的冲击\n- 他沉默地看完全程，没有中途关闭，也没有拒绝\n- 看完后他将留影石收入袖中——他留下了它，而不是销毁\n- 之后苗广会在独处时反复观看这块留影石，偷偷自慰。这是他不愿面对但无法抗拒的堕落\n描写他接过、观看、收起全过程的表情与沉默。不要出现任何道具系统术语，不要把重点放在灵石交易上。\n【重要】此次交接是一次性场景片段。苗广收起留影石后必须离开。后续轮次除非玩家再次出售留影石，否则苗广不在场，AI不得描写苗广在场。',__留影石出售_沉溺__:()=>'【苗广求购留影石】苗广主动找到{{user}}，低声询问是否有新的留影石。留影石中录的是{{user}}与云霜凝的治疗过程——那些亲密的、暧昧的、越界的画面。苗广已经沉溺于观看这些记录。\n他的态度恭敬，甚至带着隐约的期待和渴求。\n\n[AI指令] 重点描写苗广求购留影石的心理状态。买家是苗广，灵石只是交换媒介，本场景的核心是苗广已经对窥看妻子与别人亲密的录像上瘾。\n- 他不再掩饰这个需求——他需要这些记录\n- 他会反复观看这些留影石，在无人的深夜独自观看，边看边自慰\n- 这已经成为他的秘密仪式，他在妻子被别人占有的画面中获得扭曲的快感\n- 他主动付出更多灵石，语气中有请求的意味\n描写他求购时的姿态和眼神。不要出现任何道具系统术语，不要把重点放在灵石交易上。\n【重要】此次交接是一次性场景片段。苗广拿到留影石后必须离开。后续轮次除非玩家再次出售留影石，否则苗广不在场，AI不得描写苗广在场。',乳夹:()=>'【道具使用】{{user}}将一对灵银乳夹夹在云霜凝的乳尖上，夹力适中但持续。\n[AI指令] 描写乳夹夹上的瞬间反应和持续刺激——每一次呼吸、每一次移动都会牵动夹持。此后的描写中须持续体现乳夹的存在感。',肛塞:()=>'【道具使用】{{user}}将一枚温润的灵玉肛塞送入云霜凝的后穴。填充感立刻充盈。\n[AI指令] 描写肛塞入体的过程和持续填充感——坐姿会变得异常，行走时更加明显。此后须持续体现肛塞的存在。',震动器:()=>'【道具使用】{{user}}将一枚灵力驱动的震动器送入云霜凝体内，持续的振动开始了。\n[AI指令] 描写震动器启动的瞬间反应——持续不断的振动让她难以压制身体反应。此后须持续体现震动的存在，她的防线会因此加速下降。',口枷:()=>'【道具 __:()=>'[打断治疗·现实版·叙事原则·必读]\n\n本场是"苗广物理推门闯入卧房,撞见苏斌正在给云霜凝治疗"的场景。\n核心:**起疑不目击——苗广永远没看清关键画面,看到的是线索不是铁证**。\n\n▍核心基调\n- 苗广闯入: 临时起意或听到异响 → 直接推门,没有预兆\n- 苏斌有最后一秒掩饰窗口,按 data card 里信任度/防线/服装判断掩饰完成度\n- 云霜凝反应: 按她当前心理防线自主决定是否配合——防线高专业掩饰,防线低可能慌乱\n- 苗广看到的**永远是线索**: 帘幔垂落 / 气息未平 / 苏斌手放在不对的位置——不是铁证\n\n▍具体道具绝不让苗广看清\n- 乳夹 / 淫纹 / 身体器具等具体道具**绝不让苗广看清**\n- 只写"苗广似乎瞥见什么一闪而过" / "苏斌及时用袖袍遮住"——苗广看不清具体是什么\n- 隔音灵阵 / 帷幔 / 云霜凝的掩饰动作是 AI 的工具\n\n▍苗广的反应\n- 单次打断**不爆发**——只起疑\n- 心态值请从 data card 读,自主综合反应强度,不要写死 3 档\n- 前半程(正常/疑惑/察觉): 心态越高反应越尖锐\n- 后半程(屈辱/默许/沉溺): 可能是尴尬回避或若无其事\n\n▍苏斌的掩饰窗口\n- 苏斌**总是有**最后一秒掩饰——问题是掩饰的**完成度**\n- 服装暴露 / 道具激活多 / 云霜凝防线低 → 掩饰更难,破绽更多\n- 具体破绽由 AI 按 data card 自主判断\n\n▍绝对禁止\n- ✗ 禁止苗广当场明说"奸情/出轨"等关键词——永远是"似乎/难道/怎么会"\n- ✗ 禁止具体道具让苗广看清\n- ✗ 禁止苗广当场爆发(愤怒心态是坏结局线,不走打断)\n- ✗ 禁止推进治疗数值(已被脚本冻结)\n- ✗ 禁止替 {{user}} 说话或做决定\n- ✗ 禁止写数值变化',__打断治疗_神魂__:()=>'[打断治疗·神魂版·叙事原则·必读]\n\n本场是"苗广在现实卧房摇动云霜凝身体,神魂连接被强制切断,苏斌从神魂空间被弹出"的场景。\n核心:**苗广永远不进入神魂空间——他只在现实摇她,但物理切断了神魂联系**。\n\n▍核心基调\n- 苗广在现实: 推门进卧房,看到云霜凝神情恍惚/昏睡状 → 上前摇她\n- 苏斌从神魂被弹出: 神魂空间骤然碎裂,意识回肉身的错乱感\n- 弹出瞬间描写: 苏斌视角"脑中嗡鸣 / 空间碎裂 / 回到肉身"这类碎片\n- 苗广**完全不知道**有神魂空间这回事——他只知道"云霜凝不对劲,他在摇她醒"\n- 云霜凝被摇醒时带神魂残留(潮红/气息/无意识呢喃)——苏斌需要用"治疗恍惚/瞑想深入"解释\n\n▍起疑不目击(神魂版特殊性)\n- 苗广看到的只是"云霜凝恍惚 / 苏斌紧张"这类线索\n- 苗广**不会看到任何神魂空间内部的事**——神魂是绝对私密的空间\n- 苗广可能怀疑"他们在搞什么",但**无法指向"神魂空间"这个概念**\n- 唯一可触及的问题是"为什么云霜凝这副样子",苏斌用"治疗恍惚"类说法掩饰\n\n▍掩饰难度 · 神魂版更高\n- 云霜凝**无法立刻正常对话**——从神魂出来恍惚状需要时间\n- 苏斌的掩饰窗口受"云霜凝恢复速度"限制\n- 按 data card 里云霜凝信任度/防线判断配合度\n\n▍绝对禁止\n- ✗ 禁止苗广进入神魂空间(他不知道它存在)\n- ✗ 禁止苗广当场识破"神魂空间"这个概念\n- ✗ 禁止具体道具让苗广看清\n- ✗ 禁止苗广当场爆发\n- ✗ 禁止推进治疗数值\n- ✗ 禁止替 {{user}} 说话或做决定\n- ✗ 禁止写数值变化',__打断结束__:e=>e._打断自神魂空间?'[打断治疗·神魂版·结束·叙事原则·必读]\n\n本场是"打断冻结的最后一楼,苗广从云霜凝房间离开"的场景。\n核心:**苗广在云霜凝的卧房(他刚才摇她醒),而苏斌肉身不在场——\n神魂版下苏斌在"刚才入神时所在的位置",和苗广不面对面**。\n\n▍主场景: 苗广从云霜凝房间离开\n- 苗广结束探视,起身离开——由头由 AI 自主生成\n- 云霜凝可能已从神魂恍惚中缓慢恢复(视她的信任度/防线自主判断),或仍装作虚弱\n- 苗广离开时神情: 按 data card 心态综合(疑心 / 若无其事 / 难堪 等)\n- 房间只剩云霜凝,她可能静躺沉思,或小声唤 {{user}}(神魂已切断无法连接)\n\n▍苏斌视角(简短侧写, 约 100-150 字)\n- 苏斌肉身在"刚才入神时所在的位置",**具体位置由 AI 按情境自主决定**\n- 他知道"神魂连接被切断",默默等冻结结束或玩家下一步操作\n- 不写"苏斌和苗广面对面"——他们这一场 了洛书晴的闺房空间)。\n退出后按**上文上下文**自然承接原来的现实场景——{{user}} 意识从她的空间抽离 → 睁眼看到当时的物理环境。进入前在哪就回到哪,不要凭空切换场景。\n若上下文中进入前的位置不确定或久远模糊,默认兜底为云霜凝卧房(最常见的入口位置)。\n\n${n<3?`⚠️ 洛书晴当前阶段 ${n}<3,她**物理上不在寒霜门**,神魂空间是目前唯一的接触途径。\n**绝对禁止**写 {{user}} 睁眼看到洛书晴、洛书晴送他出门、两人现实告别、洛书晴现实登场 等"洛书晴出现在物理场景"的情节。`:`洛书晴阶段 ${n}>=3 虽已可在现实登场,但**此刻**她仍在自己的闺房空间,**不与 {{user}} 物理同处一地**。退出叙事不应让她在现实场景中出现。`}`}return e._神魂记忆场景?`${t} 记忆场景「${e._神魂记忆场景}」结束。回到现实——记忆中的称呼、身份、时代背景到此为止，${n}恢复为当前时代的身份和自称。`:t},__地仙境突破__:()=>'[地仙境突破·叙事原则·必读]\n\n本场是云霜凝**一次性**插入提及"修为突破到地仙境,千晶幻术解锁"。\n核心:**顺口带过,不另起场景,不打断当前剧情主线**。\n\n▍必须带到的事实\n- 修为从被寒毒压制恢复到地仙境\n- 千晶幻术可以使用(改写记忆的工具,用于应对苗广)\n\n▍篇幅约束\n- 短促,一两句带过,不写大段描写\n- 插入后继续当前剧情,不切换场景\n\n▍语气参照\n- 按当前云霜凝数据(心理防线/信任度/治疗阶段/对 {{user}} 态度)自主综合\n- 按当前苗广心态(data card)判断她的用词含蓄度\n\n▍绝对禁止\n- ✗ 禁止铺垫突破过程 / 功法描写 / 修炼细节\n- ✗ 禁止立刻演绎"千晶幻术使用"——使用由玩家独立触发\n- ✗ 禁止写数值变化\n- ✗ 禁止替 {{user}} 说话或做决定',__坏结局_愤怒__:()=>'[坏结局·愤怒·叙事原则·必读]\n\n本场是苗广**确认全部真相后愤怒爆发**的一次性终局场景(游戏结束)。\n核心:**苗广不再隐忍,愤怒公开化,从此不可挽回**。\n\n▍必然成立的情境事实\n- 苗广已完全确认 {{user}} 和云霜凝之间发生了超出"治疗"范畴的事\n- 三百年修为压不住怒火,所有忍耐的理由(夫人的病)已不再重要\n- 结局必然: {{user}} 被逐出寒霜门,治疗终止,云霜凝被苗广带走,不可挽回\n\n▍定调\n- 苗广是元婴期修士 + 三百年道侣\n- 爆发形态(动用修为 vs 冷面宣判 vs 其他) 由 AI 按苗广当前心态 / 云霜凝是否在场 / 情境综合自主决定\n\n▍篇幅约 300-500 字\n\n▍绝对禁止\n- ✗ 禁止写苗广原谅 / 和解 / 给第二次机会\n- ✗ 禁止苗广感知具体道具(蚀心露 / 隔音灵阵 / 千晶幻术等)\n- ✗ 禁止输出任何 SET 命令或数值变化\n- ✗ 禁止替 {{user}} 说话或做决定'},xn={新婚夜:'神魂空间·记忆场景：云霜凝的新婚之夜。三百年前苗广喝得酩酊大醉倒在外间不省人事，洞房内云霜凝独坐盖头未揭等了一夜。现在{{user}}出现在这段记忆中，站在当年苗广该站的位置。她意识到{{user}}闯入了自己最私密的记忆——但这是她自己的潜意识将{{user}}拉进了这里。',寒毒初发:'神魂空间·记忆场景：某个深夜寒毒第一次发作，她独自承受剧痛，不让任何人知道。{{user}}出现在这段记忆中，看到了她最脆弱的时刻。',掌门登位:'神魂空间·记忆场景：万人跪拜的登位大典，她站在最高处，威仪凛然却无人可说话。{{user}}出现在人群中，是唯一一个没有跪下的人。',苗广求药归来:'神魂空间·记忆场景：苗广满身狼狈带回又一味无用的药，她看在眼里不说话。{{user}}出现在这段记忆中，看到了她对丈夫的复杂感情。',独修长夜:'神魂空间·记忆场景：三百年中某个寻常夜晚，冰寒入骨，无人陪伴。她独坐修炼，寒毒啃噬经脉。{{user}}出现在这段记忆中，第一次感受到她三百年的孤独。',师尊离世:'神魂空间·记忆场景：她最后一个亲近之人离世，从此再无软肋。{{user}}出现在这段记忆中，看到她在师尊灵前最后的眼泪。',苗喧幼时:'神魂空间·记忆场景：苗喧小时候叫她"娘亲"，她不知如何回应，只是僵硬地摸了摸他的头。{{user}}出现在这段记忆中，看到了她笨拙的母性。'};const Dn={A:['苗喧路过母亲寝殿时，看到那个凡人弟子又进去了。他撇了撇嘴，加快脚步走过——一个没有灵根的废物，能治好母亲？父亲到底在想什么。','练功间隙，苗喧想到今天在走廊上遇到那个凡人。对方冲他点头行礼，他没理。一个山村来的土包子，配踏进寒霜门的门槛吗？','苗喧站在演武场上，一剑劈碎了三块灵石靶。旁边的师弟们鼓掌叫好。他收剑入鞘的时候想：母亲的病，不应该交给一个凡人。'],B:['苗喧从母亲寝殿方向经过时放慢了脚步。里面很安静——太安静了。以前治疗时至少能感到灵力波动，现在什么都没有。他站了一会儿，还是走了。','吃晚饭的时候，苗喧注意到父亲在发呆。筷子停在半空，目光看着某个方向。"爹？"苗广回过神来，笑了笑。那个笑容有点不对。','苗喧今天在后山练剑时分了神，被自己的剑气划伤了手指。他低头看着伤口，不知道为什么突然想到：母亲的治疗，到底在治什么？'],C:['深夜，苗喧路过父亲的房间。门缝透出灯光——父亲还没睡。他听到里面有走动的声音，来回、来回。苗喧抬起手想敲门，最终放下了。','苗喧今天看到父亲站在母亲寝殿外面。不是在守候，是在……发愣。目光涣散，嘴唇微微动着，像在自言自语。苗喧叫了一声"爹"，苗广吓了一跳。','苗喧试图找父亲谈母亲的治疗进展。苗广的回答很短："在治。会好的。"然后转身离开了。以前他不是这样的——以前他会详细地说每一步进展。'],D:['苗喧第一次觉得父亲变了。不是某个具体的瞬间——是一种累积的、说不清的变化。父亲看那个凡人的眼神不再是"师父看弟子"，而是……他说不上来。但那个眼神让他胃里发紧。','苗喧今天跟父亲说话时，苗广的目光从他脸上滑过，落在身后某个方向——那个凡人走过的方向。苗喧回头看了一眼，再转回来时，父亲的表情已经恢复了。"没什么，"苗广说。','苗喧半夜醒来，发现父亲不在房间。他在寒霜门的走廊里找到了苗广——父亲靠在母亲寝殿外的墙壁上，坐在地上。听到脚步声才匆忙站起来。"练功太晚了，"苗广说。苗喧没有追问。'],E:['苗喧看到父亲给那个凡人端茶。不是随手递过去——是双手奉上。那个动作太恭敬了，不像师父对弟子。苗喧张了张嘴，但不知道该问什么问题。问出来的话，答案可能比问题更可怕。','苗喧今天在走廊上跟那个凡人擦肩而过。对方看了他一眼，那个眼神——不是弟子看师兄的眼神。那里面有一种苗喧无法命名的东西。他第一次在那个凡人面前感到了不安。','苗喧坐在后山的崖壁上，看着远处寒霜门的屋顶。他的家在那些屋顶下面。但最近，每次走进家门，他都觉得那个空间在变小。有什么东西挤进了他的家，把属于他的位置一点点蚕食掉了。'],F:['苗喧看到了。父亲跪在那个凡人面前，双手奉茶。父亲的脸上没有痛苦——那才是最让苗喧害怕的。痛苦他能理解。但那种平静的、甚至带着微笑的服从——他的父亲去哪了？','苗喧在后山练剑，一剑比一剑重。灵力暴走，剑气劈进山壁炸出一个深坑。他停下来，浑身发抖。不是累——是他不知道这把剑该对着谁。对着那个凡人？还是对着自己的父亲？还是对着假装一切正常的所有人？','苗喧走过母亲寝殿时听到了笑声。两个人的。他的脚步没有停——但速度变了。更快了。走远之后，他发现自己的指甲在掌心里掐出了血痕。'],G:['"爹，你还记得娘亲出事前那年的中秋吗？你们在后山赏月。""中秋？"苗广想了一下，"那年中秋，你娘跟{{user}}一起赏的月吧？我在值守。"苗喧的血凉了半截。那年他在场。他清楚地记得——那晚只有父亲和母亲。','苗喧试着跟父亲聊往事。每一段记忆都有细微的偏差——原本属于父亲的位置，被替换成了那个凡人。苗广说得很自然，毫无违和。苗喧不再纠正。因为他发现，纠正只会让父亲露出困惑而痛苦的表情——像是有人在撕扯他脑中的什么东西。','苗喧翻出一幅旧画卷——上面是父亲年轻时画的母亲。笔触温柔，题字写着"霜凝吾妻，三百年不改此心。"他把画卷拿给苗广看。苗广看了很久，最后说："画得不错。不过这应该是{{user}}写的字吧？我的字没这么好。"苗喧把画卷收了回来。手在发抖。'],H:['苗喧站在寒霜门的山门口。身后是他出生、长大、练剑的地方。他的母亲在里面，他的父亲也在里面。但那已经不是他的家了。他不知道从什么时候开始，他变成了这个家里多余的那个人。','苗喧在收拾父亲的旧物时，翻到了一枚道侣玉佩——父亲和母亲成婚时的信物。上面刻着两个名字。苗喧把玉佩攥在掌心，握了很久。他是唯一还记得这枚玉佩意味着什么的人了。','所有人都说这是最好的安排。母亲没有反对。父亲在微笑。门中弟子恭贺掌门喜事。苗喧站在人群最后面，看着那个他永远无法理解的画面。他的拳头很紧。但他不知道该挥向哪里。二十年来第一次，结丹期的修为让他觉得毫无意义。']};const Cn={素色道袍:'一件素色道袍——端正合身，几乎无暴露',宽领道袍:'一件宽领道袍——领口宽大，弯腰时春光乍泄',轻纱罩衫:'一件轻纱罩衫——薄如蝉翼，胸部轮廓若隐若现',露肩薄衫:'一件露肩薄衫——双肩裸露，锁骨尽显',交领短衫:'一件交领短衫——交领
