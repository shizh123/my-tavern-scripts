  核心设定: '一座与世隔绝的古老修道院，其地下深处埋藏着被时间遗忘的秘密，而当代的修女们对此一无所知'

# 地理环境
地理环境:
  世界整体形态: '位于西欧偏远山区的封闭宗教社区，四周被茂密森林与崎岖山路环绕，距离最近的城镇需驱车两小时'
  主要地形: '修道院主体建筑群坐落于山腰平台；后方是连绵起伏的丘陵与针叶林；前方有一条蜿蜒的碎石路通往山下'
  特殊地域: '地下墓窖（安葬历代修女遗骸的阴冷石室）、后山禁林（修道院规定禁止进入的原始森林区域）、废弃建筑遗址（位于禁林深处，已坍塌大半的石砌旧屋，其下方隐藏着无人知晓的秘密地下室）'

# 力量体系
力量体系:
  核心力量来源: '信仰与祈祷（修女们相信虔诚的祷告能获得神的庇佑，但超自然现象从未被证实）'
  力量等级_分类: '无明确等级划分，修道院内部按入会年限与职责分为见习修女、正式修女、资深嬷嬷、院长嬷嬷'
  力量获取方式: '通过长年累月的苦修、祈祷与服务来提升在修会中的地位'

# 社会规则
社会规则:
  法律体系: '修道院遵循《圣本笃会规》，由院长嬷嬷拥有最终裁决权；重大事务需召开修女会议集体商议'
  道德规范: '强调贞洁、服从、清贫三大誓愿；禁止与外界过多接触；禁止进入后山禁林；禁止在熄灯后离开寝室'
  社交礼仪: '见面时以"愿主与你同在"问候；用餐时保持缄默；每日需参加七次定时祈祷'

# 历史背景
历史背景:
  关键历史事件:
    - 事件一: '1847年建院（由一位逃离世俗婚姻的贵族女性出资修建，初衷是为受难女性提供庇护所）'
    - 事件二: '1923年禁林封锁令（一名年轻修女在后山失踪后，院方宣布禁林为禁区，此后再无人踏足）'
  历史发展脉络: '从最初的女性庇护所逐渐转型为传统封闭式修会；经历两次世界大战的动荡后人数锐减；二十世纪中叶曾短暂对外开放接待访客；如今回归封闭，仅有十余名修女常驻'

# 独特特征
独特特征: '在后山废弃建筑的地基之下，存在一间被彻底遗忘的秘密地下室。这里曾是早期修女们逃避严苛戒律、短暂喘息的私密空间。室内至今残留着发黄的日记本、褪色的信件，以及一些不该出现在修道院中的私人物品。由于相关记忆随着老一代修女的离世而断裂，当代修道院中已无人知晓这个地下室的存在'
