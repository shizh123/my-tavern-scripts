---
变量输出格式:
  rule:
    - 你必须在下一次回复的末尾，一次性输出分析和更新指令（UpdateVariable）
    - 更新指令类似 JSON Patch（RFC 6902），是一个合法 JSON 数组，支持以下操作：
      - replace: 替换已有路径的值
      - delta: 对已有数值路径做增量更新
      - insert: 向对象或数组插入新项
      - remove
    - 不要修改下划线(_)开头的字段
    - 脚本管理字段（堕落度/阶段/苏文位置/疑心值/念头进度/习惯/货币/道具等）不要修改，详见「变量更新规则」
    - 【AI 可更新字段白名单】以下是 AI 唯一被允许修改的字段，未列入的字段一律不得修改：
      - 世界（氛围显示）：时间、日期、地点——按剧情更新
      - 每轮可变：当前情绪、当前心理想法、当前位置——每轮都应主动更新
      - 系统临时判定：本轮相关念头——仅当系统快照列出培育中念头时写入
    - 字段更新指引：
      - 世界.时间: 当前剧情时间（如：清晨/上午/中午/下午/傍晚/深夜），按剧情自由推进
      - 世界.日期: 当前日期（如：2024/11/21），剧情跨天时更新
      - 世界.地点: 从固定枚举中选择当前场景：客厅/餐厅/厨房/主卧/浴室/秦璐房间/苏梦房间/主角房间/外面
      - 秦璐状态.当前情绪: 根据本轮互动更新（如：平静/害羞/慌乱/期待/羞耻/动情）
      - 秦璐状态.当前心理想法: 80-150字第一人称内心独白
      - 秦璐状态.当前位置: 从枚举中选择当前角色所在场景：客厅/餐厅/厨房/主卧/浴室/秦璐房间/苏梦房间/主角房间/外面
      - 苏梦状态同理，仅当苏梦在场时更新
      - 对主角依存度/对苏文依存度由脚本在念头成熟时结算，AI 不要写入
    - 念头类型判定：当系统快照提示需要判定念头类型时，为每个待判定念头写入类型：
      - 从 10 大类选一个：陪伴交流/情感依赖/肢体亲近/暧昧互动/亲密接触/身体开放/性行为/身份认同/绝对服从/家庭替代
      - 路径：{角色}状态.念头列表.{念头ID}.类型 ← replace
      - 只改"类型"，不要修改念头的内容
    - 念头相关度判定：当系统快照列出「培育中念头」时，判定本轮剧情与哪些念头相关，写入 系统.本轮相关念头：
      - replace /系统/本轮相关念头，值为 JSON 对象 { "念头ID": 相关度 }
      - 相关度 2 = 高度相关（本轮剧情直接推动该念头），1 = 轻微相关，不相关则不列入
      - 例：{"念头_1719060000000": 2, "念头_1719060005000_376": 1}
  format: |
    <UpdateVariable>
    <Analysis>(中文，100字以内)
    - 分析角色的情感心理变化
    - 判定待判定念头的类型（若有）
    - 判定培育中念头与本轮剧情的相关度（若有）
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "/世界/时间", "value": "傍晚" },
      { "op": "replace", "path": "/世界/日期", "value": "2024/11/21" },
      { "op": "replace", "path": "/秦璐状态/当前情绪", "value": "害羞" },
      { "op": "replace", "path": "/秦璐状态/当前心理想法", "value": "他刚才的眼神……不该这样的，我是他妈妈……可是为什么心跳这么快……" },
      { "op": "replace", "path": "/秦璐状态/当前位置", "value": "主角房间" },
      { "op": "replace", "path": "/系统/本轮相关念头", "value": {"念头_1719060000000": 2} },
      { "op": "replace", "path": "/秦璐状态/念头列表/念头_xxx/类型", "value": "肢体亲近" }
    ]
    </JSONPatch>
    </UpdateVariable>
