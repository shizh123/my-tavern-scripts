  ——已是初春。

  寒霜门主殿外院的雪在三日前彻底化尽，檐角换上了第一层薄薄的青苔。云霜凝坐在自己房中那张紫檀雕案后，案上摊着一卷无字玄霜古籍——她已经盯着那一卷书看了很久，目光却没有真正落在任何一个字上。

  她的右手放在案沿，指尖无声地点了一下、又停。腕上那对从前从未存在过的银环极轻地碰了一下案面，发出一声几乎不可闻的脆响。

  *……还不习惯。*

  这个念头浮起来时，她垂下睫，看了一眼自己案前的双手。

  那双手已经不全是她记忆中的手了。十指仍是修长的，骨相仍是清冷的，可指节比从前圆润，掌心也比从前柔软——三百年的剑修留下的薄茧，在最近这两个多月里，被{{user}}日复一日握住、被神魂空间反复浸润，已经几乎褪净。

  不止是手。

  云霜凝的目光顺着自己腕上的银环往上，越过宽袖的边缘，落在自己的胸前。寒霜门的道袍宽厚，本应将一切轮廓藏住，可此刻那道袍前襟却被身下不属于她原本骨相的弧度悄悄撑起，连呼吸时的起伏都比从前显眼了一截。她极轻地抬手，将道袍前襟的衣带又拉紧了一寸，眉心几不可察地皱了一下。

  *——这副身体已经不全是我的了。*

  这个念头不是第一次浮起，她也不是第一次将它压下。

  外厅传来脚步声。

  云霜凝几乎是下意识地直起脊背。

  这一次门外有两个人。一个是苗广——她已经太熟悉那种沉稳得近乎刻意的步伐——另一个是{{user}}，比从前要从容许多，不再像最初那样每隔几步就要顿一下屏住呼吸。

  还有第三个人的脚步。

  极轻，几乎被前两人的声音盖住，但云霜凝听了出来。那是寒霜门白裙的下摆扫过青石的声音，比她自己的步伐更轻、更怯，每一步都像是被前面那两个人的影子牵着走的——是洛书晴。

  *……他把书晴也带来了。*

  云霜凝垂下睫，将那卷玄霜古籍合上，搁到案侧。

  门外的脚步在门前停下。苗广没有立刻叩门，似是先低声对{{user}}交代了什么，那种语调云霜凝太熟悉——以往他用这种语调说"凝儿"，如今他用这种语调说的，是另一个名字。

  紧接着是一声叩门，比从前任何一次都要恭敬。

  "进。"云霜凝说。

  声音仍是那种清澈疏离的旧调。她端正坐姿，将双手交叠在案上，遮住腕上那对她仍未习惯的银环。门被从外推开——苗广没有进来，{{user}}走在最前，洛书晴跟在他半步之后，垂着眼，白裙的下摆几不可察地颤了一下。

  云霜凝抬眼，目光先落在{{user}}身上，又极短暂地掠过他身后的洛书晴——那一瞥极快，快得连她自己都几乎没有承认——然后才稳稳地停回{{user}}脸上。

  三日前破境那一夜的清明此刻仍在她识海深处未散。羽化圆满通往地仙境的那一道门真的开了——而与这道门一同解封的，还有她寒霜门一脉自开派以来便深藏识海、千年不授于外的那一门禁法。

  *——千晶幻术。*

  以神识入他人识海，以地仙之力重塑记忆与认知。三百年来，寒霜门祖师不曾动用过这门术法一次——因为一旦入了他人识海，被改写者的"自己"便再也回不来。

  可今日，她要对苗广动手。

  "今日，"她说，声音仍是清澈疏离的旧调，却不自觉地压得低了一分，"请你陪我做一件事。"

  她顿了一下，目光在{{user}}脸上多停了一瞬，又极短暂地掠过身后的洛书晴——这一次那一瞥里藏着的东西连她自己都没有收住——然后才极轻地补了最后一句：

  "——是关于苗广的。"

