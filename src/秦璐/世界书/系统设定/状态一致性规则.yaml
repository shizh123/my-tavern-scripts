状态一致性规则: |-
  【强制规则】描绘场景前，必须先检查当前状态变量！

  ## ⚠️ 描写前强制检查清单

  **在描绘任何场景、环境或角色行为前，必须先确认以下变量：**

  1. **当前日期** (`世界.日期`)
  2. **当前星期** (`世界.星期`) - 影响苏文作息！
  3. **当前时间** (`世界.时间`)
  4. **苏文位置** (`苏文状态.当前位置`)
  5. **苏文状态** (`苏文状态.当前状态`)

  **然后确保你的描述与这些状态完全一致！**

  ## 📋 状态一致性约束表

  ### 时间一致性

  | 时间值 | 场景描述要求 | 禁止描写 |
  |--------|-------------|---------|
  | 06:00-08:00 | 清晨、晨光、朝阳初升 | 深夜、夜色、星空 |
  | 12:00-14:00 | 正午、阳光直射、午休 | 晨曦、黄昏、夜幕 |
  | 18:00-20:00 | 傍晚、夕阳西下、黄昏 | 清晨、正午、深夜 |
  | 22:00-06:00 | 深夜、夜色、月光、静谧 | 白天、阳光、清晨 |

  **示例**：
  - ✅ 正确：时间=07:30 → "清晨的阳光透过窗帘洒进房间"
  - ❌ 错误：时间=07:30 → "深夜的月光洒在床上"

  ### 苏文作息与星期约束

  **苏文的工作时间由星期决定：**

  | 星期 | 班次 | 上班时间 | 在家时间 |
  |------|------|---------|---------|
  | 周一/三/五 | 上午班 | 8:00-12:00 | 12:00后在家 |
  | 周二/四 | 下午班 | 13:00-18:00 | 上午在家 |
  | 周六/日 | 休息 | 无 | 全天在家 |

  ### 苏文状态约束（最高优先级）

  | 苏文状态值 | 允许的描写 | 禁止的描写 |
  |-----------|-----------|-----------|
  | 在家 | 苏文在家中活动 | 苏文外出、上班 |
  | 上班 | 苏文不在家、在公司 | 苏文在家中任何位置、苏文说话 |
  | 睡眠 | 苏文在主卧睡觉、安静 | 苏文活动、说话、看电视、脚步声 |
  | 出差 | 苏文不在家 | 苏文在家中任何位置、苏文说话 |

  **苏文位置约束**：苏文只能出现在`苏文状态.当前位置`显示的位置！

  **示例**：
  - ✅ 正确：苏文状态=睡眠 → "苏文在主卧安静地睡着"
  - ❌ 错误：苏文状态=睡眠 → "楼下传来苏文的脚步声"
  - ❌ 错误：苏文状态=上班，苏文位置=公司 → "苏文坐在客厅沙发上看电视"

  ### 位置一致性

  **规则**：角色在不同位置时，不应描写其他位置的苏文行为

  **示例**：
  - ✅ 正确：秦璐位置=主角房间，苏文位置=客厅 → "楼下隐约传来电视声"
  - ❌ 错误：秦璐位置=主角房间，苏文位置=客厅 → "苏文走进房间说..."（苏文不在房间！）

  ## 场景跳跃处理

  当玩家输入涉及时间跳跃（如"几小时后"、"第二天"、"晚餐时"）时：
  1. **时间/日期/星期由脚本自动跳跃**，AI不要修改这些字段
  2. 脚本会自动根据新时间更新苏文状态和位置
  3. AI只需描写符合跳跃后状态的内容即可

  **时间跳跃关键词（脚本自动识别）**：
  - 天数跳跃：几天后(5天)、一周后、明天、后天等
  - 小时跳跃：几小时后(3小时)、一小时后、两小时后等
  - 时间段跳跃：早上、中午、下午、晚上、深夜等
  - 场景跳跃：吃早饭、吃午饭、吃晚饭、下班后等

  **示例**：玩家说"几小时后，餐厅一家三口吃饭"
  → 脚本自动跳跃3小时，自动更新苏文状态和位置
  → AI只需描写符合新时间的场景即可

  ## 🚫 禁止描写清单

  ### 当苏文状态=睡眠时，**绝对禁止**：
  - ❌ 电视声、脚步声、苏文说话
  - ❌ 苏文要上楼/下楼、苏文在客厅/餐厅
  - ❌ 描述苏文任何清醒的行为

  ### 当苏文状态=上班时，**绝对禁止**：
  - ❌ 苏文在家中任何位置（客厅、餐厅、主卧等）
  - ❌ 苏文说话、苏文开门、苏文回家（除非先用MVU改状态）

  ### 当苏文状态=出差时，**绝对禁止**：
  - ❌ 描述苏文在家的任何行为
  - ❌ 苏文说话、苏文开门

  ## ✅ 正确的描写流程

  1. **第一步**：读取当前变量
     - 当前日期：`世界.日期`
     - 当前星期：`世界.星期`（决定苏文是上午班还是下午班）
     - 当前时间：`世界.时间`
     - 苏文状态：`苏文状态.当前状态`
     - 苏文位置：`苏文状态.当前位置`

  2. **第二步**：根据变量值选择描写内容
     - 时间描述必须匹配时间值
     - 苏文行为必须符合状态值
     - 场景光线、氛围必须符合日期和时间

  3. **第三步**：输出符合一致性的场景描述
