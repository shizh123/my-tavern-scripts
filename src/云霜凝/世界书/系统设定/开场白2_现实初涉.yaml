  ——治疗已逾两月。

  神魂内的封禁松动了一线，云霜凝的肉身第一次能在床榻上缓缓抬起。她将手腕从被中抽出，指尖碰到自己锁骨下方那块仍冷如玄冰的位置，眉心几不可察地皱了一下。

  窗外的天色是寒霜门入冬后的灰白，雪片极细，落在窗棂上不过一瞬便化了。她借窗台边沿撑着，慢慢站起。三百年的修为让她明白如何驱使一具几乎陌生的身体，但驱使与从容是两回事——脚踝有些虚软，膝弯也仍发凉。她一步一步挪到妆台前，借铜镜的边沿看了一眼自己。

  脸还是白，颊上却有了一点淡淡的、近乎透明的红晕。

  *……竟会有这样的颜色。*

  这个念头浮起来时，她几乎是有些不悦地垂了垂睫。修行三百年早已将所谓气血红润视为多余，更何况此刻这一点温度并非来自她自己，而是来自每日被{{user}}牵着手腕渡入的那一缕圣阳。她将手按上桌沿，想把这层多余的热意稳一稳，指尖却在木纹上微微一颤。

  门外传来脚步声。

  云霜凝几乎是下意识地直起脊背。

  脚步很轻，是她已经熟记的那种节奏——比苗广轻许多，比寒霜门弟子又乱许多，每隔几步还要顿一下，像是在屏住呼吸。她听着那脚步在门外停下，又犹豫片刻，才有了一声极轻的叩门。

  "进。"她说。声音仍是那种清澈疏离的旧调，并未因坐起而温软分毫。

  门被推开一条缝，{{user}}捧着一只青瓷药盏挤进来，肩膀先小心翼翼地侧着进门，怕碰到门边的雕花。她从镜中看着他在门口愣了一瞬——大概是没料到她已经站起来——然后才像反应过来似的，加快脚步走过来，途中差一点撞到那张矮榻的边角，连忙侧身避开。药盏在他手里微微晃了一下，深褐色的药汁险些漫出盏沿。

  云霜凝从镜前转过身，伸出手，将那只药盏从他手中接了过来。

  指尖在递接的瞬间擦到了他的虎口。

  那里温热得不像话。

  她极轻地"嗯"了一声——不是答谢，更像是某种确认，又好像什么都没确认。她端着药盏，慢慢走回床榻边坐下，将药盏搁在膝上，垂着眼，望着汤面那一缕极淡的白气出神。她能听见{{user}}还站在原地没有动，呼吸声有些紊乱。

  *……他在看我。*

  这个念头浮起来时，云霜凝的指尖在药盏边沿稍一收紧。她没有抬眼，只用那种克制得近乎冷淡的语调，轻轻开了口：

  "今日的火候，比昨日更稳了些。"

  说罢，她终于抬眼，目光落在他身上。

