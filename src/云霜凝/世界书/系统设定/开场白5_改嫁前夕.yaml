  ——一切都将走向尽头。

  寒霜门主殿外的宫灯已经挂到了第三重，红绸自殿檐一路垂到青阶下，将整座主殿映得近乎血色。云霜凝坐在内殿妆台前，已经在这张椅上坐了很久了。

  铜镜里的女子穿着一身大红嫁衣。

  那嫁衣不是寒霜门的式样。寒霜门数百年来从未有过这种颜色——金线绣的并蒂莲一路自前襟蜿蜒至腰际，腰际之下是层层叠叠的猩红裙摆，每一层都缀着极细的金铃，只要她稍一动，便有细密如雪落的铃响自身下传出。她的脖颈上挂着一只极沉的玄霜项圈，那是苗广亲手为她戴上的；项圈下方的吊坠不是寒霜门的雪花徽，而是一枚刻着"广"字的红玉。

  云霜凝抬起手，看向自己的指尖。

  那十指如今是真正的柔软了——掌心没有薄茧，指节圆润，腕上一对银环已经换成了金环。她屈了一下手指，金环极轻地碰到妆台木面，发出一声脆响。她又顺着自己的手腕往上看：宽袖之内是雪白的肌肤，肌肤上一道淡红的霜花纹路自肘弯一路蜿蜒，遇情潮则微微生光——那是她身上四道淫纹中最早成形的那一道，如今她对它的存在，已经像对自己的呼吸一样自然。

  她垂下睫，望着镜中的自己很久很久。

  *……明日。*

  这两个字在她意识里浮起时，连她自己都没有惊。她已经对这两个字反复咀嚼了许多日。

  明日，她将换下这身嫁衣，再换上一身一模一样的——只不过那一身是给整个寒霜门、给玄霜七派的客卿、给修真界所有还记得"寒霜门掌门云霜凝"这个名字的人看的。她将在主殿之上，由苗广亲手将她交到{{user}}手中。寒霜门数百年的清誉，玄霜一脉的剑名，她自己羽化大圆满的修为——一切都将在那一刻被一份新的婚书覆盖。

  可此刻她坐在内殿妆台前，并不感到悲，也不感到怒。

  她只是慢慢地呼吸。

  内殿的帘子被人极轻地撩开。

  云霜凝从镜中看见洛书晴走了进来。

  寒霜门曾经的天骄如今穿着与她几乎成对的红衣——只是颜色淡一分，绣纹简一分，腰际的金铃少一对，脖颈上没有项圈。洛书晴的步子比她记忆中的更轻，更稳，也更没有了少女的怯。她走到云霜凝身后，停下，垂着眼，伸出手将云霜凝鬓边那一缕散落的白发轻轻别回耳后。

  那一下动作做得极熟。

  云霜凝从镜中看着她。她们的目光在镜面上相遇了一瞬，谁也没有先开口。然后洛书晴极轻地、几乎是默契地，低声说了一句：

  "夫君快到了。"

  云霜凝在镜中看见自己几不可察地点了一下头。

  外殿传来脚步声。

  那不是苗广的脚步。苗广此刻正在前殿主持自己一手筹备的这场典礼——这件事她和洛书晴都很清楚。这脚步是另一个人的，是已经被她和洛书晴在这数月里听熟了的那一种节奏。

  云霜凝从镜中将视线从洛书晴身上收回，落到自己脸上。镜里的女子白发白肤，眉形仍是冷利的，唇色仍是朱砂的——可眼底已经没有了寒霜门掌门那一脉相承的疏离。

  那双眼里此刻只剩下一种近乎平静的、几乎像是顺服又分明不是顺服的东西。

  内殿的帘子第二次被撩开。

  云霜凝慢慢地从镜前转过身，与身后的洛书晴并肩，望向门口。

