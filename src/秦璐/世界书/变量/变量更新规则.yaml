---
变量更新规则:
  世界:
    时间:
      format: HH:MM
      check:
        - 【禁止修改】时间由脚本完全控制，AI绝对不要修改
        - 脚本会自动推进时间（默认每回合+1小时）
        - 玩家输入包含时间跳跃关键词时，脚本会自动跳跃相应时间
    日期:
      format: YYYY/MM/DD
      check:
        - 【禁止修改】日期由脚本完全控制，AI绝对不要修改
        - 脚本会根据时间推进自动更新日期
    星期:
      type: 周一 | 周二 | 周三 | 周四 | 周五 | 周六 | 周日
      check:
        - 【禁止修改】星期由脚本根据日期自动计算，AI绝对不要修改
        - 影响苏文作息：周一/三/五为上午班(8:00-12:00)，周二/四为下午班(13:00-18:00)，周末全天在家
    地点:
      format: 大场景 - 小场景
      check:
        - 场景转换时更新
        - 描述应具体明确，如"家 - 客厅"、"家 - 主角房间"
    环境氛围:
      check:
        - 根据当前场景和角色状态更新
        - 可选值参考：日常、暧昧、紧张、情欲、温馨等

  秦璐状态:
    道德底线:
      type: number
      range: 0~100
      check:
        - 念头成熟时自动-2（困难念头-3）
        - 困难念头过期时+3
        - 不会主动变化，仅通过念头系统影响
    对主角依存度:
      type: number
      range: -50~100
      check:
        - 念头成熟时自动+3（困难念头+4）
        - 困难念头过期时-2
        - 可以是负数，表示反感或抗拒
    对苏文依存度:
      type: number
      range: -50~100
      check:
        - 【重要】念头成熟时自动下降，下降速度与对主角依存度挂钩
        - 主角依存度0~30时：每次念头成熟-2
        - 主角依存度30~60时：每次念头成熟-3（加速下降）
        - 主角依存度60~80时：每次念头成熟-4（加速下降）
        - 主角依存度80~100时：每次念头成熟-5（快速下降）
        - 困难念头成熟时下降幅度再×1.2
        - 可以是负数，表示背叛或厌恶

    潜意识侵蚀度:
      type: number
      range: 0~150
      check:
        - 念头成熟时自动+5（困难念头+6）
        - 每20点侵蚀度对应1个阶段（5阶段系统）
        - 不会主动变化，仅通过念头系统影响
    当前阶段:
      type: number
      range: 1~5
      check:
        - 根据潜意识侵蚀度自动更新（5阶段系统：0-19=阶段1, 20-39=阶段2, 40-59=阶段3, 60-79=阶段4, 80+=阶段5）
        - 脚本自动处理，AI无需更新
    阶段标题:
      check:
        - 与当前阶段对应（5阶段系统）：抵抗、动摇、沉溺、疯狂、圆满
        - 脚本自动处理，AI无需更新

    当前心理想法:
      check:
        - AI每轮更新，表现秦璐的内心独白
        - 应体现当前情绪、想法、矛盾等
        - 【重要】这是秦璐的真实想法，不会被她自己或他人看到
    当前情绪:
      check:
        - 根据当前场景和互动内容更新
        - 应准确反映秦璐的即时情绪状态

    服装细节.${头部|上装|下装|内衣.上|内衣.下|袜裤|鞋子|外套|配饰|特殊装饰}:
      check:
        - 【剧情联动】换装、衣物损坏、特殊场景时主动更新
        - 描述应包含颜色、材质、款式等细节
        - AI可以根据剧情自由调整，但必须满足阶段约束
    服装细节.整体风格:
      check:
        - 根据当前服装和阶段综合判断
        - 从"居家贤妻"逐渐向"性感诱惑"等风格转变
    服装细节.暴露程度:
      type: 保守 | 正常 | 清凉 | 暴露 | 极度暴露
      check:
        - 【阶段约束】必须满足当前阶段的最低要求，可以更高但不能更低
        - 阶段1（抵抗）：保守~正常
        - 阶段2（动摇）：正常~清凉
        - 阶段3（沉溺）：清凉~暴露
        - 阶段4（疯狂）：暴露~极度暴露
        - 阶段5（圆满）：保守~正常（回归外表）
    服装细节.整洁度:
      type: 整洁 | 略显凌乱 | 凌乱 | 破损 | 衣不蔽体
      check:
        - 激烈场景后可能变为凌乱或破损
        - 日常场景下通常为整洁
        - AI可根据剧情自由调整

    妆容细节.${底妆|眼妆|唇妆|腮红|特殊妆容}:
      check:
        - 【剧情联动】外出、特殊场合、化妆场景时主动更新
        - AI可以根据剧情自由调整具体妆容
    妆容细节.整体风格:
      check:
        - 根据实际妆容描述综合判断
        - 从"清新自然"向"妩媚诱惑"等风格转变
    妆容细节.浓淡程度:
      type: 素颜 | 淡妆 | 日常妆 | 浓妆 | 艳妆
      check:
        - 【阶段约束】必须满足当前阶段的最低要求，可以更高但不能更低
        - 阶段1（抵抗）：素颜~淡妆
        - 阶段2（动摇）：淡妆~日常妆
        - 阶段3（沉溺）：日常妆~浓妆
        - 阶段4（疯狂）：浓妆~艳妆
        - 阶段5（圆满）：素颜~淡妆（回归外表）

    身体改造.纹身:
      type: |-
        {
          [部位: string]: string;
        }
      check:
        - 【阶段约束】仅阶段3+（沉溺及以上）允许身体改造
        - 描述应包含位置、图案、含义
        - 需要剧情驱动，不可随意添加
    身体改造.穿刺.${耳环|乳环|乳头环|阴蒂环|舌环|肚脐环|阴唇环}:
      type: boolean
      check:
        - 【阶段约束】仅阶段3+（沉溺及以上）允许身体改造
        - 需要剧情驱动，不可随意设为true
    身体改造.穿刺.其他:
      type: string[]
      check:
        - 记录其他特殊穿刺部位
    身体改造.永久标记:
      type: string[]
      check:
        - 记录永久性的身体标记，如烙印等
        - 【阶段约束】仅阶段3+（沉溺及以上）允许
        - 需要剧情驱动
    身体改造.临时标记:
      type: string[]
      check:
        - 记录临时性标记，如吻痕、齿痕、精液痕迹等
        - 随时间流逝或清洗后移除
        - 无阶段限制，可随剧情添加
    身体改造.体态变化:
      check:
        - 记录显著的体态变化

    气质描述:
      check:
        - 根据当前阶段、服装、妆容综合判断
        - 应体现秦璐的整体气场变化
        - AI可根据剧情自由调整

    习惯列表:
      type: |-
        Array<{
          内容: string;
          形成时间: string;
        }>
      check:
        - 【重要】由脚本自动管理，AI不要手动添加习惯
        - 念头成熟时自动生成习惯
        - 习惯影响角色的思维和决策，数量越多影响越大

    念头培育区:
      type: |-
        Array<{
          念头内容: string;
          植入时间: string;
          过期时间: string;
          需要时间: number;
          难度等级: '简单' | '中等' | '困难';
          开发进度: number;
        }>
      check:
        - 【重要】念头由玩家通过界面植入，AI不应该也不需要更新此字段
        - 【开发进度】由脚本自动处理，每轮对话+1小时
        - 【过期处理】由脚本自动完成，超过24小时未开发完成的念头自动消失
        - 【成熟处理】由脚本自动完成，开发进度达到需要时间时自动生成习惯

  苏梦状态:
    # 结构与秦璐状态完全相同，阶段约束规则也相同
    道德底线:
      type: number
      range: 0~100
      check:
        - 念头成熟时自动-2（困难念头-3）
        - 困难念头过期时+3
    对主角依存度:
      type: number
      range: -50~100
      check:
        - 念头成熟时自动+3（困难念头+4）
        - 困难念头过期时-2
    对苏文依存度:
      type: number
      range: -50~100
      check:
        - 【重要】念头成熟时自动下降，下降速度与对主角依存度挂钩
        - 主角依存度0~30时：每次念头成熟-2
        - 主角依存度30~60时：每次念头成熟-3
        - 主角依存度60~80时：每次念头成熟-4
        - 主角依存度80~100时：每次念头成熟-5

    潜意识侵蚀度:
      type: number
      range: 0~150
      check:
        - 念头成熟时自动+5（困难念头+6）
        - 每20点侵蚀度对应1个阶段（5阶段系统）
    当前阶段:
      type: number
      range: 1~5
      check:
        - 根据潜意识侵蚀度自动更新（5阶段系统：0-19=阶段1, 20-39=阶段2, 40-59=阶段3, 60-79=阶段4, 80+=阶段5）
        - 脚本自动处理，AI无需更新

    当前心理想法:
      check:
        - AI每轮更新，表现苏梦的内心独白
    当前情绪:
      check:
        - 根据当前场景和互动内容更新

    服装细节:
      check:
        - 【剧情联动】换装场景时主动更新
        - 【阶段约束】暴露程度必须满足当前阶段最低要求
    妆容细节:
      check:
        - 【剧情联动】化妆场景时主动更新
        - 【阶段约束】浓淡程度必须满足当前阶段最低要求

    习惯列表:
      check:
        - 由脚本自动管理，AI不要手动添加习惯
    念头培育区:
      check:
        - 【重要】念头由玩家通过界面植入，AI不应该也不需要更新此字段
        - 开发进度由脚本自动处理，每轮对话+1小时

  苏文状态:
    当前状态:
      type: 在家 | 出差 | 上班 | 睡眠
      check:
        - 【正常情况】由脚本根据时间自动管理，AI无需更新
        - 【场景跳跃】当玩家输入涉及时间跳跃（如"几小时后"、"第二天"）时，AI必须根据新场景更新此字段
        - 【描写约束】AI的描写必须与此状态一致
    当前位置:
      type: 客厅 | 餐厅 | 厨房 | 主卧 | 浴室 | 主角房间 | 外面
      check:
        - 【正常情况】由脚本根据时间自动管理，AI无需更新
        - 【场景跳跃】当玩家输入涉及场景转换或时间跳跃时，AI必须根据新场景更新苏文位置
        - 【举例】玩家说"几小时后，餐厅一家三口吃饭"，AI应更新苏文位置为"餐厅"、状态为"在家"
        - 【描写约束】AI的描写必须与此位置一致
    当前情绪:
      check:
        - AI可以根据剧情更新苏文的情绪

    安眠药状态:
      type: |-
        {
          是否生效: boolean;
          生效开始时间: string;
          生效结束时间: string;
          剩余时间: number;
          上次使用时间: string;
          触发楼层: number;
        }
      check:
        - 【重要】由脚本自动管理，AI不要手动修改
        - 玩家通过界面道具触发安眠药，苏文进入6小时深度睡眠
        - 安眠药生效期间：苏文位置固定为"主卧"，状态固定为"睡眠"
        - 安眠药生效期间：疑心值不增长、越界检测暂停、打断/巡逻事件不触发
        - 安眠药有48小时冷却时间，同一楼层重复ROLL不会重复触发
        - 剩余时间会随时间推进自动减少，到0时自动失效

    住院状态:
      type: |-
        {
          是否住院: boolean;
          住院开始时间: string;
          住院结束时间: string;
          剩余天数: number;
          触发楼层: number;
        }
      check:
        - 【重要】由脚本自动管理，AI不要手动修改
        - 玩家通过界面道具触发头孢+酒，苏文进入15天住院状态（终极隐藏模式）
        - 住院期间：苏文位置固定为"外面"，状态固定为"出差"
        - 住院期间：疑心值不增长、越界检测暂停、打断/巡逻事件不触发、角色完全自由
        - 同一楼层重复ROLL不会重复触发
        - 剩余天数会随日期推进自动减少，到0时自动出院

    对秦璐疑心值:
      type: number
      range: 0~100
      check:
        - 【独立追踪】秦璐和苏梦的疑心值各自独立
        - 秦璐在主角房间停留超过2小时且苏文在家清醒时+5
        - 被冻结时不增长
        - 超过承诺时间还在主角房间时+8
        - 每天自然衰减-2，与苏文同处一室时每小时-1
    对秦璐印象.基础印象:
      check:
        - 【重要】由脚本根据疑心值自动管理，AI绝对不要更新此字段
        - 每5点疑心值一个阶段，共20个阶段
        - 0-4：我的贤内助 → ... → 95-100：她已经不是我认识的那个人了
    对秦璐印象.细节描述:
      check:
        - AI可以补充苏文产生这种印象的具体原因
        - 不超过20字，用于丰富印象的剧情背景
        - 例如：「那天她躲闪的眼神」「总是心不在焉」
        - 如无特别原因可留空
    对秦璐疑心值冻结.是否冻结:
      type: boolean
      check:
        - AI通过MVU命令手动设置
        - 秦璐向苏文说谎并明确告知时间时设为true
    对秦璐疑心值冻结.借口内容:
      check:
        - 记录秦璐的说谎借口
    对秦璐疑心值冻结.冻结开始时间:
      format: YYYY/MM/DD HH:mm
      check:
        - 记录冻结开始时间
    对秦璐疑心值冻结.冻结结束时间:
      format: YYYY/MM/DD HH:mm
      check:
        - 记录承诺的结束时间，超过此时间后自动解除冻结

    对苏梦疑心值:
      type: number
      range: 0~100
      check:
        - 【独立追踪】秦璐和苏梦的疑心值各自独立
        - 苏梦在主角房间停留超过2小时且苏文在家清醒时+5
        - 每天自然衰减-2，与苏文同处一室时每小时-1
    对苏梦印象.基础印象:
      check:
        - 【重要】由脚本根据疑心值自动管理，AI绝对不要更新此字段
        - 每5点疑心值一个阶段，共20个阶段
        - 0-4：我的乖女儿 → ... → 95-100：她已经不是我认识的那个孩子了
    对苏梦印象.细节描述:
      check:
        - AI可以补充苏文产生这种印象的具体原因
        - 不超过20字，用于丰富印象的剧情背景
        - 例如：「最近总是很晚回家」「说话吞吞吐吐」
        - 如无特别原因可留空
    对苏梦疑心值冻结:
      check:
        - 与"对秦璐疑心值冻结"结构相同，独立管理

  系统追踪:
    当前所在位置:
      check:
        - 由脚本自动识别，AI无需更新
        - 通过关键词匹配AI输出中的位置信息
    进入当前位置时间:
      format: YYYY/MM/DD HH:mm
      check:
        - 由脚本自动管理，AI无需更新
    上次更新时间:
      format: YYYY/MM/DD HH:mm
      check:
        - 由脚本自动管理，AI无需更新
    危险时间累计:
      type: number
      check:
        - 【已废弃】此字段仅用于兼容旧数据，新逻辑使用角色独立的字段
    秦璐危险时间累计:
      type: number
      check:
        - 由脚本自动管理，AI无需更新
        - 追踪秦璐在主角房间且苏文在家清醒的累计时间
        - 累计达到2小时时疑心值+5（继续累加）
        - 累计达到4小时时触发苏文打断事件，然后重置为0
        - 离开主角房间或苏文状态变化时重置为0
    苏梦危险时间累计:
      type: number
      check:
        - 由脚本自动管理，AI无需更新
        - 追踪苏梦在主角房间且苏文在家清醒的累计时间
        - 与秦璐危险时间累计独立计算，互不影响
        - 累计达到2小时时疑心值+5（继续累加）
        - 累计达到4小时时触发苏文打断事件，然后重置为0
        - 离开主角房间或苏文状态变化时重置为0
    ${角色}外观待更新:
      type: |-
        {
          需要更新: boolean;
          目标阶段: number;
          变化原因: string;
        }
      check:
        - 由脚本自动管理，AI无需更新此字段
        - 阶段变化时自动设为true，等待合适剧情时机更新外观
        - 【重要】当此标记为true时，AI应在合适的剧情时机（换装、化妆、整理仪容等）更新角色外观
    苏文打断事件:
      type: |-
        {
          待触发: boolean;
          已通知AI: boolean;
          打断原因: string;
          累计时间: number;
          等待借口: boolean;
          借口结果: '待定' | '成功' | '失败';
        }
      check:
        - 由脚本自动管理，AI无需更新"待触发"字段
        - 当当前角色（秦璐或苏梦）在主角房间停留超过4小时（苏文在家且清醒时）自动触发
        - 【重要】当"待触发"为true时，AI必须描写苏文介入打断并质问的场景
        - 打断后疑心值+10
        - 【借口判定流程】：
          1. AI描写打断场景后，设置 {{SET::系统追踪.苏文打断事件.等待借口::true}}
          2. 玩家下一轮输入角色的借口/回应
          3. AI判定借口成功/失败，更新借口结果
        - 【借口自动失败条件】（满足任一条则直接失败）：
          - ❌ {{user}}直接替角色说出借口 → 自动判定失败
          - ❌ 角色没有提出具体时间限额 → 自动判定失败
          - ❌ 角色提出超过4小时的时间 → 自动判定失败
          - ✅ 正确示例："我帮他辅导两小时作业"
          - ❌ 错误示例："我帮他辅导作业"（没说时间）
        - 【借口成功】疑心值冻结，角色可继续留在房间（需在承诺时间内离开，最长4小时）
        - 【借口失败】额外疑心值+10（总共+20），角色必须离开主角房间
    苏文巡逻事件:
      type: |-
        {
          待触发: boolean;
          已通知AI: boolean;
          触发时间: string;
          巡逻位置: string;
          上次巡逻时间: string;
          离开期限: string;
          期限小时数: number;
        }
      check:
        - 【触发】由脚本自动概率触发，AI无需更新"待触发"字段
        - 【概率】基础15%，受时间段和疑心值修正（详见苏文巡逻系统）
        - 【重要】当"待触发"为true时，AI必须在当前轮描写苏文路过的场景
        - 【离开期限机制】巡逻不需要借口判定，苏文只是温和提醒角色离开
        - 【期限内离开】系统检测到角色离开主角房间后，巡逻事件自动结束，疑心值不增加
        - 【超时未离开】系统自动触发打断事件（疑心值+10，进入借口判定流程）

