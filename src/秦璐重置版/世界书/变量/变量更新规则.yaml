---
变量更新规则:
  强制只读字段:
    说明: 以下字段由系统管理，AI 不要修改
    列表:
      - /秦璐状态/堕落度
      - /秦璐状态/当前阶段
      - /秦璐状态/阶段标题
      - /秦璐状态/对主角依存度
      - /秦璐状态/对苏文依存度
      - /苏梦状态/堕落度
      - /苏梦状态/当前阶段
      - /苏梦状态/阶段标题
      - /苏梦状态/对主角依存度
      - /苏梦状态/对苏文依存度
      - /苏文状态/当前状态
      - /苏文状态/当前位置
      - /苏文状态/对秦璐疑心值
      - /苏文状态/对苏梦疑心值
      - /秦璐状态/念头列表/*（其中"类型"字段除外，AI 需判定写入）
      - /苏梦状态/念头列表/*（其中"类型"字段除外）
      - /秦璐状态/习惯列表
      - /苏梦状态/习惯列表
      - /系统/货币
      - /系统/道具状态/*
      - /系统/念头植入日志
      - 所有下划线(_)开头字段

  念头类型判定:
    说明: 当系统快照提示需要判定念头类型时，必须为每个待判定念头写入类型
    可选类型: 陪伴交流/情感依赖/肢体亲近/暧昧互动/亲密接触/身体开放/性行为/身份认同/绝对服从/家庭替代
    注意: 只写入"类型"字段，不要修改念头的内容、状态、难度等其它字段
