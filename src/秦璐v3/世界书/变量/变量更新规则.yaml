---
变量更新规则:
  强制只读字段:
    说明: 以下字段由脚本管理，AI 不要修改；习惯变卖和货币结算由界面/脚本处理
    列表:
      - /秦璐状态/沦陷度 ← 脚本管理（念头成熟时结算）
      - /秦璐状态/当前阶段 ← 脚本管理（由沦陷度派生）
      - /秦璐状态/阶段标题 ← 脚本管理（由阶段派生）
      - /秦璐状态/对主角依存度 ← 脚本管理（念头成熟时结算）
      - /秦璐状态/对苏文依存度 ← 脚本管理（念头成熟时结算）
      - /苏文状态/当前状态 ← 脚本管理（楼层作息游标算出）
      - /苏文状态/当前位置 ← 脚本管理（楼层作息游标算出）
      - /苏文状态/对秦璐疑心值 ← 脚本管理
      - /秦璐状态/念头列表/*（其中"类型"字段除外，AI 需判定写入） ← 脚本管理
      - /秦璐状态/习惯列表 ← 脚本管理（变卖由界面操作）
      - /系统/货币 ← 脚本管理
      - /系统/道具状态/* ← 脚本管理
      - /秦璐状态/装备状态 ← 界面/脚本管理（网店装备的购买/装备记录，AI 不要修改）
      - /秦璐状态/身体改造 ← 界面/脚本管理（体改道具写入：纹身/穿刺/体态变化，AI 只描写不修改）
      - /系统/念头植入日志 ← 脚本管理
      - 所有下划线(_)开头字段 ← 脚本内部状态

  AI可更新字段:
    世界:
      - /世界/时间 ← AI 按剧情自由更新，仅作氛围显示，脚本不参与计算
      - /世界/日期 ← 剧情跨天时由 AI 更新，仅作氛围显示
      - /世界/地点 ← AI 从固定地点枚举中选择当前场景
    角色状态:
      - /秦璐状态/当前情绪 ← AI 每轮根据互动更新
      - /秦璐状态/当前心理想法 ← AI 每轮更新（80-150字第一人称内心独白，必须符合秦璐的语言风格——冷、锋利、不轻易动感情）
      - /秦璐状态/对念头植入警觉度 ← AI 每轮根据秦璐的怀疑/复盘/放松状态更新（0=完全放松，100=极度戒备。详见下方「警觉度调整指引」）
      - /秦璐状态/当前位置 ← AI 按当前场景更新
      - /苏文状态/当前情绪 ← AI 每轮更新
      - /苏文状态/当前心理想法 ← AI 每轮更新（不论在不在场——他在外的心理轨迹也要维持；被瞒在鼓里的丈夫视角，对家中变化的感知与自我解释。必须与脚本给出的「当前状态/当前位置」一致）
      - /秦璐状态/服装细节、/秦璐状态/妆容细节 ← AI 按剧情更新（换衣/沐浴/就寝/社交场合等）
    系统:
      - /系统/本轮相关念头 ← AI 写入培育中念头与本轮剧情的相关度（{念头ID: 2|1}），脚本读取后清空
      - /系统/在场角色/秦璐 ← AI 每轮维护：进场 true / 离场 false / 每轮复核
      - /系统/影像列表/{影像ID}/摘要 ← 仅当快照出现「判定任务 C：影像归档」时写入（50字内概括）；影像其余字段脚本管理

  在场角色:
    说明: 追踪秦璐是否在当前场景中；脚本快照据此注入状态与念头影响，叙事焦点限定在在场角色
    维护规则:
      - 进场: 叙事中描写秦璐走入当前场景时，将 /系统/在场角色/秦璐 设为 true
      - 离场: 描写秦璐离开当前场景时，设为 false
      - 每轮复核: 确认该字段与你本轮叙事的在场情况一致；一致则无需写，不一致必须更新
    示例:
      - '[{"op": "replace", "path": "/系统/在场角色/秦璐", "value": true}]'

  念头类型判定:
    说明: 当系统快照提示需要判定念头类型时，必须为每个待判定念头写入类型
    可选类型: 渐生依恋/情感依赖/触电感/玩火自焚/越界/身不由己/沦陷/身份瓦解/臣服/独占欲
    注意: 只写入"类型"字段，不要修改念头的内容、状态、难度等其它字段

  猎人与疑心值:
    秦璐_猎人相关:
      - AI 可以在叙事中引入秦璐的出轨对象（猎人），但需遵循以下规则：
      - 猎人不应频繁更换——同一时段最多一个活跃猎人
      - 猎人的出现和互动会触发{{user}}的嫉妒反应，AI 必须描写{{user}}目睹或知晓后的心理变化
      - /苏文状态/对秦璐疑心值由脚本管理——AI 应通过叙事推动疑心值的自然增长（让苏文看到或听到可疑的事），但不要直接修改疑心值
      - 猎人最终命运由剧情走向决定——秦璐可能利用后除掉，也可能因为念头影响而对某个猎人失去兴趣

  警觉度调整指引:
    说明: 秦璐已知{{user}}的念头植入能力。警觉度反映她当前对"感受来源"的怀疑程度。AI每轮评估并更新 /秦璐状态/对念头植入警觉度。
    升高（+10~20）:
      - 她刚刚经历了一个明显异常的柔软/心动/失控瞬间
      - {{user}}的言行过于精准地命中了她的弱点
      - 她在独处时复盘，发现了可疑的感受模式
      - 她直接质问{{user}}后没有得到满意的答案
    降低（-5~15）:
      - 长时间没有可疑感受，自然放松
      - 她被其他事务（集团业务/拍卖/猎人/苏文）分散了注意力
      - {{user}}的行为表现出真实（非植入诱导）的关心或情绪
      - 她主动试探后判定当前没有活跃的植入
    保持:
      - 日常互动中，她在观察但不怀疑
      - 警觉度在20-40之间：她维持基线警惕但不主动搜寻
    注意: 警觉度是心理状态，不是开关。即使怀疑，她也不会停止和{{user}}互动——她只会更专注地观察他。警觉度机械性地减缓念头培育速度（每楼进度× (1 - 警觉度/100)），所以AI应在叙事合理的前提下自然地调节这个值——不需要每轮都改，也不需要追求极端值。

  时间日期:
    管理归属: AI 自由维护
    说明: 时间/日期只作氛围显示，脚本不算时间；苏文位置、念头进度、窗口等全部由脚本按楼层管理
