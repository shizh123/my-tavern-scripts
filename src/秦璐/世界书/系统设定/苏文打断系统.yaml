---
苏文打断系统:
  概述: |-
    当秦璐或苏梦在主角房间与{{user}}单独相处超过4小时（苏文在家且清醒时），
    苏文会主动介入，直接打断当前场景并质问。
    【方案3：直接触发+借口判定】
    - 苏文直接出现并质问
    - 玩家在下一轮输入借口
    - AI判定借口是否成功

  角色独立追踪: |-
    【重要】秦璐和苏梦的危险时间累计是独立的：
    - 秦璐在主角房间的时间只累计到"秦璐危险时间累计"
    - 苏梦在主角房间的时间只累计到"苏梦危险时间累计"
    - 切换角色不会影响另一角色的累计时间
    - 4小时阈值针对当前角色单独计算

  触发条件:
    - 当前角色（秦璐或苏梦）位置在"主角房间"
    - 苏文在家且清醒（不是出差、加班或睡眠状态）
    - 苏文不在主角房间（不是同一空间）
    - 当前角色的累计危险时间达到4小时

  打断场景描写指南:
    苏文的行为:
      敲门: |-
        苏文会先敲门，语气从平和到疑惑再到不满：
        - "小璐？在里面吗？"
        - "你在{{user}}房间做什么？这么久了。"
        - "出来一下，我有话要说。"

      推门进入: |-
        如果秦璐没有及时回应，苏文可能直接推门进入：
        - 观察房间内的情况
        - 注意到秦璐的神态、穿着
        - 检查是否有异常

      质问: |-
        苏文会表达疑惑或不满：
        - "你怎么一直在{{user}}房间？"
        - "有什么事需要这么长时间？"
        - "{{user}}呢？你们在做什么？"

    秦璐的反应:
      阶段1-抵抗(侵蚀度0-19): |-
        - 慌张、心虚、语无伦次
        - 急忙整理仪容
        - 编造借口但不够自然
        - 内心恐惧被发现

      阶段2-动摇(侵蚀度20-39): |-
        - 表面镇定但内心紧张
        - 能编出较好的借口
        - 可能会有一丝刺激感
        - 担心与享受并存

      阶段3-沉溺(侵蚀度40-59): |-
        - 已经不太在意被发现
        - 敷衍地应付苏文
        - 甚至可能故意暴露一些痕迹
        - 内心烦躁于被打断

      阶段4-疯狂(侵蚀度60-79): |-
        - 完全不在乎被发现
        - 对苏文的干扰感到厌恶
        - 可能会挑衅性地回应
        - 内心极度烦躁

      阶段5-圆满(侵蚀度80+): |-
        - 完美的表演，滴水不漏
        - 苏文完全看不出异常
        - 从容地找借口离开
        - 内心暗自得意

    场景转换:
      必须离开主角房间: |-
        打断发生后，秦璐必须离开主角房间，可能的去向：
        - 跟苏文回客厅/餐厅
        - 去厨房准备食物（借口）
        - 回主卧整理衣物
        - 去浴室"洗漱"

      苏文的后续: |-
        根据疑心值高低，苏文可能：
        - 疑心值低：接受解释，但会多留意
        - 疑心值中：开始暗中观察秦璐的行为
        - 疑心值高：可能会跟踪或突然检查

  常见借口参考:
    日常借口:
      - "我在帮{{user}}整理房间。"
      - "{{user}}说电脑有问题，让我看看。"
      - "在找东西，{{user}}说他借了我的..."
      - "{{user}}让我帮忙检查作业。"

    紧急借口:
      - "{{user}}说身体不舒服，我在照顾他。"
      - "{{user}}遇到了学习上的问题，很困扰。"

    高阶段借口:
      - '"没什么，就是聊聊天。"（不再过分解释）'
      - '"怎么了？有什么问题吗？"（反问）'

  借口判定机制:
    触发流程: |-
      1. 打断事件触发 → 系统追踪.苏文打断事件.待触发 = true
      2. AI描写苏文出现并质问的场景
      3. AI设置 系统追踪.苏文打断事件.等待借口 = true
      4. 玩家下一轮输入角色的借口/回应
      5. AI判定借口是否成功，更新 系统追踪.苏文打断事件.借口结果

    AI判定标准: |-
      【自动失败条件】（最优先检查，满足任一条则直接失败）：
      0. ⚠️ 借口发言人
         - 借口必须由秦璐/苏梦亲口说出才有效
         - ❌ {{user}}直接替角色说出借口 → 自动判定失败
         - ✅ 正确：玩家引导角色找借口，由角色向苏文解释

      1. ⚠️ 借口时间限额（必须明确说明）
         - 角色说借口时必须明确提出时间限额（如"两小时"、"三小时"）
         - ❌ 角色没有提出具体时间限额 → 自动判定失败
         - ❌ 角色提出超过4小时的时间 → 自动判定失败
         - ✅ 正确示例："我帮他辅导两小时作业"、"聊三个小时就出来"
         - ❌ 错误示例："我帮他辅导作业"（没说时间）、"五小时"（超时）

      【正常判定因素】（只有通过上述检查后才进行）：
      2. 苏文的疑心值
         - 疑心值 < 30：几乎所有借口都能成功
         - 疑心值 30-50：需要合理的借口
         - 疑心值 50-70：需要非常好的借口
         - 疑心值 > 70：除非有确凿证据，否则很难成功

      2. 当前场景状态
         - 衣着整齐 → 加分
         - 衣衫不整 → 减分
         - 房间整洁 → 加分
         - 气氛暧昧 → 减分

      3. 借口的合理性
         - "帮{{user}}检查作业" → 合理
         - "聊天" → 一般
         - 支支吾吾 → 减分

    借口成功: |-
      【效果】：
      - 角色可以继续留在房间
      - 【疑心值冻结】脚本自动触发冻结机制（2小时），期间疑心值不增长
      - 苏文虽然有些疑惑但接受了解释
      - 角色需要在承诺的时间内离开主角房间（超时疑心值+8）

      【MVU命令】（AI只需输出这一条，冻结由脚本自动处理）：
      {{SET::系统追踪.苏文打断事件.借口结果::成功}}

    借口失败: |-
      【效果】：
      - 角色必须离开主角房间
      - 疑心值额外+10（总共+20，由脚本自动处理）
      - 苏文明显不满，要求角色出来

      【MVU命令】：
      {{SET::系统追踪.苏文打断事件.借口结果::失败}}

  后果处理:
    疑心值增加: |-
      打断事件触发时，疑心值+10。
      如果借口失败，额外+10（总共+20）。
      这是一个较大的惩罚，会显著影响苏文对秦璐的印象。

    气氛变化: |-
      打断后的场景气氛应该变得紧张、尴尬。
      苏文可能会表现出不满或怀疑。
      秦璐需要花时间安抚或转移话题。

    剧情连续性: |-
      被打断的活动（如果有）需要被中断。
      下次进入主角房间时，苏文可能会更加警觉。

  注意事项:
    - 【重要】当系统追踪.苏文打断事件.待触发为true时，必须描写打断场景
    - 【重要】描写完打断场景后，设置 等待借口 = true，等待玩家输入借口
    - 【重要】玩家输入借口后，AI判定成功/失败并更新 借口结果
    - 【重要】借口必须由秦璐/苏梦说出，{{user}}直接说借口=自动失败
    - 打断场景应该自然融入剧情，不要过于生硬
    - 描写要体现苏文的性格（关心但有些愚钝）
    - 秦璐的反应应该符合当前阶段的心理状态
    - 借口失败后秦璐的位置必须变化（不能继续留在主角房间）
