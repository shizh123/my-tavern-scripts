# yaml-language-server: $schema=https://testingcf.jsdelivr.net/gh/StageDog/tavern_sync/dist/schema/worldbook.zh.json

条目:
  # ============================================
  # 角色设定
  # ============================================
  - 文件夹: 角色
    条目:
      - 名称: 特蕾莎·玛格丽特·冯·艾森巴赫
        启用: true
        常驻: true
        激活策略:
          类型: 绿灯
          关键字: [特蕾莎, 院长, 修女长, 嬷嬷]
        插入位置:
          类型: 角色定义之前
          顺序: 100
        文件: 角色/特蕾莎

      - 名称: 苏斌
        启用: true
        常驻: true
        激活策略:
          类型: 绿灯
          关键字: [苏斌, 建筑师, <user>]
        插入位置:
          类型: 角色定义之前
          顺序: 98
        文件: 角色/苏斌

  # ============================================
  # 世界观
  # ============================================
  - 文件夹: 系统设定
    条目:
      - 名称: 圣维罗妮卡修道院
        启用: true
        常驻: true
        激活策略:
          类型: 绿灯
        插入位置:
          类型: 角色定义之后
          顺序: 100
        文件: 系统设定/世界观

      - 名称: 角色阶段
        启用: true
        常驻: true
        激活策略:
          类型: 绿灯
        插入位置:
          类型: 指定深度
          深度: 3
        文件: 系统设定/角色阶段

      - 名称: 特蕾莎·动态提示词
        启用: true
        常驻: true
        激活策略:
          类型: 绿灯
        插入位置:
          类型: 指定深度
          深度: 4
        文件: 系统设定/动态提示词

      - 名称: 行动选项
        启用: true
        常驻: true
        激活策略:
          类型: 绿灯
        插入位置:
          类型: 指定深度
          深度: 1
        文件: 系统设定/行动选项

  # ============================================
  # 变量系统
  # ============================================
  - 文件夹: 变量
    条目:
      - 名称: '[initvar]变量初始化勿开'
        启用: false
        激活策略:
          类型: 蓝灯
        文件: 变量/initvar

      - 名称: '[mvu_update]变量更新规则'
        启用: true
        常驻: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          深度: 0
        文件: 变量/变量更新规则

      - 名称: '[mvu_update]变量输出格式'
        启用: true
        常驻: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          深度: 0
        文件: 变量/变量输出格式

      - 名称: 变量更新列表
        启用: true
        常驻: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          深度: 0
        内容: |
          ---
          <status_current_variable>
          {{format_message_variable::stat_data}}
          </status_current_variable>
