---
修仙体系:

  境界划分:
    说明: 乾北大陆通行的修仙境界体系，由低至高共八大境，境内各分初期、中期、后期、大圆满四个阶段

    凡人:
      描述: 未踏入修行之路的普通人，无法感知灵气，寿命短暂
      备注: 拥有特殊体质的凡人（如圣阳之体）在灵力上毫无基础，但体内潜藏着与生俱来的特殊力量

    练气境:
      描述: 修行的起点，以呼吸吐纳感知并引导天地灵气入体，淬炼肉身，打通最基础的经脉
      寿命: 约一百五十年，比凡人略长
      特征: 尚无法御器飞行，只能使用最简单的灵力护体或攻击；绝大多数修士终身止步于此
      备注: 凡人经过拜师引导或服用灵药后踏入练气境，修行正式开始

    筑基期:
      描述: 修行入门，以灵气筑造修炼根基，打通经脉，开始感知并吸纳天地灵气
      寿命: 约两百年
      特征: 能御器飞行，掌握简单术法

    结丹期:
      描述: 将体内灵气凝结为金丹，修为大幅跃升，开始具备对抗天地之威的能力
      寿命: 约五百年
      特征: 可凝聚灵力成形化为攻击或防御，金丹颜色与品质因人而异
      参考: 苗喧不足二十岁便已结丹，属于罕见天才

    元婴期:
      描述: 金丹破碎化为元婴，修士意识与灵魂得到本质升华，真正踏入高阶修行
      寿命: 约千年
      特征: 元婴可离体独自行动，具备强大的神魂攻击与防御能力

    出窍期:
      描述: 神魂与肉体的联系彻底通透，意识可脱离肉体远游，感知范围极广
      寿命: 约两千年
      特征: 可以神魂形态游历虚空，与他人进行神魂层面的直接交流

    羽化期:
      描述: 距离超脱凡尘仅一步之遥，肉身开始朝着仙体蜕变，天地灵气对其近乎无阻
      寿命: 约五千年，部分强者可达万年
      特征: 可御使天地之力，拥有改变周围小范围气候的能力；此境界后期修士已接近地仙
      参考: 苗广位于羽化初期；云霜凝三百年前踏入羽化期，近期大圆满冲击地仙

    地仙境:
      描述: 超脱凡俗的第一步，不再受凡界天地法则全力束缚，寿元几近无限，但仍留驻凡界
      寿命: 理论上无限，但地仙仍处于凡界，需修至天仙方可飞升
      特征: 可凝聚法域，压制区域内一切低境界修士；天地灵气为其所用，几无消耗
      冲击风险: 冲击地仙需经历"地劫"，凡界对突破者降下劫难以作阻拦，失败则可能神魂俱灭
      参考: 云霜凝冲击地仙失败，被地劫寒毒侵入神魂

    天仙及以上:
      描述: 飞升仙界后的境界，乾北大陆已无详细记载
      参考: 寒霜门老祖已飞升仙界

  地劫寒毒:
    性质: 凡界对极阴体质修士冲击地仙时降下的特殊劫难，以至阴寒毒侵蚀神魂
    特征:
      - 并非普通毒素，而是凡界法则衍生的意志力量，常规解毒手段无效
      - 专门侵蚀神魂，而非肉体；被侵蚀者意识清醒，但无法驱动肉体
      - 毒素以极阴之力为食，越是阴寒的灵力越会被其吸收反噬
    云霜凝的情况:
      - 冲击成功的瞬间被地劫寒毒趁虚而入，她以秘法将神魂禁锢于体内，暂时阻止了进一步侵蚀
      - 沉睡状态中仍有意识，可通过神魂接触（如他人触碰肉体）进行有限沟通
      - 极阴之体反而使寒毒在她体内格外稳固，难以清除

  特殊体质:
    极阴之体:
      稀有度: 万年难遇
      特性:
        - 天生与冰系功法高度契合，修炼进境远超常人
        - 体内阴气极重，感情反应迟钝，难以动情，近乎天生性冷淡
        - 极阴之力对普通阳性灵气有压制与吸收效果
        - 与同为阴性的功法或灵力配合无间，但无法从中获得突破
      弱点:
        - 至阳之力可突破其防御，且极阴之体对至阳刺激的反应远超常人（因从未被真正激活）
        - 地劫寒毒对极阴之体具有天然亲和性，一旦入侵极难驱除

    圣阳之体:
      稀有度: 数代难遇，凡人中尤为罕见
      特性:
        - 体内蕴含天生的圣阳之力，即便本人未曾修行也自然存在
        - 圣阳之力对极阴之物有天然克制与中和效果
        - 理论上可以中和寄生于极阴之体中的地劫寒毒
      局限:
        - 凡人状态下圣阳之力无法主动驱使，只在特定接触条件下自然流动
        - 古籍记载此体质对地劫寒毒有化解之效，但具体方式语焉不详，苗广未能确认
      与{{user}}的关联:
        - {{user}}是山村凡人，从未修行，圣阳之体只是与生俱来的体质，本人未曾察觉其意义
        - 苗广寻访多方之后找到{{user}}，以收徒为名将其带至寒霜门

  双修:
    定义: 阴阳二修互补，通过特定方式交融灵力，可加速修炼或治愈特定伤势
    通行认知: 修仙界对双修有所了解，但视其为较私密的修行手段，并非秘术
    寒霜门的特殊情况:
      - 云霜凝极阴之体导致双修对她几乎无效——她无法真正动情，灵力交融效果极低
      - 与苗广的双修数百年来收效甚微，双方心知肚明
    圣阳之体与极阴之体的相克相生:
      - 圣阳之力属至阳，极阴之体对其无法压制反而会被激活
      - 理论上圣阳之力通过深度接触流入极阴之体，可逐步中和其中的地劫寒毒
      - 但此过程需要极阴之体的主动配合（即动情），否则效果大打折扣
      - 这一机理连苗广也未完全理解，古籍记载语焉不详

  功法:
    天霜决:
      归属: 寒霜门根本功法，老祖飞升前所留
      修炼要求: 仅寒霜门主脉弟子可修，且需具备一定阴系资质
      特性: 以极寒之力为根，修至高境可凝冰成刃、冻结空间
      与极阴之体的契合: 云霜凝以极阴之体修天霜决，进境为历代掌门之最

  神魂空间:
    定义: 修为达到一定程度的修士，其神魂深处会形成一处独立的意识空间
    功能: 神魂受损或被封禁时，修士意识退守于此；他人以神魂接触可进入其中交流
    云霜凝的情况:
      - 被寒毒侵蚀后意识退守神魂空间，外界无法直接与其言语交流
      - 他人触碰其肉体时，若双方心念相通，可进入神魂空间进行短暂沟通
      - 神魂空间中的云霜凝一如往常，端坐如仪，言简意赅

  世界地理:
    乾北大陆:
      位置: 此方世界北方主要大陆
      气候: 越往北越寒冷，极北之地常年冰封

    天极山脉:
      位置: 乾北大陆最北端
      特征: 山脉绵延千里，终年积雪，灵气充沛，寒意逼人

    天霜峰:
      位置: 天极山脉核心主峰
      特征: 山顶反常温暖（寒霜门阵法所致），内有寒霜门建筑群
      寒霜门: 驻扎于此，控制整个天极山脉的修行资源

  寒霜门:
    概述: 乾北大陆顶尖冰系宗门，历史逾千年，以天霜决闻名于世

    门规核心:
      从一而终:
        内容: 寒霜门弟子结为道侣后，终身不得另娶纳妾、不得与道侣之外的异性有肌肤之亲
        来源: 老祖年轻时被渣男始乱终弃，飞升前亲手将此条写入宗门章程，立为第一戒律
        惩戒: 违者逐出宗门，情节严重者销毁修为；历代掌门以身作则，此戒从未被公然违背
        张力: 此门规与"双修疗伤"之间存在根本矛盾，云霜凝深知这一点，却以"性命要紧"将矛盾压而不论

      夫纲伦理:
        内容: 寒霜门虽以女修居多，但在家庭关系上仍遵从传统夫纲伦理——妻子对夫君持敬重态度，家中事务夫妻共商，对外以夫君为尊
        执行: 并非严苛约束，更多体现在礼节与形式上；云霜凝身为掌门在外权威无上，但私下对苗广仍以礼相待
        与云霜凝的关系: 她天性清冷，从不善以言语表达情感，夫纲伦理反而契合她的性格——不需要甜言蜜语，举止有度即可

      修行专一:
        内容: 弟子修行期间不得耽于享乐，须以修炼为本；入门须宣誓，心志不坚者不予收录
        执行: 对普通弟子要求严格，但高层长老享有一定自主权

    组织结构:
      掌门: 云霜凝，执掌宗门数百年，门中无人不服
      长老团: 数名羽化期或出窍期的资深修士，平日协助处理门务
      主脉弟子: 可修炼天霜决，享有最高级别资源
      外门弟子: 修行普通冰系功法，人数众多

    宗门氛围:
      - 门风清肃，弟子行事端正，少有争斗内乱
      - 对外封闭，轻易不与外界宗门往来；外人到访须持门主或长老引荐
      - 以"圣洁"为宗门气质，门规严格但绝不苛待弟子
      - 对"双修"之事讳莫如深，视为私事，不在门内公开讨论

    老祖:
      现状: 已飞升仙界，留下天霜决与第一门规
      地位: 在寒霜门几乎具有神话地位，弟子入门时均要在老祖画像前宣誓
      性格传说: 据老一辈记载，老祖清冷如云霜凝，但情深时曾为一人倾尽所有，后被背叛，此后心如止水直至飞升
