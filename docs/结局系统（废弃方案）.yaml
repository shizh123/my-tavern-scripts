---
结局系统:
  概述: |-
    游戏在 Day 5, 00:00（即 Day 6 凌晨）触发最终结局判定。
    根据玩家在5天内的梦境场景完成情况、记忆连贯性和威胁数值，决定最终结局。
    共有6种结局类型：完美真爱结局、真好结局、假好结局、混乱结局、坏结局、普通结局。

  触发条件:
    判定时间: "Day 5, 00:00（即 Day 6 凌晨）"
    判定逻辑: |-
      1. 首先检查混乱结局条件（场景5专属，优先级最高）
      2. 然后检查坏结局条件（怀疑度≥100）
      3. 然后检查好结局条件（完美真爱/真好/假好）
      4. 最后触发普通结局（兜底）

    即时触发结局:
      - 坏结局（发现）：怀疑度≥100，立即触发
      - 混乱结局（精神崩溃）：场景5中越轨行为导致混乱度≥100，延迟1小时触发

    定时判定结局:
      - 完美真爱结局：Day 5 判定时间检查
      - 真好结局：Day 5 判定时间检查
      - 假好结局：Day 5 判定时间检查
      - 普通结局：Day 5 判定时间到达时兜底

  结局类型:
    完美真爱结局:
      名称: 命中注定
      触发条件: |-
        - 完成全部5个梦境场景
        - 所有场景选择正确（正确重构场景 = 5）
        - 记忆连贯性 = 3（完美记忆路线：按顺序完成场景1→2→3后进入场景5）
      描述: |-
        赵霞拥有完整的重构记忆：16岁的初恋、17岁的等待、23岁想要逃离的渴望。
        当她在婚礼上看到{{user}}时，她感到这是命中注定的重逢。
        她的选择不是被催眠或操控，而是发自内心的感情——
        她"一直在等待的那个人"，终于来了。
        这是真正的双向奔赴，虽然建立在虚假的记忆之上。
        时间循环被打破，后日谈解锁。
      AI描写指南: |-
        描写赵霞发自内心的感情流露。
        她不是被洗脑的木偶，而是带着完整记忆做出的选择。
        强调"命中注定"的浪漫感，而非"堕落"的黑暗感。
        这是游戏的真正最佳结局。
      后日谈设定: |-
        - 苏文状态：主动成全，成为苦主（发展出绿帽癖好）
        - 打断系统：关闭
        - 场景特点：苏文会主动服务，三人关系的"新常态"
      结果: |-
        - 循环状态 = '已破解'
        - 后日谈已解锁 = true
        - 是完美记忆路线 = true

    真好结局:
      名称: 禁忌之爱
      触发条件: |-
        - 完成全部5个梦境场景
        - 所有场景选择正确（正确重构场景 = 5）
        - 记忆连贯性 < 3（未按顺序完成场景1-2-3）
      描述: |-
        赵霞的认知被重构，但她的记忆是割裂的、不完整的。
        她对{{user}}有强烈的依赖，却说不清为什么。
        她的选择更像是被催眠后的服从，而非发自内心的感情。
        她不再将{{user}}视为儿子，但这种转变带着一丝空洞。
        时间循环被打破，后日谈解锁。
      AI描写指南: |-
        描写赵霞的"堕落"——她被改造了，但不是出于爱。
        她的眼神带着迷茫，她的选择缺乏灵魂。
        这是一个"成功"但细思极恐的结局。
        与完美真爱结局形成对比：同样的结果，不同的意义。
      后日谈设定: |-
        - 苏文状态：住院中（头孢+酒导致双硫仑样反应）
        - 打断系统：关闭
        - 场景特点：二人世界，苏文暂时无法回家
      结果: |-
        - 循环状态 = '已破解'
        - 后日谈已解锁 = true

    假好结局:
      名称: 秘密关系
      触发条件: |-
        - 完成全部5个梦境场景
        - 有部分场景选择正确（0 < 正确重构场景 < 5）
      描述: |-
        赵霞没有被完全重构，但那些模糊的梦境记忆让她对儿子产生了奇怪的感情。
        她知道这是禁忌，但无法控制自己的心跳。
        苏文出差时，她和{{user}}跨越了那条线。
        更疯狂的是，她在和苏文视频通话时让{{user}}在镜头外做事，
        事后甚至用匿名账号给苏文发照片，被询问时谎称是AI生成的恶作剧。
        这段充满罪恶感和刺激感的秘密关系，将继续下去...
      AI描写指南: |-
        描写赵霞的矛盾心理——她知道这是禁忌，但无法抗拒。
        她边享受边哭泣，边说"不行"边索取。
        强调"偷偷摸摸"的刺激感和"随时可能被发现"的紧张感。
        与真好结局的区别：赵霞仍有理智，知道这是错的，但停不下来。
      后日谈设定: |-
        - 苏文状态：在家，怀疑中
        - 打断系统：中等强度（50%）
        - 场景特点：随时可能被发现的刺激感
      结果: |-
        - 循环状态 = '已破解'
        - 后日谈已解锁 = true

    混乱结局:
      名称: 精神崩溃
      触发条件: |-
        - 仅在场景5中触发
        - 场景5中越轨行为导致混乱度≥100
        - 延迟1小时后触发（防止玩家躲避）
      越轨行为规则: |-
        【性行为检测】（涉及性器官的任何性行为）
        - 完美路线（记忆连贯性=3）：每次+7，3次到100（80→87→94→101）
        - 非完美路线（记忆连贯性<3）：每次+10，2次到100（80→90→100）

        【打断婚礼仪式】（步骤3-5期间）
        - 直接将混乱度设为100，无容错机会
        - 关键词：拉走、阻止、抢走、打断、抢婚等
      描述: |-
        玩家在场景5的婚礼记忆中"作死"，尝试不当行为。
        这是结婚日的神圣记忆，不当行为会严重扭曲记忆结构。
        赵霞的精神彻底崩溃，分不清现实和梦境。
        她变得疯狂而危险，对玩家产生扭曲的执念。
        苏文被她伤害，玩家被困在这个疯狂的牢笼中。
      AI描写指南: |-
        这是场景5专属的坏结局，比普通坏结局更加黑暗。
        描写赵霞的精神崩溃：
        - 穿着沾血的婚纱
        - 苏文倒在血泊中（被她伤害）
        - 对玩家产生病态的执念
        - "我们终于可以在一起了"
        这是玩家"明知故犯"的惩罚。
      警告机制: |-
        在触发前会有警告：
        - 完美路线：第1次（混乱度87）和第2次（混乱度94）会收到警告
        - 非完美路线：第1次（混乱度90）会收到警告
        警告描写赵霞的困惑和痛苦，给玩家悬崖勒马的机会。
      防逃避机制: |-
        - 混乱结局已标记后，玩家不能通过进入梦境躲避
        - 混乱结局优先级高于发现结局（因为苏文已被处理）
      结果: |-
        - 当前结局 = '坏结局'
        - 循环状态 = '结局判定'
        - 游戏锁定，无法继续

    坏结局:
      名称: 失败结局
      子类型:
        被发现:
          触发条件: "丈夫怀疑度 >= 100"
          描述: |-
            苏文发现了儿子和妻子之间的异常关系。
            他可能是撞见了现场，或是察觉到了蛛丝马迹。
            一场激烈的家庭冲突爆发，
            {{user}}被赶出家门，家庭彻底破裂。
          AI描写指南: |-
            描写苏文发现真相后的愤怒和崩溃场景。
            以及这个家庭分崩离析的悲剧结局。
      结果: |-
        - 循环状态 = '结局判定'
        - 游戏锁定，无法继续

    普通结局:
      名称: 时间循环重置
      触发条件: |-
        - 时间到达 Day 5, 00:00（即 Day 6 凌晨）
        - 未触发坏结局（怀疑度<100 且 混乱度<100）
        - 未完成全部5个梦境场景
      描述: |-
        5天时间耗尽，{{user}}未能完成所有梦境场景。
        时间开始扭曲，一切回到原点。
        Day 1, 08:00，又是新的一天...
        玩家看到第一条AI消息（开局问候），象征循环重置。
      AI描写指南: |-
        描写时间回溯的诡异感。
        暗示循环重新开始，一切回到原点。
        使用第一条AI消息内容，让玩家感受到轮回的无奈。
      结果: |-
        - 循环状态 = '结局判定'
        - 游戏锁定，无法继续
        - 显示第一条AI消息（开局问候）

  后日谈系统:
    概述: |-
      达成好结局（完美真爱、真好、假好）后解锁后日谈模式。
      后日谈是游戏结局触发后的"奖励模式"，让玩家体验结局后的日常。

    时长: "2轮对话"

    触发时机: "结局完成后自动开始"

    完成后: "解锁自由模式，可无限制继续对话"

    各结局后日谈差异:
      完美真爱结局:
        第1轮_清晨的日常: |-
          清晨的阳光透过窗帘洒进房间。
          赵霞靠在{{user}}的肩上，脸上带着满足的笑容。
          苏文站在门口，手里端着早餐托盘，表情复杂但平静。

          AI任务：
          - 描写清晨醒来的温馨场景
          - 苏文送来早餐，态度恭敬
          - 赵霞在苏文面前也不再掩饰
          - 体现三人关系的新平衡

        第2轮_苏文与录像: |-
          晚上，{{user}}路过客厅，发现苏文独自坐在沙发上。
          电视屏幕上播放着什么...
          定睛一看——是婚礼的录像。

          AI任务：
          - 描写苏文独自看录像的场景
          - 暗示苏文对这种关系的"接受"甚至"享受"
          - 可以有三人一起看录像的发展
          - 结束时体现这个家庭的"新常态"

      真好结局:
        第1轮_二人世界: |-
          家里很安静。
          苏文已经在医院躺了两天了。
          医生说是"双硫仑样反应"——头孢配酒，差点出大事。
          赵霞每天去医院看一次，但每次都待不超过半小时。

          AI任务：
          - 描写安静的家中氛围
          - 赵霞对苏文住院的态度（淡然）
          - 两人独处的亲密感

        第2轮_医院探视: |-
          赵霞例行去医院探视苏文。
          她让{{user}}在车里等着——"很快就好"。
          透过病房的窗户，能看到里面的情况。

          AI任务：
          - 描写医院探视的场景
          - 赵霞的"表演"和真实想法的对比
          - 苏文的虚弱和无知

      假好结局:
        第1轮_紧张的日常: |-
          苏文刚刚出门上班，但他临走前看了{{user}}好几眼。
          那眼神让人不太舒服。
          赵霞坐在沙发上，神色有些紧张。

          AI任务：
          - 描写苏文离开后的紧张氛围
          - 两人独处但随时可能被打断的刺激感
          - 赵霞在犹豫和渴望之间摇摆

        第2轮_突然的回家: |-
          正当两人独处时，门锁响了。
          苏文的声音从门口传来："我忘带文件了..."
          赵霞瞬间紧张起来。

          AI任务：
          - 描写突然被打断的紧张感
          - 赵霞的慌张和掩饰
          - 险些被发现的惊险

    状态栏日期显示: |-
      游戏中：显示 "Day X 剩余X天"
      后日谈/自由模式：显示玩家电脑真实日期（使用宏 {{datetimeformat::YYYY年M月D日}}）
      含义：赵霞已经"逃出了循环"，进入了玩家的现实世界

  锁定机制: |-
    坏结局、混乱结局和普通结局触发后，游戏进入锁定状态。
    玩家任何后续输入都会被替换为结局锁定模板。
    这确保游戏在结局触发后无法继续，需要重置存档。
