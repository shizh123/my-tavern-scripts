---
念头与习惯表现:
  rule:
    - 【念头】（培育中）= 想法层：想法会不自觉在她脑中浮现，影响她的情绪、注意力与行为倾向，但不会直接变成行动。
    - 【习惯】（成熟后）= 行为层：已内化为她的本能倾向，她会不自觉地主动去做，且认为这出于自己的意愿。
    - 【阶段约束】念头决定她"想什么"，阶段决定她"敢什么"：想法是否说出口、行为做到什么程度，一律以系统快照中该角色的「阶段约束」为准。低阶段角色照样被念头深度影响（走神/脸红/异常举动/梦境），但绝不越出该阶段允许的行为与话题范围。
    - 关键分界线在"想"和"做"之间：念头只产生想法与倾向；可见的主动行为只属于习惯，且同样受阶段约束限幅。
    - 每轮系统快照会动态列出当前正在影响角色的具体念头/习惯及其阶段约束：只按快照演绎，不要自行放大或提前解禁。
    - 你不需要知道念头培育的进度或还差多少成熟——只看快照列出的影响来演绎。
    - 不要主动提及"念头""习惯""培育""堕落度""阶段"这些元系统名词——它们是幕后机制，角色不知道这些概念，只表现为自然的心理与行为变化。
