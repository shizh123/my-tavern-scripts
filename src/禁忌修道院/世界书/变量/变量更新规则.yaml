---
变量更新规则:
  世界状态:
    当前日期:
      format: YYYY年MM月DD日
      check:
        - 每日自动更新，跨日时重置当日事务
        - 跨日时触发着装更新
    当前时间:
      format: HH:MM
      check:
        - 随事件推进更新，保持时间流逝合理性
        - 场景转换时注意时间连贯性
    当前场景:
      check:
        - 场景转换时立即更新
        - 同时更新着装.当前场景类型
        - 触发着装自动更新机制
    近期事务:
      type: |-
        {
          [事务名: string]: string;
        }
      check:
        - 根据时间和剧情进展更新状态
        - 新日开始时重置日常事务

  特蕾莎状态:
    好感度:
      type: number
      range: 0~100
      check:
        - 苏斌的行为获得认同时+1~3点
        - 单次增幅限制2~3点，同场景内总增幅不超过5点
        - 需至少30分钟间隔才能再次增长
        - 作为堕落值增长前置：好感度每10点解锁堕落值10点上限

    堕落值:
      type: number
      range: 0~100
      check:
        - 苏斌的言行直接刺激时+1~4点，每次最多4点
        - 强制限制：当前堕落值 <= Math.floor(好感度/10)*10
        - 好感度不足时，即使有刺激也不增长
        - 超限时自动调整为上限值
        - 增长时需描述内心挣扎或身体反应

    当前阶段:
      type: number
      range: 1~20
      check:
        - 自动计算：Math.min(Math.floor(堕落值/5)+1, 20)
        - 阶段变化时必须同步更新阶段特征
        - 验证阶段特征与阶段数值一致性

    着装:
      type: |-
        {
          上装: string;
          下装: string;
          内衣: string;
          袜子: string;
          鞋子: string;
          饰品: string;
          最后更新日期: string;
          当前场景类型: '公共' | '私密';
        }
      check:
        - 日期变化或场景转换时自动更新
        - 根据当前阶段选择对应色情程度
        - 私密场景选择更大胆款式
        - 公共场合始终保持修女装束

    纹身:
      type: |-
        {
          [身体部位: string]: string;
        }
      check:
        - 仅堕落值≥80时存在
        - 每次堕落值更新后检查，<80立即清空
        - 新增需具体剧情触发

    身体改造:
      type: |-
        {
          [改造部位: string]: string;
        }
      check:
        - 仅堕落值≥80时存在
        - 限制类型：隆胸、穿环、打钉、形状改造
        - 每次堕落值更新后检查，<80立即清空

    阶段特征:
      type: |-
        {
          态度描述: string;
          语气风格: string;
          行为倾向: string;
          内心状态: string;
        }
      check:
        - 好感度<10时强制为"完全无视"状态
        - 阶段变化时自动更新为对应描述
        - 确保行为对话符合当前阶段特征
